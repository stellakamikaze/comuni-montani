<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Casa in quota — Comuni sopra i 1200m</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
:root{
  --surface-1:#fcfcfb; --page:#f9f9f7;
  --ink-1:#0b0b0b; --ink-2:#52514e; --ink-3:#898781;
  --grid:#e1e0d9; --baseline:#c3c2b7; --ring:rgba(11,11,11,0.10);
  --seq-250:#86b6ef; --seq-400:#3987e5; --seq-500:#256abf; --seq-600:#184f95; --seq-700:#0d366b;
  --accent:#2a78d6; --good:#006300;
  --sidebar-w:400px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink-1);background:var(--page)}
#app{display:flex;height:100%;overflow:hidden}

/* ---------- Sidebar ---------- */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;display:flex;flex-direction:column;background:var(--surface-1);border-right:1px solid var(--grid);z-index:1000;position:relative}
header{padding:18px 20px 12px;border-bottom:1px solid var(--grid)}
header h1{font-size:19px;font-weight:700;letter-spacing:-0.01em}
header p{font-size:12.5px;color:var(--ink-2);margin-top:3px}

.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grid);border-bottom:1px solid var(--grid)}
.tile{background:var(--surface-1);padding:10px 12px}
.tile .v{font-size:19px;font-weight:700;letter-spacing:-0.02em}
.tile .l{font-size:10.5px;color:var(--ink-3);margin-top:1px;text-transform:uppercase;letter-spacing:0.04em}

.tabs{display:flex;border-bottom:1px solid var(--grid)}
.tabs button{flex:1;padding:9px 0;font-size:13px;font-weight:600;color:var(--ink-3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}
.tabs button.active{color:var(--ink-1);border-bottom-color:var(--accent)}
.tabs button:hover{color:var(--ink-1)}

#filters{padding:12px 20px;border-bottom:1px solid var(--grid);display:flex;flex-direction:column;gap:10px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 11px;border-radius:99px;border:1px solid var(--baseline);background:var(--surface-1);color:var(--ink-2);cursor:pointer;font-weight:500}
.chip.on{background:var(--ink-1);color:#fff;border-color:var(--ink-1)}
.frow{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-2)}
.frow label{min-width:110px;font-weight:500}
.frow input[type=range]{flex:1;accent-color:var(--accent)}
.frow .val{min-width:70px;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink-1);font-weight:600}
.frow select{flex:1;padding:4px 6px;font-size:12px;border:1px solid var(--baseline);border-radius:6px;background:var(--surface-1);color:var(--ink-1)}

#list{flex:1;overflow-y:auto;padding:8px 12px 20px}
.count{font-size:11.5px;color:var(--ink-3);padding:6px 8px 8px}
.card{padding:11px 12px;border:1px solid var(--grid);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--surface-1);transition:border-color .12s, box-shadow .12s}
.card:hover{border-color:var(--baseline);box-shadow:0 1px 6px rgba(11,11,11,.06)}
.card.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card .r1{display:flex;align-items:center;gap:8px}
.card .dot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 0 2px var(--surface-1),0 0 0 3px var(--ring);flex:none}
.card .nome{font-weight:650;font-size:14px;flex:1}
.card .prezzo{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.card .r2{display:flex;gap:10px;margin-top:4px;font-size:11.5px;color:var(--ink-2)}
.card .r2 .xtra{color:var(--good);font-weight:600}
.scorebar{display:flex;align-items:center;gap:6px;margin-top:7px}
.scorebar .track{flex:1;height:4px;background:var(--grid);border-radius:2px;overflow:hidden}
.scorebar .fill{height:100%;background:var(--accent);border-radius:2px}
.scorebar .n{font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums;min-width:52px;text-align:right}

/* ---------- Detail panel ---------- */
#detail{position:absolute;inset:0;background:var(--surface-1);z-index:1010;display:none;flex-direction:column}
#detail.open{display:flex}
#detail .dhead{padding:14px 20px 12px;border-bottom:1px solid var(--grid)}
#detail .back{font-size:12.5px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0 0 8px;font-weight:600}
#detail h2{font-size:21px;font-weight:750;letter-spacing:-0.01em}
#detail .sub{font-size:12.5px;color:var(--ink-2);margin-top:2px}
#detail .badge-extra{display:inline-block;font-size:10.5px;font-weight:700;color:var(--good);border:1px solid var(--good);border-radius:99px;padding:1px 8px;margin-top:6px}
#detail .dbody{flex:1;overflow-y:auto;padding:14px 20px 30px}
.dprice{display:flex;align-items:baseline;gap:8px;padding:12px 14px;border:1px solid var(--grid);border-radius:10px;margin-bottom:12px}
.dprice .big{font-size:26px;font-weight:750;letter-spacing:-0.02em}
.dprice .unit{font-size:13px;color:var(--ink-2)}
.dprice .fascia{margin-left:auto;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;color:#fff}
.dnote{font-size:11.5px;color:var(--ink-3);margin:-6px 2px 14px;line-height:1.45}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.dcell{border:1px solid var(--grid);border-radius:10px;padding:9px 11px}
.dcell .k{font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
.dcell .v{font-size:14px;font-weight:650;margin-top:2px;font-variant-numeric:tabular-nums}
.dsec{margin-bottom:14px}
.dsec h3{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin-bottom:5px}
.dsec p{font-size:13px;line-height:1.55;color:var(--ink-1)}
.dscores{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.dscores .row{display:flex;align-items:center;gap:10px;font-size:12px}
.dscores .row .k{min-width:105px;color:var(--ink-2)}
.dscores .track{flex:1;height:6px;background:var(--grid);border-radius:3px;overflow:hidden}
.dscores .fill{height:100%;background:var(--accent);border-radius:3px}
.dscores .n{min-width:30px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.plist{list-style:none;font-size:13px;line-height:1.5}
.plist li{padding:3px 0 3px 22px;position:relative}
.plist li::before{position:absolute;left:0;font-weight:800}
.plist.pro li::before{content:"+";color:var(--good)}
.plist.contro li::before{content:"−";color:#d03b3b}
.fonti{font-size:11px;color:var(--ink-3);line-height:1.7;word-break:break-all}
.fonti a{color:var(--ink-3)}
.vnote{font-size:11.5px;color:var(--ink-2);background:var(--page);border:1px solid var(--grid);border-radius:8px;padding:8px 10px;line-height:1.5}

/* ---------- Analisi tab ---------- */
#analisi{flex:1;overflow-y:auto;padding:16px 20px 30px;display:none}
#analisi.open{display:block}
#analisi h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin:16px 0 6px}
#analisi h3:first-child{margin-top:0}
#analisi p{font-size:13.5px;line-height:1.6}
.pick{border:1px solid var(--grid);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.pick:hover{border-color:var(--baseline)}
.pick .pk{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3)}
.pick .pv{font-size:14px;font-weight:700;margin-top:2px;color:var(--accent)}
.pick .pd{font-size:12.5px;color:var(--ink-2);margin-top:2px;line-height:1.45}
#analisi ul{padding-left:18px;font-size:13px;line-height:1.6}
#analisi ul li{margin-bottom:6px}

/* ---------- Map ---------- */
#map{flex:1;height:100%;background:#eef0ee}
.cmarker{border-radius:50%;box-shadow:0 0 0 2px #fff,0 1px 4px rgba(11,11,11,.35);cursor:pointer}
.leaflet-tooltip.ctip{background:var(--ink-1);color:#fff;border:none;border-radius:7px;padding:6px 10px;font-family:inherit;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.leaflet-tooltip.ctip::before{display:none}
.ctip .tn{font-weight:700;font-size:13px}
.ctip .tp{font-size:11.5px;opacity:.85;font-variant-numeric:tabular-nums}

#legend{position:absolute;bottom:22px;right:12px;z-index:1000;background:var(--surface-1);border:1px solid var(--grid);border-radius:10px;padding:10px 13px;box-shadow:0 2px 10px rgba(11,11,11,.08)}
#legend .lt{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);margin-bottom:6px;font-weight:600}
#legend .li{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-2);padding:1.5px 0}
#legend .li .sw{width:10px;height:10px;border-radius:50%;box-shadow:0 0 0 1px var(--ring)}

/* ---------- Mobile ---------- */
#mtoggle{display:none}
@media (max-width:760px){
  #app{flex-direction:column}
  #sidebar{width:100%;min-width:0;height:52%;order:2;border-right:none;border-top:1px solid var(--grid)}
  #map{height:48%;order:1}
  .tiles{grid-template-columns:repeat(4,1fr)}
  #legend{bottom:auto;top:10px;right:10px;padding:7px 10px}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <header>
      <h1>Casa in quota</h1>
      <p>Comuni sopra i 1200 m — Piemonte · Valle d'Aosta · Lombardia</p>
    </header>
    <div class="tiles" id="tiles"></div>
    <div class="tabs">
      <button id="tab-esplora" class="active">Esplora</button>
      <button id="tab-analisi">Analisi</button>
    </div>
    <div id="filters">
      <div class="chips" id="chips-regione"></div>
      <div class="frow"><label>Prezzo max</label><input type="range" id="f-prezzo" min="600" max="11000" step="100" value="11000"><span class="val" id="f-prezzo-v"></span></div>
      <div class="frow"><label>Vivibilità min</label><input type="range" id="f-viv" min="1" max="10" step="1" value="1"><span class="val" id="f-viv-v"></span></div>
      <div class="frow"><label>Ordina per</label><select id="f-sort">
        <option value="score">Punteggio complessivo</option>
        <option value="prezzo">Prezzo (crescente)</option>
        <option value="viv">Vivibilità</option>
        <option value="alt">Altitudine</option>
        <option value="torino">Vicinanza a Torino</option>
        <option value="milano">Vicinanza a Milano</option>
      </select></div>
    </div>
    <div id="list"></div>
    <div id="analisi"></div>
    <div id="detail">
      <div class="dhead">
        <button class="back" id="d-back">← Torna alla lista</button>
        <h2 id="d-nome"></h2>
        <div class="sub" id="d-sub"></div>
        <div id="d-extra"></div>
      </div>
      <div class="dbody" id="d-body"></div>
    </div>
  </div>
  <div style="flex:1;position:relative">
    <div id="map"></div>
    <div id="legend"></div>
  </div>
</div>

<script>
const DATA = /*__DATA__*/null/*__/DATA__*/;

// ---------- Fasce prezzo (ordinal, un solo hue, chiaro=economico) ----------
const FASCE = [
  {max:1000,  c:'#86b6ef', label:'≤ 1.000 €/m²'},
  {max:1800,  c:'#3987e5', label:'1.000–1.800 €/m²'},
  {max:3000,  c:'#256abf', label:'1.800–3.000 €/m²'},
  {max:5000,  c:'#184f95', label:'3.000–5.000 €/m²'},
  {max:1e9,   c:'#0d366b', label:'> 5.000 €/m²'},
];
const eur = n => n==null ? '—' : Math.round(n).toLocaleString('it-IT');
const med = c => (c.prezzo_mq_min + c.prezzo_mq_max)/2;
const fascia = c => FASCE.find(f => med(c) <= f.max);
const hhmm = m => m==null ? '—' : (m<60 ? m+' min' : Math.floor(m/60)+'h'+String(Math.round(m%60)).padStart(2,'0'));

const comuni = DATA.schede.map((c,i)=>({...c, id:i}));
const S = { regioni:new Set(), prezzoMax:11000, vivMin:1, sort:'score', sel:null };

// ---------- Stat tiles ----------
(function(){
  const meds = comuni.map(med).sort((a,b)=>a-b);
  const mediana = meds[Math.floor(meds.length/2)];
  const cheapest = comuni.reduce((a,b)=>med(a)<med(b)?a:b);
  const t = document.getElementById('tiles');
  t.innerHTML = [
    {v:comuni.length, l:'comuni'},
    {v:eur(cheapest.prezzo_mq_min)+'€', l:'prezzo min /m²'},
    {v:eur(mediana)+'€', l:'mediana /m²'},
    {v:Math.max(...comuni.map(c=>c.altitudine_m)).toLocaleString('it-IT')+'m', l:'quota max'},
  ].map(x=>`<div class="tile"><div class="v">${x.v}</div><div class="l">${x.l}</div></div>`).join('');
})();

// ---------- Mappa ----------
const map = L.map('map',{zoomControl:true}).setView([45.6,7.9],8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>', maxZoom:18
}).addTo(map);

const markers = {};
comuni.forEach(c=>{
  const f = fascia(c);
  const icon = L.divIcon({className:'', html:`<div class="cmarker" style="width:100%;height:100%;background:${f.c}"></div>`, iconSize:[16,16], iconAnchor:[8,8]});
  const m = L.marker([c.lat,c.lng],{icon}).addTo(map);
  m.bindTooltip(`<div class="tn">${c.nome}</div><div class="tp">${eur(c.prezzo_mq_min)}–${eur(c.prezzo_mq_max)} €/m² · ${c.altitudine_m} m</div>`,{className:'ctip',direction:'top',offset:[0,-10]});
  m.on('click',()=>openDetail(c.id,true));
  markers[c.id]=m;
});

// legenda
document.getElementById('legend').innerHTML = '<div class="lt">Prezzo €/m² (mediana)</div>' +
  FASCE.map(f=>`<div class="li"><span class="sw" style="background:${f.c}"></span>${f.label}</div>`).join('');

// ---------- Filtri ----------
const regioni = [...new Set(comuni.map(c=>c.regione))];
const chipbox = document.getElementById('chips-regione');
regioni.forEach(r=>{
  const b=document.createElement('button'); b.className='chip on'; b.textContent=r;
  S.regioni.add(r);
  b.onclick=()=>{ if(S.regioni.has(r)&&S.regioni.size>1){S.regioni.delete(r);b.classList.remove('on')} else {S.regioni.add(r);b.classList.add('on')} render(); };
  chipbox.appendChild(b);
});
const fp=document.getElementById('f-prezzo'), fpv=document.getElementById('f-prezzo-v');
const fv=document.getElementById('f-viv'), fvv=document.getElementById('f-viv-v');
const fs=document.getElementById('f-sort');
fp.oninput=()=>{S.prezzoMax=+fp.value; fpv.textContent=(+fp.value>=11000)?'nessuno':eur(fp.value)+' €'; render()};
fv.oninput=()=>{S.vivMin=+fv.value; fvv.textContent=(+fv.value<=1)?'tutti':'≥ '+fv.value; render()};
fs.onchange=()=>{S.sort=fs.value; render()};
fpv.textContent='nessuno'; fvv.textContent='tutti';

function filtered(){
  let out = comuni.filter(c=>S.regioni.has(c.regione) && med(c)<=S.prezzoMax && c.score_vivibilita>=S.vivMin);
  const key={score:c=>-c.score_complessivo, prezzo:med, viv:c=>-c.score_vivibilita, alt:c=>-c.altitudine_m, torino:c=>c.tempo_auto_torino_min, milano:c=>c.tempo_auto_milano_min}[S.sort];
  return out.sort((a,b)=>key(a)-key(b));
}

// ---------- Lista ----------
function render(){
  const list=document.getElementById('list');
  const rows=filtered();
  const ids=new Set(rows.map(c=>c.id));
  comuni.forEach(c=>{ const el=markers[c.id].getElement(); if(el) el.style.opacity = ids.has(c.id)?'1':'0.18'; markers[c.id].setZIndexOffset(ids.has(c.id)?100:0); });
  list.innerHTML = `<div class="count">${rows.length} comuni ${rows.length<comuni.length?`(${comuni.length-rows.length} nascosti dai filtri)`:''}</div>` +
    rows.map(c=>`<div class="card${S.sel===c.id?' sel':''}" data-id="${c.id}">
      <div class="r1"><span class="dot" style="background:${fascia(c).c}"></span><span class="nome">${c.nome}</span><span class="prezzo">${eur(c.prezzo_mq_min)}–${eur(c.prezzo_mq_max)} €</span></div>
      <div class="r2"><span>${c.regione} (${c.provincia})</span><span>${c.altitudine_m} m</span><span>${c.popolazione.toLocaleString('it-IT')} ab.</span>${c._extra?'<span class="xtra">nuova scoperta</span>':''}</div>
      <div class="scorebar"><div class="track"><div class="fill" style="width:${c.score_complessivo*10}%"></div></div><span class="n">${c.score_complessivo}/10</span></div>
    </div>`).join('');
  list.querySelectorAll('.card').forEach(el=>el.onclick=()=>openDetail(+el.dataset.id,false));
}

// ---------- Dettaglio ----------
function openDetail(id, fly){
  const c=comuni.find(x=>x.id===id); if(!c) return;
  S.sel=id;
  showTab('esplora');
  document.getElementById('detail').classList.add('open');
  document.getElementById('d-nome').textContent=c.nome;
  document.getElementById('d-sub').textContent=`${c.regione} (${c.provincia}) · ${c.altitudine_m} m slm · ${c.popolazione.toLocaleString('it-IT')} abitanti`;
  document.getElementById('d-extra').innerHTML=c._extra?'<span class="badge-extra">Nuova scoperta — non era nella ricerca originale</span>':'';
  const f=fascia(c);
  const sc=[['Infrastrutture',c.score_infrastrutture],['Prezzo',c.score_prezzo],['Vivibilità',c.score_vivibilita],['Complessivo',c.score_complessivo]];
  document.getElementById('d-body').innerHTML = `
    <div class="dprice"><span class="big">${eur(c.prezzo_mq_min)}–${eur(c.prezzo_mq_max)}</span><span class="unit">€/m²</span><span class="fascia" style="background:${f.c}">${f.label}</span></div>
    <div class="dnote">${c.prezzo_nota||''}</div>
    <div class="dgrid">
      <div class="dcell"><div class="k">Da Torino</div><div class="v">${hhmm(c.tempo_auto_torino_min)}</div></div>
      <div class="dcell"><div class="k">Da Milano</div><div class="v">${hhmm(c.tempo_auto_milano_min)}</div></div>
    </div>
    <div class="dscores">${sc.map(([k,v])=>`<div class="row"><span class="k">${k}</span><div class="track"><div class="fill" style="width:${v*10}%"></div></div><span class="n">${v}</span></div>`).join('')}</div>
    <div class="dsec"><h3>In breve</h3><p>${c.descrizione}</p></div>
    <div class="dsec"><h3>Pro</h3><ul class="plist pro">${(c.pro||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="dsec"><h3>Contro</h3><ul class="plist contro">${(c.contro||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="dsec"><h3>Ospedale più vicino</h3><p>${c.ospedale_vicino}</p></div>
    <div class="dsec"><h3>Servizi</h3><p>${c.servizi}</p></div>
    <div class="dsec"><h3>Internet</h3><p>${c.internet}</p></div>
    <div class="dsec"><h3>Vita tutto l'anno</h3><p>${c.vita_annuale}</p></div>
    <div class="dsec"><h3>Sci</h3><p>${c.sci}</p></div>
    <div class="dsec"><h3>Acqua</h3><p>${c.acqua}</p></div>
    <div class="dsec"><h3>Esposizione al sole</h3><p>${c.esposizione}</p></div>
    ${c._verifica?`<div class="dsec"><h3>Verifica indipendente</h3><div class="vnote">${c._verifica.coordinate_ok?'✓ coordinate confermate':'⚠ coordinate da ricontrollare'} · ${c._verifica.prezzo_ok?'✓ prezzi plausibili':'⚠ prezzi incerti'}${c._verifica.note?' — '+c._verifica.note:''}</div></div>`:''}
    ${(c.fonti&&c.fonti.length)?`<div class="dsec"><h3>Fonti</h3><div class="fonti">${c.fonti.map(u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`).join('<br>')}</div></div>`:''}
  `;
  render();
  if(fly!==false) map.flyTo([c.lat,c.lng], Math.max(map.getZoom(),11), {duration:.7});
}
document.getElementById('d-back').onclick=()=>{S.sel=null;document.getElementById('detail').classList.remove('open');render()};

// ---------- Tab Analisi ----------
function showTab(t){
  document.getElementById('tab-esplora').classList.toggle('active',t==='esplora');
  document.getElementById('tab-analisi').classList.toggle('active',t==='analisi');
  document.getElementById('analisi').classList.toggle('open',t==='analisi');
  const esp = t==='esplora';
  document.getElementById('filters').style.display=esp?'flex':'none';
  document.getElementById('list').style.display=esp?'block':'none';
  if(t==='analisi'){S.sel=null;document.getElementById('detail').classList.remove('open');render()}
}
document.getElementById('tab-esplora').onclick=()=>showTab('esplora');
document.getElementById('tab-analisi').onclick=()=>showTab('analisi');

(function(){
  const a=DATA.sintesi||{};
  const findByName = n => comuni.find(c=> n && n.toLowerCase().includes(c.nome.toLowerCase()));
  const pick=(k,v)=>{ const c=findByName(v); return `<div class="pick" ${c?`data-id="${c.id}"`:''}><div class="pk">${k}</div><div class="pv">${c?c.nome:(v||'').split('—')[0]}</div><div class="pd">${v||''}</div></div>`; };
  document.getElementById('analisi').innerHTML =
    '<h3>Le scelte migliori</h3>'+
    pick('Miglior prezzo', a.top_pick_prezzo)+
    pick('Migliore per viverci', a.top_pick_vivibilita)+
    pick('Miglior compromesso', a.top_pick_compromesso)+
    '<h3>Il quadro</h3><p>'+(a.analisi||'').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</p>'+
    (a.insight&&a.insight.length?'<h3>Da sapere</h3><ul>'+a.insight.map(x=>`<li>${x}</li>`).join('')+'</ul>':'');
  document.querySelectorAll('.pick[data-id]').forEach(el=>el.onclick=()=>openDetail(+el.dataset.id,true));
})();

// fit bounds iniziale
map.fitBounds(L.latLngBounds(comuni.map(c=>[c.lat,c.lng])).pad(0.08));
render();
</script>
</body>
</html>
