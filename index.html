cino (analisi Giornale di Brescia). PS di Edolo a distanza simile.","servizi":"In loco: farmacia (Via Trento 96), ufficio postale, alimentari/piccolo market; scuola dell'infanzia nella frazione Valle. Primaria e medie a Cevo (2,5 km, IC Zendrini di Cedegolo, plesso condiviso coi due comuni). Sportello bancario storico (ex UBI, ora incerto post-fusione Intesa); supermercati veri e superiori in fondovalle (Sellero/Cedegolo, 15-20 min di tornanti).","internet":"Tra i comuni più arretrati della provincia: storicamente 0% FTTH/FTTC, ADSL fino a 20 Mega nel 99% delle case; citato dal Giornale di Brescia (2025) tra i territori sotto il 25% di copertura BUL. FWA (es. EOLO) come alternativa pratica; piano Open Fiber aree bianche in corso ma non completato — verificare copertura all'indirizzo prima di comprare.","vita_annuale":"Valle in forte spopolamento: da 1.155 a ~781-788 residenti in vent'anni (-31%), comune classificato ad alto rischio da PoliS-Lombardia. Il capoluogo mantiene un nucleo di residenti tutto l'anno con servizi minimi, ma molte case si riaprono solo d'estate; le frazioni di fondovalle (Ponte, Fresine) sono quasi disabitate. Fuori stagione la vita sociale è ridotta all'essenziale; niente turismo sciistico che tenga vivo l'inverno.","sci":"Nessun impianto in valle: la Valsaviore è terra di scialpinismo (Val Adamè, Val Salarno) e ciaspole. Skiarea più vicine: Aprica-Corteno (~45 min), Pontedilegno-Tonale (~55-65 min, 100 km di piste fino al ghiacciaio Presena), Borno e Montecampione (~50-60 min).","acqua":"Torrente Poja (Poia di Adamè + Poia di Salarno), affluente maggiore dell'Oglio; nel territorio il lago d'Arno e i laghi-invasi di Salarno/Dosazzo, tutti sotto le vette dell'Adamello.","esposizione":"Adret classico: il paese sta a mezza costa (1.210 m) sul versante orografico settentrionale della valle, esposto a sud — le fonti locali lo descrivono come terrazzo solatìo con abbondante sole anche nei mesi invernali. Le frazioni di fondovalle (Ponte, Valle, 850-1.100 m) sono invece più ombreggiate d'inverno.","pro":["Prezzi tra i più bassi delle Alpi lombarde: case abitabili sotto i 1.000 €/mq, rustici da ristrutturare a 400-700 €/mq","Esposizione sud a mezza costa: sole invernale abbondante, raro a queste quote in valli laterali","Porta del Parco dell'Adamello: natura di altissimo livello (Val Adamè, Salarno, lago d'Arno), zero folla","Servizi essenziali ancora in loco (farmacia, poste, alimentari) e scuole a 2,5 km a Cevo","Milano raggiungibile in ~2h20-2h30, stazione Trenord a Cedegolo in fondovalle"],"contro":["Connettività pessima: niente FTTH/FTTC, ADSL 20M o FWA — critico per chi lavora da remoto","Pronto soccorso a 32 minuti (Esine): il comune più lontano da un PS di tutta la Valcamonica","Spopolamento severo (-31% in 20 anni): paese vivo ma sempre più anziano e rarefatto d'inverno","Valle cieca: 20 minuti di tornanti da Cedegolo per qualsiasi cosa, neve e gelo invernali sulla strada","Nessun impianto sciistico proprio: le skiarea distano 45-65 minuti"],"score_infrastrutture":3,"score_prezzo":9,"score_vivibilita":4,"score_complessivo":5,"descrizione":"Saviore dell'Adamello è un borgo camuno a 1.210 m su un terrazzo solatìo esposto a sud, porta d'ingresso del Parco dell'Adamello: centro storico tra i meglio conservati della Valcamonica, natura grandiosa e case che costano un terzo della media provinciale. È però una valle cieca in forte spopolamento: pronto soccorso a mezz'ora, internet fermo all'ADSL/FWA e inverni in cui il paese si restringe ai residenti storici. Scelta sensata per chi cerca sole, silenzio e prezzi da 40-90mila euro accettando isolamento e servizi minimi; sconsigliata a chi dipende dal lavoro remoto ad alta banda o da servizi sanitari vicini.","fonti":["https://www.tuttitalia.it/lombardia/32-saviore-dell-adamello/","https://www.mercato-immobiliare.info/lombardia/brescia/saviore-dell-adamello.html","https://www.giornaledibrescia.it/qualita-della-vita/pronto-soccorso-brescia-distanza-yzu54s4n","https://www.giornaledibrescia.it/cronaca/connessione-internet-bresciano-fibra-ottica-due-velocita-nkr5kd00","https://it.wikipedia.org/wiki/Valle_di_Saviore","https://www.bresciaoggi.it/territorio-bresciano/valcamonica/spopolamento-in-valsaviore-la-risposta-e-il-comune-unico-1.9561364"],"_extra":false,"_verifica":null},{"nome":"Ceresole Reale","provincia":"Torino","regione":"Piemonte","lat":45.43235,"lng":7.23506,"altitudine_m":1612,"popolazione":139,"prezzo_mq_min":940,"prezzo_mq_max":1750,"prezzo_nota":"Media richiesta immobiliare.it nov 2025: 1.430 €/mq (-8,2% su nov 2024, picco 1.797 apr 2024); Wikicasa 1.502 €/mq; OMI Agenzia Entrate 940-1.750 €/mq. Il range riportato è OMI (ufficiale); la media annunci è affidabile ma calcolata su un mercato piccolo dominato da seconde case, con forte varianza tra rustici da ristrutturare e ville sul lago (esempio reale: villa 200 mq a 299k€ ≈ 1.500 €/mq).","tempo_auto_torino_min":95,"tempo_auto_milano_min":155,"ospedale_vicino":"PS Ospedale di Cuorgnè (pronto soccorso \"di area disagiata\"), ~40 km lungo la SP460, 50-60 min; DEA completo a Ivrea o Ciriè, oltre 1h15. In emergenza reale in alta valle il riferimento pratico è l'elisoccorso 118.","servizi":"In loco: 2 alimentari (Borgo Capoluogo e Borgata Prese), dispensario farmaceutico (no farmacia piena), ufficio postale aperto 2 giorni/settimana, bancomat (ottenuto dopo lunga battaglia del Comune, nessuna filiale bancaria), benzina self-service, scuola primaria pluriclasse sussidiata (IC Pont Canavese, tra le più piccole d'Italia, a rischio per numeri). Medie e supermercato veri: Locana (~25 km) e Pont Canavese (~34 km) lungo la SP460. Cuorgnè (~40 km) per tutto il resto.","internet":"FTTH Open Fiber disponibile (intervento pubblico aree bianche, offerte attive fino a 2,5 Gbps con Dimensione, Olinko, Arcolink); in alternativa FWA BBBell fino a 100 Mega. Dati AGCOM più vecchi davano 0% FTTH/FTTC, quindi la copertura è recente e va verificata al civico, soprattutto nelle borgate sparse.","vita_annuale":"Onestamente sbilanciato sulle seconde case: 139 residenti anagrafici (in calo, -10 nel solo 2025, zero nascite) ma d'inverno ci vivono non più di ~80 persone, molti anziani. Il turismo però gira tutto l'anno (lago e Nivolet d'estate, fondo/cascate di ghiaccio/ciaspole d'inverno), gli hotel fanno il pieno nelle festività e il paese ha una comunità piccola ma combattiva (petizione per portare qui la sede del Parco Gran Paradiso, scuola tenuta aperta con le unghie).","sci":"In loco: ski area Chiapili di Sotto (skilift + tapis roulant, 2 piste facili, innevamento programmato), sci di fondo con 4 anelli dalla Casa del Fondo di Lilla lungo il lago, pista di pattinaggio e palestra di cascate di ghiaccio (~30 vie, gratuite). Per lo sci alpino vero serve spostarsi (Pila/Aosta o valli di Lanzo, >1h).","acqua":"Lago di Ceresole (artificiale, balneabile, formato dal fiume Orco con diga AEM del 1925-31) + torrente Orco; altre due dighe a monte (Serrù, Agnel) verso il Nivolet.","esposizione":"Conca aperta a ~1.600 m con valle orientata est-ovest: il capoluogo e le borgate Pian della Balma e Villa stanno sul lato solatio (adret, esposto a sud) e il lago è ben illuminato nelle ore centrali anche d'inverno; il versante opposto (sponda destra, lariceto) è in ombra. Ore di sole invernali ridotte ma senza i casi estremi della bassa valle (Fornolosa di Locana resta 4 mesi senza sole, Ceresole no) — dato quantitativo non trovato, stima da resoconti escursionistici.","pro":["Prezzi in fascia target e in calo (-8% anno su anno): media richiesta 1.430 €/mq, OMI da 940 €/mq","Dentro il Parco Nazionale Gran Paradiso, con lago balneabile: contesto naturale di prima fascia e turismo che gira tutto l'anno","FTTH Open Fiber fino a 2,5 Gbps già commercializzata — raro a 1.600 m","Torino raggiungibile in ~1h30 su SP460 aperta tutto l'anno, senza passi da valicare","Comunità piccola ma attiva contro lo spopolamento (scuola primaria ancora aperta, bancomat, eventi, bando regionale Resto in Montagna per chi compra e ristruttura)"],"contro":["Demografia in caduta: 139 residenti (~80 effettivi d'inverno), zero nascite nel 2025 — il rischio di restare tra sole seconde case chiuse è concreto","Servizi minimi: niente supermercato né farmacia piena né banca; poste solo 2 giorni/settimana; per tutto serve auto (Locana 25 km, Cuorgnè 40 km)","Sanità lontana: PS di area disagiata a 50-60 min, DEA a oltre 1h15","Inverni lunghi e severi a 1.600 m; la SP460 alta valle è esposta a neve e storicamente a chiusure per valanghe","Sci alpino in loco solo per principianti (uno skilift); Milano è a 2h30 abbondanti"],"score_infrastrutture":4,"score_prezzo":8,"score_vivibilita":5,"score_complessivo":6,"descrizione":"Ceresole Reale è la scommessa \"wilderness\" della lista: 1.612 m nel cuore del Parco Nazionale Gran Paradiso, sulle sponde di un lago alpino balneabile, con prezzi in fascia perfetta (media 1.430 €/mq, OMI da 940) e — sorpresa — la fibra FTTH a 2,5 Giga già attivabile. Il rovescio della medaglia è demografico: 139 residenti che d'inverno scendono a ottanta, servizi ridotti all'osso (alimentari, dispensario, poste bisettimanali) e pronto soccorso a un'ora di strada. Funziona per chi lavora da remoto, ama la montagna vera tutto l'anno (fondo, ghiaccio, ciaspole d'inverno; Nivolet d'estate) e accetta di organizzarsi con l'auto per tutto; non funziona per chi cerca un paese con vita di piazza a gennaio. Torino a 1h30 rende fattibile il compromesso, Milano a 2h30 molto meno.","fonti":["https://www.immobiliare.it/mercato-immobiliare/piemonte/ceresole-reale/","https://www.tuttitalia.it/piemonte/82-ceresole-reale/","https://comune.ceresolereale.to.it/luoghi/2834028/municipio-ceresole-reale","https://www.bbbell.it/verifica-copertura-fibra-bandalarga-ceresole-reale/","https://www.famigliacristiana.it/articolo/a-sanremo-la-scuola-piu-piccola-d-italia.aspx","https://www.percorsokm.it/it-it/percorso-da-Milano-a-Ceresole_Reale"],"_extra":true,"_verifica":null},{"nome":"Champorcher","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.62423,"lng":7.62067,"altitudine_m":1427,"popolazione":368,"prezzo_mq_min":1113,"prezzo_mq_max":1262,"prezzo_nota":"RealAdvisor marzo 2025: media case 1.113 €/mq, appartamenti 1.262 €/mq (trend -1,5% su 12 mesi) — media stimata da modello, non dato ufficiale. Quotazioni per zona (Requot/OMI): 920 €/mq zona residuale montana → 1.950 €/mq capoluogo e frazioni. Annunci reali su idealista/immobiliare.it molto dispersi: rustici da ~340 €/mq, case >40mq media zona 1.234 €/mq, ~45 annunci attivi da 25.000 €. Il range 1.100-1.260 è affidabile per abitazioni abitabili nel capoluogo; da ristrutturare si scende sotto 600 €/mq.","tempo_auto_torino_min":95,"tempo_auto_milano_min":130,"ospedale_vicino":"PS/DEA Ospedale di Ivrea ~50-55 min (A5 da Pont-Saint-Martin); Ospedale regionale Parini di Aosta ~60 min. In Valle d'Aosta il riferimento è Aosta; Ivrea (Piemonte) è il più rapido in emergenza. Nessun PS a Pont-Saint-Martin, solo presidi territoriali AUSL (uno anche a Champorcher, Via Roma 129/A). Stima tempi da distanze stradali.","servizi":"In loco: minimarket alimentari storico (Gabry, fraz. Chardonney), farmacia Sant'Anna (loc. Castello, aperta tutto l'anno), scuola materna ed elementare (Via Zambarelli), ufficio postale, municipio. Niente banca né supermercato vero: sportelli bancari, medie/superiori e GDO a Hône/Pont-Saint-Martin (~25-30 min a valle).","internet":"FTTH Open Fiber (piano aree bianche) attivabile: operatori come Dimensione vendono fibra fino a 2,5 Gbit a Champorcher. Copertura probabilmente non uniforme su tutte le frazioni (alcuni comparatori risultano non aggiornati): verifica puntuale del civico su bandaultralarga.italia.it consigliata prima dell'acquisto.","vita_annuale":"Comune piccolissimo (~370 residenti) con forte quota di seconde case: il mercato immobiliare è esplicitamente orientato alla casa vacanze. Però il paese mantiene un nucleo vivo tutto l'anno: scuola elementare, farmacia sempre aperta, alimentari, poste, e un'amministrazione premiata nel 2025 come \"comune più virtoso d'Italia\" per le politiche anti-spopolamento (recupero edilizio invece di nuove costruzioni). Fuori stagione è molto quieto ma non morto; la vita sociale vera è a fondovalle (Hône, Pont-Saint-Martin).","sci":"Stazione propria Champorcher (circuito Monterosa Ski): 12 km di piste (4 blu, 8 rosse, 3 nere) da 1.408 a 2.500 m, telecabina Chardonney-Laris + 2 seggiovie; stagione 2025/26 dal 6 dicembre al 6 aprile; nuovo bacino innevamento a Laris (16.000 mc, 76 aste). Skipass giornaliero 27-34 €. Comprensori maggiori (Gressoney/Monterosa) a ~45-60 min.","acqua":"Torrente Ayasse, che nasce dal lago Miserin (2.580 m) e percorre tutta la valle attraversando il paese; numerosi laghi alpini nel Parco Mont Avic (Miserin, Nero, Vercoche).","esposizione":"Valle orientata est-ovest: il capoluogo e le frazioni storiche (Rosier, Grand Mont Blanc, Castello) sorgono sul versante adret (solatio, sinistra orografica dell'Ayasse) e prendono sole anche nei mesi invernali più freddi; il versante envers opposto è boscoso e in ombra. Esposizione tra le migliori della bassa Valle d'Aosta per un paese sopra i 1.400 m.","pro":["Prezzi tra i più bassi della Valle d'Aosta sopra i 1200 m (~1.100-1.260 €/mq, trend stabile/lieve calo)","Versante adret soleggiato anche in pieno inverno + torrente Ayasse e Parco Mont Avic alle spalle","Servizi essenziali veri in loco: scuola elementare, farmacia annuale, alimentari, poste, sci con telecabina a 5 minuti","FTTH Open Fiber attivabile fino a 2,5 Gbit — raro a questa quota","Casello A5 Pont-Saint-Martin a ~25-30 min: Torino in ~1h35, Milano in ~2h10, più welfare regionale valdostano di alto livello"],"contro":["Solo ~370 residenti: vita sociale invernale ridottissima, dominanza di seconde case chiuse fuori stagione","Niente banca, supermercato vero, scuole medie o medico h24: tutto a 25-30 min di tornanti a fondovalle","Pronto soccorso a 50-60 min (Ivrea o Aosta) — critico per anziani o patologie croniche","18 km di strada di montagna come unico accesso, con neve/gelo invernali (catene o gomme termiche obbligatorie)","Stazione sci piccola ed economicamente fragile (apertura impianti a singhiozzo a inizio stagione), mercato immobiliare poco liquido per rivendere"],"score_infrastrutture":6,"score_prezzo":9,"score_vivibilita":6,"score_complessivo":7,"descrizione":"Champorcher è il capoluogo dell'ultima valle laterale sud-orientale della Valle d'Aosta: 1.427 m di quota, versante solatio con sole anche in pieno inverno, il torrente Ayasse che scende dal lago Miserin e il Parco del Mont Avic come giardino di casa. È il posto giusto per chi cerca la montagna vera a prezzi da pianura padana (1.100-1.260 €/mq per l'abitabile, molto meno per il da ristrutturare), con un pacchetto sorprendente per 370 abitanti: scuola elementare, farmacia aperta tutto l'anno, alimentari, poste, fibra FTTH e una telecabina che porta a 2.500 m. Il rovescio della medaglia è la scala: fuori stagione il paese è silenzioso e dominato dalle seconde case, ogni servizio non essenziale richiede 25-30 minuti di tornanti fino a Hône/Pont-Saint-Martin, e il pronto soccorso più vicino (Ivrea o Aosta) è a quasi un'ora. Ideale per smart worker autonomi e amanti della quiete; meno adatto a famiglie con figli alle medie o a chi ha bisogno di sanità a portata di mano.","fonti":["https://www.tuttitalia.it/valle-d-aosta/21-champorcher/","https://realadvisor.it/it/mercato-immobiliare/comune-champorcher-it","https://www.requot.com/valutazione-immobili/Champorcher.html","https://www.dimensione.com/portale/fibra-internet-casa-ftth-2.5-giga-a-champorcher-ao-7018.php","https://www.valledichamporcher.it/arrivare/come-raggiungerla/","https://www.aufildeleau.vda.it/rosier-tra-luce-e-ombra/"],"_extra":true,"_verifica":null},{"nome":"Valfurva","provincia":"Sondrio","regione":"Lombardia","lat":46.4625,"lng":10.41167,"altitudine_m":1339,"popolazione":2431,"prezzo_mq_min":1800,"prezzo_mq_max":4100,"prezzo_nota":"Range dedotto da più fonti 2025-26, non media ufficiale unica: RealAdvisor indica media comunale 1.773 €/mq (stabile su 12 mesi, +4,7% appartamenti); dati OMI Agenzia Entrate zona B1 (S. Antonio, S. Nicolò, Uzza) 1.990-2.415 €/mq; prezzi richiesti annunci idealista 2026: ~3.125 €/mq a S. Antonio e ~4.130 €/mq a Santa Caterina (fronte piste). Solo ~25-35 annunci attivi sul comune: i valori di zona su idealista sono medie da pochi annunci. Pagina mercato-immobiliare di immobiliare.it non accessibile (403). In sintesi: frazioni basse 1.800-2.400 €/mq realistici, Santa Caterina 3.000-4.100+.","tempo_auto_torino_min":265,"tempo_auto_milano_min":190,"ospedale_vicino":"Ospedale Eugenio Morelli di Sondalo (PS attivo H24, ospedale grande con rianimazione, cardiologia, ortopedia): ~25 km, 30-35 min da S. Antonio via Bormio-Le Prese. A Bormio (3 km) c'è il PreSST per esigenze non urgenti. PS di Sondalo con criticità di organico segnalate dai sindaci negli anni scorsi.","servizi":"Servizi concentrati sull'asse S. Nicolò-S. Antonio: alimentari/minimarket, farmacia (Farmacia Valfurva, S. Antonio), scuola primaria a S. Antonio (Scuola in Chiaro), ufficio postale, sportello bancario, edicola, biblioteca, palazzetto dello sport, museo vallivo e centro visitatori Parco dello Stelvio. Scuole medie superiori e supermercati grandi a Bormio (3-5 km). Municipio a S. Nicolò (Piazza Frodaglio 3).","internet":"Copertura banda ultralarga ≥100 Mbps dichiarata al 100% delle unità immobiliari (dati MISE via ComparaSemplice, rilevazione gen 2023), prevalentemente FTTC TIM/RF COM (velocità reale dipende dalla distanza dall'armadio, critica nelle frazioni alte); comune in area bianca Open Fiber con FTTH in roll-out/commercializzazione da verificare al civico su openfiber.it o bandaultralarga.italia.it; FWA fino a 100 Mbps come alternativa. Nessuna conferma puntuale FTTH attiva a Santa Caterina.","vita_annuale":"Comune vero che vive tutto l'anno nelle frazioni basse (Uzza, S. Nicolò, S. Antonio, ~1.300 m): 2.431 residenti, scuola, farmacia, negozi, vita comunitaria, economia mista turismo-allevamento. Santa Caterina (1.738 m) è invece un resort con solo ~200-250 residenti annuali, dominato da seconde case e hotel, molto tranquillo nelle mezze stagioni (nov, mag-giu). Calo demografico lento ma costante: -300 abitanti dal 2006.","sci":"Skiarea Santa Caterina Valfurva nel comune stesso: ~35 km di piste tra 1.738 e 2.880 m, cabinovia 8 posti, pista mondiale Deborah Compagnoni illuminata (notturne), 15 km di fondo; esposizione nord = neve conservata. Bormio Skipass unico con Bormio e Cima Piazzi-San Colombano: 115 km totali, skibus gratuito. Stagione 2025-26: 5 dic-12 apr. Scialpinismo di alto livello (Forni, Gavia, Cevedale).","acqua":"Torrente Frodolfo, che nasce dal ghiacciaio dei Forni, attraversa tutta la valle e confluisce nell'Adda sotto Bormio; affluenti Gavia (a S. Caterina) e Zebrù. Laghi alpini escursionistici in quota (nessun lago nel fondovalle).","esposizione":"Valle orientata circa est-ovest: il versante orografico sinistro (esposto a sud, adret) è soleggiato fin dal mattino anche d'inverno ed è quello dei sentieri invernali; la skiarea è sul versante esposto a nord (ubac), scelto apposta per conservare la neve. Le frazioni di fondovalle, incassate tra cime oltre i 3.000 m, hanno ore di sole invernali limitate; Santa Caterina è nota per il microclima molto freddo (minime fino a -25/-30 °C). S. Antonio e S. Nicolò, più bassi e in conca più aperta verso Bormio, sono meglio esposti.","pro":["Comune autentico con vita tutto l'anno nelle frazioni basse: scuola, farmacia, negozi, banca, poste, 2.400 residenti","Skiarea in casa (S. Caterina) + Bormio Skipass 115 km e terme di Bormio a 3-5 km","Cuore del Parco Nazionale dello Stelvio: Forni, Zebrù, Gavia — paradiso per alpinismo, scialpinismo, bici","Prezzi nelle frazioni basse (1.800-2.400 euro/mq) molto piu' bassi di Bormio e Livigno","Copertura internet >=100 Mbps dichiarata al 100% e ospedale vero (Morelli di Sondalo) a mezz'ora"],"contro":["Lontananza reale: 3h+ da Milano, 4h+ da Torino, treno più vicino a Tirano (40 km), SS38 unica arteria congestionata nei weekend invernali","Inverni lunghi e rigidi (a S. Caterina fino a -30 °C), fondovalle con poche ore di sole d'inverno, nevicate che complicano la mobilità","Calo demografico costante (-300 abitanti dal 2006) e servizi superiori (scuole superiori, specialisti) solo a Bormio/Sondalo o a Sondrio (65 km)","PS di Sondalo con criticità di organico ricorrenti; per emergenze gravi si dipende dall'elisoccorso","Santa Caterina fuori stagione è quasi vuota (200 residenti): comprare lì significa vivere in un resort stagionale"],"score_infrastrutture":6,"score_prezzo":7,"score_vivibilita":7,"score_complessivo":7,"descrizione":"Valfurva è un comune sparso di 2.400 abitanti a 1.339 m nel cuore del Parco dello Stelvio, a 10 minuti da Bormio: le frazioni basse (Uzza, S. Nicolò, S. Antonio) sono paesi veri che vivono tutto l'anno con scuola, farmacia, negozi e una comunità radicata, mentre Santa Caterina (1.738 m) è la perla sciistica ma quasi vuota fuori stagione. Per chi cerca montagna vera sopra i 1.200 m con prezzi ancora umani (1.800-2.400 euro/mq nelle frazioni basse, contro i 4.000+ di S. Caterina e Bormio) è una delle opzioni più solide dell'Alta Valtellina. Il prezzo da pagare è la distanza: oltre 3 ore da Milano su una SS38 intasata nei weekend, inverni lunghi e freddi con sole scarso nel fondovalle. Ideale per smart worker amanti di sci e alpinismo che gravitano su Bormio; sconsigliato a chi deve pendolare o teme l'isolamento invernale.","fonti":["https://www.tuttitalia.it/lombardia/51-valfurva/","https://realadvisor.it/it/mercato-immobiliare/23030-valfurva","https://www.idealista.it/vendita-case/valfurva-sondrio/","https://www.comparasemplice.it/verifica-copertura-adsl/valfurva","https://www.asst-val.it/en/pronto-soccorso1","https://santacaterina.it/en/the-resort/history-and-art-in-valfurva/"],"_extra":false,"_verifica":null}],"sintesi":{"analisi":"La ricerca conferma senza ambiguità il nodo di fondo: tra i comuni oltre i 1.200 m di Piemonte, Valle d'Aosta e Lombardia, prezzo accessibile e buoni servizi tirano in direzioni opposte. I 30 comuni si dispongono lungo una diagonale netta. In basso, le valli occitane del cuneese (Bellino, Elva, Celle di Macra, Casteldelfino, Acceglio) e la Val Saviore bresciana stanno sotto i 900 €/mq, ma pagano il prezzo in isolamento: strade a fondovalle, pronto soccorso lontano, paesi semivuoti fuori stagione. In alto, le grandi stazioni sciistiche — Courmayeur, Livigno, Cogne, Valtournenche, Bormio — offrono servizi da città e vita tutto l'anno, ma viaggiano tra i 4.500 e gli 8.500 €/mq, da quattro a otto volte il target di 1.000 €/mq.\n\nIl valore vero della ricerca sta nella fascia centrale, dove si trovano i compromessi. Tre comuni emersi come nuove scoperte — Champorcher e Usseaux, e in seconda battuta Ceresole Reale — si collocano proprio sul target di prezzo (1.100-1.350 €/mq) mantenendo servizi di base decenti e ottima raggiungibilità sia da Torino sia da Milano. Poco sopra, Etroubles e Brusson (in Valle d'Aosta) alzano il livello dei servizi restando sotto i 2.400 €/mq.\n\nL'indicazione operativa è chiara: se il vincolo dei 1.000 €/mq è rigido, la scelta più sensata non è più solo Saviore dell'Adamello (isolata e lontanissima da entrambe le città), ma Champorcher o Usseaux, che offrono lo stesso prezzo con accesso molto migliore. Se si può salire a 1.700-2.400 €/mq, Etroubles e Brusson aprono opzioni con servizi solidi. Se invece contano vita tutto l'anno e infrastrutture complete, Bardonecchia resta imbattibile — treno, ospedale vicino, paese vivo — ma va messo in conto un budget da 1.650 a oltre 5.000 €/mq.","top_pick_prezzo":"Ostana — attorno ai 1.000 €/mq con l'esposizione solare più celebre della lista (il balcone sul Monviso) e punteggio complessivo 7; per lo stesso prezzo ma con più servizi e accesso, guarda anche Champorcher e Usseaux.","top_pick_vivibilita":"Bardonecchia — l'unico che vive davvero tutto l'anno: stazione ferroviaria propria, ~2.850 residenti, ospedale a 30 min, scuole e commercio attivo. Il prezzo (1.650-5.100 €/mq) è il rovescio della medaglia.","top_pick_compromesso":"Champorcher — nuova scoperta che centra il target di prezzo (~1.200 €/mq) tenendo servizi di base, buona esposizione e la migliore raggiungibilità combinata da Torino (95 min) e Milano (130 min); batte Saviore dell'Adamello proprio sull'accessibilità.","insight":["Il target di 1.000 €/mq sopra i 1.200 m esiste quasi solo nelle valli occitane del cuneese e in Val Saviore: ovunque altrove è una stazione sciistica e costa 3-8 volte tanto.","Le tre nuove scoperte (Champorcher, Usseaux, Ceresole Reale) valgono la ricerca: stanno sul target di prezzo con servizi e accesso migliori dei borghi occitani a pari costo.","La connettività non è più un problema di quota: Sestriere ha FTTH fino a 2,5 Gbit/s a 2.035 m. Il collo di bottiglia sono le frazioni, non i comuni.","Milano e Torino non premiano gli stessi comuni: la Val Camonica e l'alta Valtellina (Bormio, Ponte di Legno, Livigno) sono comode da Milano ma lontanissime da Torino, e viceversa per le valli cuneesi.","Il pronto soccorso è il vincolo silenzioso: molti comuni economici hanno l'ospedale a 40+ minuti su strada di montagna, un fattore da pesare più del prezzo se ci si vive stabilmente.","Attenzione al dato Ostana: le fonti divergono enormemente (348 €/mq nel 2018, ~1.700 €/mq oggi su idealista) perché il campione di annunci è minimo; il prezzo reale va verificato sul posto."]},"extra_trovati":["Usseaux","Ceresole Reale","Champorcher"]};

// ---------- Fasce prezzo (ordinal, un solo hue, chiaro=economico) ----------
const FASCE = [
  {max:1000,  c:'#86b6ef', label:'≤ 1.000 €/m²'},
  {max:1800,  c:'#3987e5', label:'1.000–1.800 €/m²'},
  {max:3000,  c:'#256abf', label:'1.800–3.000 €/m²'},
  {max:5000,  c:'#184f95', label:'3.000–5.000 €/m²'},
  {max:1e9,   c:'#0d366b', label:'> 5.000 €/m²'},
];
const eur = n => n==null ? '—' : Math.round(n).toLocaleString('it-IT');
const med = c => (c.prezzo_mq_min + c.prezzo_mq_max)/2;
const fascia = c => FASCE.find(f => med(c) <= f.max);
const hhmm = m => m==null ? '—' : (m<60 ? m+' min' : Math.floor(m/60)+'h'+String(Math.round(m%60)).padStart(2,'0'));

const comuni = DATA.schede.map((c,i)=>({...c, id:i}));
const S = { regioni:new Set(), prezzoMax:11000, vivMin:1, sort:'score', sel:null };

// ---------- Stat tiles ----------
(function(){
  const meds = comuni.map(med).sort((a,b)=>a-b);
  const mediana = meds[Math.floor(meds.length/2)];
  const cheapest = comuni.reduce((a,b)=>med(a)<med(b)?a:b);
  const t = document.getElementById('tiles');
  t.innerHTML = [
    {v:comuni.length, l:'comuni'},
    {v:eur(cheapest.prezzo_mq_min)+'€', l:'prezzo min /m²'},
    {v:eur(mediana)+'€', l:'mediana /m²'},
    {v:Math.max(...comuni.map(c=>c.altitudine_m)).toLocaleString('it-IT')+'m', l:'quota max'},
  ].map(x=>`<div class="tile"><div class="v">${x.v}</div><div class="l">${x.l}</div></div>`).join('');
})();

// ---------- Mappa ----------
const map = L.map('map',{zoomControl:true}).setView([45.6,7.9],8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>', maxZoom:18
}).addTo(map);

const markers = {};
comuni.forEach(c=>{
  const f = fascia(c);
  const icon = L.divIcon({className:'', html:`<div class="cmarker" style="width:100%;height:100%;background:${f.c}"></div>`, iconSize:[16,16], iconAnchor:[8,8]});
  const m = L.marker([c.lat,c.lng],{icon}).addTo(map);
  m.bindTooltip(`<div class="tn">${c.nome}</div><div class="tp">${eur(c.prezzo_mq_min)}–${eur(c.prezzo_mq_max)} €/m² · ${c.altitudine_m} m</div>`,{className:'ctip',direction:'top',offset:[0,-10]});
  m.on('click',()=>openDetail(c.id,true));
  markers[c.id]=m;
});

// legenda
document.getElementById('legend').innerHTML = '<div class="lt">Prezzo €/m² (mediana)</div>' +
  FASCE.map(f=>`<div class="li"><span class="sw" style="background:${f.c}"></span>${f.label}</div>`).join('');

// ---------- Filtri ----------
const regioni = [...new Set(comuni.map(c=>c.regione))];
const chipbox = document.getElementById('chips-regione');
regioni.forEach(r=>{
  const b=document.createElement('button'); b.className='chip on'; b.textContent=r;
  S.regioni.add(r);
  b.onclick=()=>{ if(S.regioni.has(r)&&S.regioni.size>1){S.regioni.delete(r);b.classList.remove('on')} else {S.regioni.add(r);b.classList.add('on')} render(); };
  chipbox.appendChild(b);
});
const fp=document.getElementById('f-prezzo'), fpv=document.getElementById('f-prezzo-v');
const fv=document.getElementById('f-viv'), fvv=document.getElementById('f-viv-v');
const fs=document.getElementById('f-sort');
fp.oninput=()=>{S.prezzoMax=+fp.value; fpv.textContent=(+fp.value>=11000)?'nessuno':eur(fp.value)+' €'; render()};
fv.oninput=()=>{S.vivMin=+fv.value; fvv.textContent=(+fv.value<=1)?'tutti':'≥ '+fv.value; render()};
fs.onchange=()=>{S.sort=fs.value; render()};
fpv.textContent='nessuno'; fvv.textContent='tutti';

function filtered(){
  let out = comuni.filter(c=>S.regioni.has(c.regione) && med(c)<=S.prezzoMax && c.score_vivibilita>=S.vivMin);
  const key={score:c=>-c.score_complessivo, prezzo:med, viv:c=>-c.score_vivibilita, alt:c=>-c.altitudine_m, torino:c=>c.tempo_auto_torino_min, milano:c=>c.tempo_auto_milano_min}[S.sort];
  return out.sort((a,b)=>key(a)-key(b));
}

// ---------- Lista ----------
function render(){
  const list=document.getElementById('list');
  const rows=filtered();
  const ids=new Set(rows.map(c=>c.id));
  comuni.forEach(c=>{ const el=markers[c.id].getElement(); if(el) el.style.opacity = ids.has(c.id)?'1':'0.18'; markers[c.id].setZIndexOffset(ids.has(c.id)?100:0); });
  list.innerHTML = `<div class="count">${rows.length} comuni ${rows.length<comuni.length?`(${comuni.length-rows.length} nascosti dai filtri)`:''}</div>` +
    rows.map(c=>`<div class="card${S.sel===c.id?' sel':''}" data-id="${c.id}">
      <div class="r1"><span class="dot" style="background:${fascia(c).c}"></span><span class="nome">${c.nome}</span><span class="prezzo">${eur(c.prezzo_mq_min)}–${eur(c.prezzo_mq_max)} €</span></div>
      <div class="r2"><span>${c.regione} (${c.provincia})</span><span>${c.altitudine_m} m</span><span>${c.popolazione.toLocaleString('it-IT')} ab.</span>${c._extra?'<span class="xtra">nuova scoperta</span>':''}</div>
      <div class="scorebar"><div class="track"><div class="fill" style="width:${c.score_complessivo*10}%"></div></div><span class="n">${c.score_complessivo}/10</span></div>
    </div>`).join('');
  list.querySelectorAll('.card').forEach(el=>el.onclick=()=>openDetail(+el.dataset.id,false));
}

// ---------- Dettaglio ----------
function openDetail(id, fly){
  const c=comuni.find(x=>x.id===id); if(!c) return;
  S.sel=id;
  showTab('esplora');
  document.getElementById('detail').classList.add('open');
  document.getElementById('d-nome').textContent=c.nome;
  document.getElementById('d-sub').textContent=`${c.regione} (${c.provincia}) · ${c.altitudine_m} m slm · ${c.popolazione.toLocaleString('it-IT')} abitanti`;
  document.getElementById('d-extra').innerHTML=c._extra?'<span class="badge-extra">Nuova scoperta — non era nella ricerca originale</span>':'';
  const f=fascia(c);
  const sc=[['Infrastrutture',c.score_infrastrutture],['Prezzo',c.score_prezzo],['Vivibilità',c.score_vivibilita],['Complessivo',c.score_complessivo]];
  document.getElementById('d-body').innerHTML = `
    <div class="dprice"><span class="big">${eur(c.prezzo_mq_min)}–${eur(c.prezzo_mq_max)}</span><span class="unit">€/m²</span><span class="fascia" style="background:${f.c}">${f.label}</span></div>
    <div class="dnote">${c.prezzo_nota||''}</div>
    <div class="dgrid">
      <div class="dcell"><div class="k">Da Torino</div><div class="v">${hhmm(c.tempo_auto_torino_min)}</div></div>
      <div class="dcell"><div class="k">Da Milano</div><div class="v">${hhmm(c.tempo_auto_milano_min)}</div></div>
    </div>
    <div class="dscores">${sc.map(([k,v])=>`<div class="row"><span class="k">${k}</span><div class="track"><div class="fill" style="width:${v*10}%"></div></div><span class="n">${v}</span></div>`).join('')}</div>
    <div class="dsec"><h3>In breve</h3><p>${c.descrizione}</p></div>
    <div class="dsec"><h3>Pro</h3><ul class="plist pro">${(c.pro||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="dsec"><h3>Contro</h3><ul class="plist contro">${(c.contro||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="dsec"><h3>Ospedale più vicino</h3><p>${c.ospedale_vicino}</p></div>
    <div class="dsec"><h3>Servizi</h3><p>${c.servizi}</p></div>
    <div class="dsec"><h3>Internet</h3><p>${c.internet}</p></div>
    <div class="dsec"><h3>Vita tutto l'anno</h3><p>${c.vita_annuale}</p></div>
    <div class="dsec"><h3>Sci</h3><p>${c.sci}</p></div>
    <div class="dsec"><h3>Acqua</h3><p>${c.acqua}</p></div>
    <div class="dsec"><h3>Esposizione al sole</h3><p>${c.esposizione}</p></div>
    ${c._verifica?`<div class="dsec"><h3>Verifica indipendente</h3><div class="vnote">${c._verifica.coordinate_ok?'✓ coordinate confermate':'⚠ coordinate da ricontrollare'} · ${c._verifica.prezzo_ok?'✓ prezzi plausibili':'⚠ prezzi incerti'}${c._verifica.note?' — '+c._verifica.note:''}</div></div>`:''}
    ${(c.fonti&&c.fonti.length)?`<div class="dsec"><h3>Fonti</h3><div class="fonti">${c.fonti.map(u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`).join('<br>')}</div></div>`:''}
  `;
  render();
  if(fly!==false) map.flyTo([c.lat,c.lng], Math.max(map.getZoom(),11), {duration:.7});
}
document.getElementById('d-back').onclick=()=>{S.sel=null;document.getElementById('detail').classList.remove('open');render()};

// ---------- Tab Analisi ----------
function showTab(t){
  document.getElementById('tab-esplora').classList.toggle('active',t==='esplora');
  document.getElementById('tab-analisi').classList.toggle('active',t==='analisi');
  document.getElementById('analisi').classList.toggle('open',t==='analisi');
  const esp = t==='esplora';
  document.getElementById('filters').style.display=esp?'flex':'none';
  document.getElementById('list').style.display=esp?'block':'none';
  if(t==='analisi'){S.sel=null;document.getElementById('detail').classList.remove('open');render()}
}
document.getElementById('tab-esplora').onclick=()=>showTab('esplora');
document.getElementById('tab-analisi').onclick=()=>showTab('analisi');

(function(){
  const a=DATA.sintesi||{};
  const findByName = n => comuni.find(c=> n && n.toLowerCase().includes(c.nome.toLowerCase()));
  const pick=(k,v)=>{ const c=findByName(v); return `<div class="pick" ${c?`data-id="${c.id}"`:''}><div class="pk">${k}</div><div class="pv">${c?c.nome:(v||'').split('—')[0]}</div><div class="pd">${v||''}</div></div>`; };
  document.getElementById('analisi').innerHTML =
    '<h3>Le scelte migliori</h3>'+
    pick('Miglior prezzo', a.top_pick_prezzo)+
    pick('Migliore per viverci', a.top_pick_vivibilita)+
    pick('Miglior compromesso', a.top_pick_compromesso)+
    '<h3>Il quadro</h3><p>'+(a.analisi||'').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')+'</p>'+
    (a.insight&&a.insight.length?'<h3>Da sapere</h3><ul>'+a.insight.map(x=>`<li>${x}</li>`).join('')+'</ul>':'');
  document.querySelectorAll('.pick[data-id]').forEach(el=>el.onclick=()=>openDetail(+el.dataset.id,true));
})();

// fit bounds iniziale
map.fitBounds(L.latLngBounds(comuni.map(c=>[c.lat,c.lng])).pad(0.08));
render();
</script>
</body>
</html>
