<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Casa in quota — Comuni sopra i 1200m</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
:root{
  --surface-1:#fcfcfb; --page:#f9f9f7;
  --ink-1:#0b0b0b; --ink-2:#52514e; --ink-3:#898781;
  --grid:#e1e0d9; --baseline:#c3c2b7; --ring:rgba(11,11,11,0.10);
  --seq-250:#86b6ef; --seq-400:#3987e5; --seq-500:#256abf; --seq-600:#184f95; --seq-700:#0d366b;
  --accent:#2a78d6; --good:#006300;
  --sidebar-w:400px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink-1);background:var(--page)}
#app{display:flex;height:100%;overflow:hidden}

/* ---------- Sidebar ---------- */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;display:flex;flex-direction:column;background:var(--surface-1);border-right:1px solid var(--grid);z-index:1000;position:relative}
header{padding:18px 20px 12px;border-bottom:1px solid var(--grid)}
header h1{font-size:19px;font-weight:700;letter-spacing:-0.01em}
header p{font-size:12.5px;color:var(--ink-2);margin-top:3px}

.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grid);border-bottom:1px solid var(--grid)}
.tile{background:var(--surface-1);padding:10px 12px}
.tile .v{font-size:19px;font-weight:700;letter-spacing:-0.02em}
.tile .l{font-size:10.5px;color:var(--ink-3);margin-top:1px;text-transform:uppercase;letter-spacing:0.04em}

.tabs{display:flex;border-bottom:1px solid var(--grid)}
.tabs button{flex:1;padding:9px 0;font-size:13px;font-weight:600;color:var(--ink-3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}
.tabs button.active{color:var(--ink-1);border-bottom-color:var(--accent)}
.tabs button:hover{color:var(--ink-1)}

#filters{padding:12px 20px;border-bottom:1px solid var(--grid);display:flex;flex-direction:column;gap:10px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:4px 11px;border-radius:99px;border:1px solid var(--baseline);background:var(--surface-1);color:var(--ink-2);cursor:pointer;font-weight:500}
.chip.on{background:var(--ink-1);color:#fff;border-color:var(--ink-1)}
.frow{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-2)}
.frow label{min-width:110px;font-weight:500}
.frow input[type=range]{flex:1;accent-color:var(--accent)}
.frow .val{min-width:70px;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink-1);font-weight:600}
.frow select{flex:1;padding:4px 6px;font-size:12px;border:1px solid var(--baseline);border-radius:6px;background:var(--surface-1);color:var(--ink-1)}

#list{flex:1;overflow-y:auto;padding:8px 12px 20px}
.count{font-size:11.5px;color:var(--ink-3);padding:6px 8px 8px}
.card{padding:11px 12px;border:1px solid var(--grid);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--surface-1);transition:border-color .12s, box-shadow .12s}
.card:hover{border-color:var(--baseline);box-shadow:0 1px 6px rgba(11,11,11,.06)}
.card.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card .r1{display:flex;align-items:center;gap:8px}
.card .dot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 0 2px var(--surface-1),0 0 0 3px var(--ring);flex:none}
.card .nome{font-weight:650;font-size:14px;flex:1}
.card .prezzo{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.card .r2{display:flex;gap:10px;margin-top:4px;font-size:11.5px;color:var(--ink-2)}
.card .r2 .xtra{color:var(--good);font-weight:600}
.scorebar{display:flex;align-items:center;gap:6px;margin-top:7px}
.scorebar .track{flex:1;height:4px;background:var(--grid);border-radius:2px;overflow:hidden}
.scorebar .fill{height:100%;background:var(--accent);border-radius:2px}
.scorebar .n{font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums;min-width:52px;text-align:right}

/* ---------- Detail panel ---------- */
#detail{position:absolute;inset:0;background:var(--surface-1);z-index:1010;display:none;flex-direction:column}
#detail.open{display:flex}
#detail .dhead{padding:14px 20px 12px;border-bottom:1px solid var(--grid)}
#detail .back{font-size:12.5px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0 0 8px;font-weight:600}
#detail h2{font-size:21px;font-weight:750;letter-spacing:-0.01em}
#detail .sub{font-size:12.5px;color:var(--ink-2);margin-top:2px}
#detail .badge-extra{display:inline-block;font-size:10.5px;font-weight:700;color:var(--good);border:1px solid var(--good);border-radius:99px;padding:1px 8px;margin-top:6px}
#detail .dbody{flex:1;overflow-y:auto;padding:14px 20px 30px}
.dprice{display:flex;align-items:baseline;gap:8px;padding:12px 14px;border:1px solid var(--grid);border-radius:10px;margin-bottom:12px}
.dprice .big{font-size:26px;font-weight:750;letter-spacing:-0.02em}
.dprice .unit{font-size:13px;color:var(--ink-2)}
.dprice .fascia{margin-left:auto;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;color:#fff}
.dnote{font-size:11.5px;color:var(--ink-3);margin:-6px 2px 14px;line-height:1.45}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.dcell{border:1px solid var(--grid);border-radius:10px;padding:9px 11px}
.dcell .k{font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em}
.dcell .v{font-size:14px;font-weight:650;margin-top:2px;font-variant-numeric:tabular-nums}
.dsec{margin-bottom:14px}
.dsec h3{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin-bottom:5px}
.dsec p{font-size:13px;line-height:1.55;color:var(--ink-1)}
.dscores{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.dscores .row{display:flex;align-items:center;gap:10px;font-size:12px}
.dscores .row .k{min-width:105px;color:var(--ink-2)}
.dscores .track{flex:1;height:6px;background:var(--grid);border-radius:3px;overflow:hidden}
.dscores .fill{height:100%;background:var(--accent);border-radius:3px}
.dscores .n{min-width:30px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.plist{list-style:none;font-size:13px;line-height:1.5}
.plist li{padding:3px 0 3px 22px;position:relative}
.plist li::before{position:absolute;left:0;font-weight:800}
.plist.pro li::before{content:"+";color:var(--good)}
.plist.contro li::before{content:"−";color:#d03b3b}
.fonti{font-size:11px;color:var(--ink-3);line-height:1.7;word-break:break-all}
.fonti a{color:var(--ink-3)}
.vnote{font-size:11.5px;color:var(--ink-2);background:var(--page);border:1px solid var(--grid);border-radius:8px;padding:8px 10px;line-height:1.5}

/* ---------- Analisi tab ---------- */
#analisi{flex:1;overflow-y:auto;padding:16px 20px 30px;display:none}
#analisi.open{display:block}
#analisi h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin:16px 0 6px}
#analisi h3:first-child{margin-top:0}
#analisi p{font-size:13.5px;line-height:1.6}
.pick{border:1px solid var(--grid);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.pick:hover{border-color:var(--baseline)}
.pick .pk{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3)}
.pick .pv{font-size:14px;font-weight:700;margin-top:2px;color:var(--accent)}
.pick .pd{font-size:12.5px;color:var(--ink-2);margin-top:2px;line-height:1.45}
#analisi ul{padding-left:18px;font-size:13px;line-height:1.6}
#analisi ul li{margin-bottom:6px}

/* ---------- Map ---------- */
#map{flex:1;height:100%;background:#eef0ee}
.cmarker{border-radius:50%;box-shadow:0 0 0 2px #fff,0 1px 4px rgba(11,11,11,.35);cursor:pointer}
.leaflet-tooltip.ctip{background:var(--ink-1);color:#fff;border:none;border-radius:7px;padding:6px 10px;font-family:inherit;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.leaflet-tooltip.ctip::before{display:none}
.ctip .tn{font-weight:700;font-size:13px}
.ctip .tp{font-size:11.5px;opacity:.85;font-variant-numeric:tabular-nums}

#legend{position:absolute;bottom:22px;right:12px;z-index:1000;background:var(--surface-1);border:1px solid var(--grid);border-radius:10px;padding:10px 13px;box-shadow:0 2px 10px rgba(11,11,11,.08)}
#legend .lt{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);margin-bottom:6px;font-weight:600}
#legend .li{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-2);padding:1.5px 0}
#legend .li .sw{width:10px;height:10px;border-radius:50%;box-shadow:0 0 0 1px var(--ring)}

/* ---------- Mobile ---------- */
#mtoggle{display:none}
@media (max-width:760px){
  #app{flex-direction:column}
  #sidebar{width:100%;min-width:0;height:52%;order:2;border-right:none;border-top:1px solid var(--grid)}
  #map{height:48%;order:1}
  .tiles{grid-template-columns:repeat(4,1fr)}
  #legend{bottom:auto;top:10px;right:10px;padding:7px 10px}
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <header>
      <h1>Casa in quota</h1>
      <p>Comuni sopra i 1200 m — Piemonte · Valle d'Aosta · Lombardia</p>
    </header>
    <div class="tiles" id="tiles"></div>
    <div class="tabs">
      <button id="tab-esplora" class="active">Esplora</button>
      <button id="tab-analisi">Analisi</button>
    </div>
    <div id="filters">
      <div class="chips" id="chips-regione"></div>
      <div class="frow"><label>Prezzo max</label><input type="range" id="f-prezzo" min="600" max="11000" step="100" value="11000"><span class="val" id="f-prezzo-v"></span></div>
      <div class="frow"><label>Vivibilità min</label><input type="range" id="f-viv" min="1" max="10" step="1" value="1"><span class="val" id="f-viv-v"></span></div>
      <div class="frow"><label>Ordina per</label><select id="f-sort">
        <option value="score">Punteggio complessivo</option>
        <option value="prezzo">Prezzo (crescente)</option>
        <option value="viv">Vivibilità</option>
        <option value="alt">Altitudine</option>
        <option value="torino">Vicinanza a Torino</option>
        <option value="milano">Vicinanza a Milano</option>
      </select></div>
    </div>
    <div id="list"></div>
    <div id="analisi"></div>
    <div id="detail">
      <div class="dhead">
        <button class="back" id="d-back">← Torna alla lista</button>
        <h2 id="d-nome"></h2>
        <div class="sub" id="d-sub"></div>
        <div id="d-extra"></div>
      </div>
      <div class="dbody" id="d-body"></div>
    </div>
  </div>
  <div style="flex:1;position:relative">
    <div id="map"></div>
    <div id="legend"></div>
  </div>
</div>

<script>
const DATA = {"schede":[{"nome":"Bardonecchia","provincia":"Torino","regione":"Piemonte","lat":45.07833,"lng":6.70333,"altitudine_m":1312,"popolazione":2853,"prezzo_mq_min":1650,"prezzo_mq_max":5100,"prezzo_nota":"Media ufficiale immobiliare.it: 3.101 €/mq (nov 2024, +2,6% a/a); idealista: 3.089 €/mq (report mar 2026); RealAdvisor 2.935 €/mq (dic 2025). Il range 1.650-5.100 €/mq viene dalle quotazioni per zona (Borsino Immobiliare/OMI 2025): minimo Borgo Vecchio, massimo zone centrali/pregio. Dati robusti (mercato liquido, centinaia di annunci), non dedotti da pochi annunci. Ben sopra il target 1000 €/mq.","tempo_auto_torino_min":80,"tempo_auto_milano_min":150,"ospedale_vicino":"Ospedale di Susa (ASL TO3, Pronto Soccorso, C.so Inghilterra 66), ~40 km via A32, circa 30-35 min. In paese: Centro Traumatologico Olimpico per urgenze traumatologiche e ambulatori; Croce Rossa con ambulanza. DEA di II livello a Torino/Rivoli (~60-70 min).","servizi":"Tutto in loco: oltre 130 negozi nel centro pedonale, supermercati, farmacia, poste, banche, stazione FS (linea Torino-Modane, storicamente anche TGV). Scuole: infanzia, primaria e media in Piazza De Gasperi; superiori a Oulx (Des Ambrois, Formont) a 15 min di treno con abbonamento rimborsato dal Comune.","internet":"FTTH attiva (Open Fiber aree bianche + PNRR/FiberCop): al municipio verificata FTTH fino a 2500 Mbps, oltre a FTTC 200 Mbps e FWA. Copertura in espansione ma disomogenea nelle borgate (dato AGCOM aggregato basso): verificare l'indirizzo esatto su openfiber.it prima dell'acquisto.","vita_annuale":"Vive tutto l'anno: ~2.850 residenti stabili, scuole fino alle medie, treno, uffici comunali, commercio attivo e doppia stagione turistica (sci d'inverno, escursionismo/bike d'estate). Il patrimonio edilizio è però dominato dalle seconde case (mercato affitti orientato allo stagionale, annunci \"no residenza\" frequenti): nei periodi morti (maggio, ottobre-novembre) il paese si svuota sensibilmente pur restando servito.","sci":"Impianti propri: Bardonecchia Ski (Colomion-Campo Smith, Les Arnauds, Melezet, Jafferau), ~100 km di piste fino a 2.800 m, sede snowboard Olimpiadi Torino 2006. Sci ai piedi da Campo Smith; Via Lattea (Sestriere/Sauze) a 20-30 min.","acqua":"Dora di Bardonecchia (torrente, affluente della Dora Riparia) attraversa il paese; confluiscono il torrente di Valle Stretta, il Rio Frejus e altri rii della conca. Nessun lago in paese (laghetti alpini escursionistici in quota).","esposizione":"Il paese sta in una conca ampia e aperta a fondovalle, tra le più soleggiate delle Alpi occidentali (clima relativamente secco). Il versante Jafferau (sinistra orografica) è l'adret esposto a sud, soleggiato tutto il giorno anche d'inverno; il versante Colomion/Melezet è più in ombra. Le frazioni alte esposte a sud (es. Vernets, 1.630 m) godono di microclima molto favorevole. Ore di sole invernali puntuali non pubblicate: stima buona insolazione nel concentrico grazie all'ampiezza della conca.","pro":["Accessibilità eccellente per una località a 1300 m: autostrada A32 e treno diretto per Torino, Frejus per la Francia","Servizi completi in loco tutto l'anno: 130+ negozi, scuole fino alle medie, farmacia, banche, poste, stazione FS","FTTH fino a 2,5 Gbps già attiva nel concentrico — rarità per un comune alpino","Comprensorio sciistico proprio (100 km piste, sci ai piedi) + doppia stagione turistica che tiene vivo il paese","Conca ampia e soleggiata, clima secco, versante adret (Jafferau) con ottima esposizione invernale"],"contro":["Prezzi tripli rispetto al target 1000 €/mq: media ~3.100 €/mq, difficile scendere sotto 1.700-2.000 anche nel Borgo Vecchio","Mercato dominato dalle seconde case: affitti annuali scarsi, paese percettibilmente svuotato a maggio e ottobre-novembre","Niente pronto soccorso in paese: 30-35 min per Susa, oltre un'ora per un DEA di II livello a Torino","Costo della vita sopra la media e traffico A32 pesante nei weekend invernali (tempi anche raddoppiati)","Superiori solo a Oulx e università a Torino: pendolarismo obbligato per famiglie con figli grandi"],"score_infrastrutture":8,"score_prezzo":4,"score_vivibilita":8,"score_complessivo":7,"descrizione":"Bardonecchia è probabilmente il comune sopra i 1200 m più \"facile\" delle Alpi occidentali per viverci davvero: autostrada e treno diretto da Torino, fibra FTTH, scuole, negozi e un comprensorio sciistico che parte dal paese. La conca è ampia e soleggiata e la doppia stagione turistica mantiene commercio e servizi attivi dodici mesi l'anno, anche se le seconde case dominano il patrimonio edilizio e i mesi di spalla sono quieti. Il rovescio della medaglia è il prezzo: con una media di ~3.100 €/mq è una delle località più care del Piemonte montano, tre volte il target di 1000 €/mq. Scelta ideale per chi privilegia infrastrutture e vita di paese ed è disposto a pagarle; chi cerca l'affare deve guardare altrove in valle (es. Salbertrand, Exilles, Chiomonte, però più bassi).","fonti":["https://www.tuttitalia.it/piemonte/84-bardonecchia/","https://www.immobiliare.it/mercato-immobiliare/piemonte/bardonecchia/","https://www.idealista.it/sala-stampa/report-prezzo-immobile/vendita/piemonte/torino-provincia/bardonecchia/","https://borsinoimmobiliare.it/quotazioni-immobiliari/piemonte/torino-provincia/bardonecchia/","https://www.aslto3.piemonte.it/azienda/organizzazione/presidi-e-distretti-aziendali/susa-2/","https://www.ivynet.it/copertura/Piemonte/Torino/Bardonecchia"],"_extra":false,"_verifica":null},{"nome":"Sestriere","provincia":"Torino","regione":"Piemonte","lat":44.95694,"lng":6.87889,"altitudine_m":2035,"popolazione":907,"prezzo_mq_min":1650,"prezzo_mq_max":5200,"prezzo_nota":"Media ufficiale immobiliare.it maggio 2026: 3.672 €/mq richiesti (vs 1.734 media provinciale). Range per zona da annunci e quotazioni OMI 2025: min ~1.650 €/mq frazione Champlas du Col, max ~5.200 €/mq nel capoluogo (zona B1); OMI compravendita 1.345-3.575 €/mq. Wikicasa lug 2025: media 3.373 €/mq (-9% su 2024). Dato affidabile (mercato liquido, molte transazioni), ma è prezzo richiesto, non rogitato.","tempo_auto_torino_min":95,"tempo_auto_milano_min":170,"ospedale_vicino":"Ospedale di Susa (PS, ASL TO3): ~44 km, 40-45 min via SS24/Cesana. Ospedale E. Agnelli di Pinerolo (DEA più attrezzato): ~55 km, 70-75 min lungo la SR23 Val Chisone. In loco solo presidio ASL in Piazza Fraiteve; elisoccorso 118 attivo in quota.","servizi":"In loco: alimentari/market, macellerie e gastronomie, farmacia in centro, ufficio postale, sportelli bancari (sezione servizi amministrativi e bancari su sestriere.it), scuole dell'infanzia/primaria e media in Via Europa. Supermercati grandi e servizi completi a Oulx (~25 min) e Pinerolo (~70 min).","internet":"Copertura eccellente per un comune a 2000 m: FTTH Open Fiber fino a 2,5 Gbit/s disponibile (rivenduta da Dimensione, Arcolink, Olinko ecc.), oltre a FTTC e FWA BBBell. Dati nov 2024: 98% delle unità immobiliari naviga ad almeno 100 Mbps, copertura broadband 100%. Verifica puntuale al civico consigliata per le frazioni.","vita_annuale":"Economia quasi interamente turistica con fortissima stagionalità: ~900 residenti stabili contro decine di migliaia di posti letto in seconde case e alberghi. L'inverno è vivissimo (Via Lattea, Coppa del Mondo); l'estate è tra le migliori delle Alpi occidentali (golf 18 buche più alto d'Europa, MTB Alpi Bike Resort, ritiri sportivi, Sestriere Film Festival, agosto pieno). Le mezze stagioni (maggio-giugno, ottobre-novembre) sono molto spente, con molti esercizi chiusi. Nato come stazione FIAT anni '30: quasi tutto è condominio/residence, poca comunità di paese tradizionale.","sci":"Impianti in loco: Sestriere è il cuore della Via Lattea (~400 km di piste, 70 impianti, con Sauze d'Oulx, Sansicario, Claviere e Montgenèvre), sci ai piedi da gran parte del paese, piste olimpiche Torino 2006 e tappe di Coppa del Mondo. Fondo e scialpinismo in Val Troncea e sull'Assietta.","acqua":"Il colle divide i bacini di Dora Riparia e Chisone: il torrente Chisonetto nasce dalle pendici della Punta Rognosa nel territorio comunale e il Chisone (che nasce in Val Troncea al Monte Barifreddo) scorre sotto Sestriere Borgata. Laghi alpini escursionistici nei dintorni (zona Assietta/Monte Motta); nessun lago nel centro abitato.","esposizione":"Molto favorevole: il capoluogo sorge su un colle aperto (sella di displuvio a 2.035 m), non in fondovalle, quindi riceve sole pieno anche in pieno inverno senza ombra portata dai versanti — è uno dei punti di forza storici della stazione. Borgata è sul versante Val Chisone, Champlas du Col/Janvier guardano la Val Susa; il versante verso Pragelato è classificato soleggiato nelle guide escursionistiche. Ore di sole invernali precise non pubblicate (stima: elevate per un sito alpino).","pro":["Sci di livello mondiale sotto casa: Via Lattea ~400 km di piste, sci ai piedi","Esposizione solare eccellente: paese su un colle aperto, niente ombra invernale di fondovalle","FTTH Open Fiber fino a 2,5 Gbit/s — connettività da città a 2.035 m, ideale per lavoro remoto","Estate viva (golf, MTB, ritiri sportivi, eventi) e clima fresco: vera stagione doppia","Torino raggiungibile in ~1h30 su strada statale sempre aperta, aeroporto di Torino ~1h45"],"contro":["Prezzi alti: media ~3.600-3.700 €/mq (mag 2026), oltre 3,5 volte il target di 1.000 €/mq; sotto 2.000 solo nelle frazioni","Pronto soccorso più vicino a 40-45 min (Susa); DEA completo a Pinerolo oltre 1 ora","Paese di seconde case e residence: nelle mezze stagioni molti esercizi chiudono, comunità residente esigua (~900 ab.)","2.035 m: inverni lunghi e rigidi, gomme/catene obbligatorie, trasferimenti sempre su strada di montagna (no treno; stazione di Oulx a ~25 min)","Urbanistica da stazione turistica anni '30-'80 (torri e condomini), poca identità di borgo alpino tradizionale"],"score_infrastrutture":6,"score_prezzo":3,"score_vivibilita":6,"score_complessivo":5.5,"descrizione":"Sestriere è il comune più alto d'Italia (2.035 m) e una macchina turistica di prim'ordine: sci della Via Lattea sotto casa, estate sportiva vera, fibra FTTH a 2,5 Gbit/s e servizi di base tutti presenti nonostante i ~900 residenti. Il rovescio della medaglia è che si vive dentro una stazione sciistica, non in un paese: seconde case dominanti, mezze stagioni spente, prezzi da località top (media ~3.700 €/mq, ben lontana dai 1.000 target) e pronto soccorso a 40-45 minuti. Ha però un vantaggio raro tra i comuni oltre i 1.200 m: sorge su un colle aperto e soleggiato, senza l'ombra invernale del fondovalle. Adatto a chi lavora da remoto e vive di sport di montagna con budget robusto; sconsigliato a chi cerca comunità di paese e prezzi accessibili.","fonti":["https://www.immobiliare.it/mercato-immobiliare/piemonte/sestriere/","https://www.mercato-immobiliare.info/piemonte/torino/sestriere.html","https://www.tuttitalia.it/piemonte/82-sestriere/","https://www.ivynet.it/copertura/Piemonte/Torino/Sestriere","https://sestriere.it/servizi/servizi-amministrativi/","https://it.wikipedia.org/wiki/Colle_del_Sestriere"],"_extra":false,"_verifica":{"coordinate_ok":true,"prezzo_ok":true,"note":"1) Coordinate confermate: reverse geocoding Nominatim/OSM risolve 44.95694,6.87889 su Sestriere (TO), ~170 m dal nodo centrale OSM del capoluogo (Sestriere Colle); nessun omonimo. 2) Prezzi plausibili: media richiesta ~3.672 €/mq (Immobiliare.it mag 2026), 60% annunci tra 2.735-4.995 €/mq (Mercato-Immobiliare.info), OMI 1.345-3.575 €/mq; il range 1650-5200 come min-max copre coerentemente OMI basso e nuovo di pregio. 3) Altitudine 2035 m confermata: quota ufficiale della casa comunale, comune più alto d'Italia (Wikipedia/Treccani). Nessuna correzione necessaria."}},{"nome":"Ostana","provincia":"Cuneo","regione":"Piemonte","lat":44.6925,"lng":7.18722,"altitudine_m":1250,"popolazione":87,"prezzo_mq_min":300,"prezzo_mq_max":1700,"prezzo_nota":"Mercato micro e molto volatile (8-11 annunci attivi). Immobiliare.it/mercato-immobiliare: media richiesta 616 €/mq a set 2025 (-45% su set 2024, picco 1.606 €/mq feb 2024 — oscillazioni dovute ai pochissimi annunci). Idealista (dic 2025): rustici da ristrutturare ~278 €/mq, case ~1.540 €/mq, ville/baite ristrutturate ~1.686 €/mq. Il range 300-1.700 è dedotto dagli annunci, NON una media ufficiale: rudere in blocco da 60k€, baite ristrutturate vista Monviso oltre 1.500 €/mq.","tempo_auto_torino_min":80,"tempo_auto_milano_min":150,"ospedale_vicino":"Ospedale Civile di Saluzzo (via Spielberg 58), ~30-35 min di auto via Paesana-Revello. ATTENZIONE: il PS di Saluzzo è h12 (8-20); di notte i PS h24 più vicini sono Savigliano (~50 min) o Pinerolo (~50 min).","servizi":"In loco: ufficio postale, asilo/Scuola di O, bar-merenderia, panetteria/forno di comunità, presidio medico e biblioteca nella Casa alpina del welfare, centro benessere, coworking (Lou Pourtoun, coop Viso a Viso). NIENTE supermercato, farmacia, banca né scuole elementari/medie: tutto a Paesana (15 min, fondovalle) o Saluzzo (30-35 min).","internet":"Sorprendentemente buona: FTTH Open Fiber copre ~76% delle famiglie (dati AGCOM 2024 via PrezziOggi), fino a 93% con FWA; operatori attivi Vodafone, Dimensione, BBBell, Egisnet (offerte fino a 2,5-10 Gbps). ~7% delle case scoperto: verifica puntuale per borgata prima dell'acquisto.","vita_annuale":"Caso-scuola nazionale di ripopolamento alpino: da 6 residenti effettivi anni '90 a ~85-87 oggi, età media ~37 anni, prime nascite dopo decenni. La cooperativa di comunità Viso a Viso (2020) garantisce servizi tutto l'anno (merenderia, welfare, coworking, foresteria); reportage 2025 lo descrivono vivace e giovane. Restano però molte seconde case e numeri assoluti minuscoli: fuori stagione la vita sociale ruota attorno a poche decine di persone.","sci":"Nessun impianto proprio: sci alpino a Crissolo-Pian della Regina (~15-20 min, 10 km piste, 1.333-2.400 m, aperto solo weekend/festivi/vacanze) + anello fondo 2,5 km a Pian della Regina. Ostana punta su scialpinismo e ciaspole (Punta Ostanetta 2.300 m, sentiero balcone San Nicolao).","acqua":"Il Po: le sorgenti sono al Pian del Re (Crissolo, comune limitrofo) e il fiume scorre nel fondovalle sotto Ostana; nel territorio comunale solo rii minori. A Lou Pourtoun ha sede Alpstream, centro studi sui fiumi alpini.","esposizione":"Eccellente: borgate sparse sul versante solatio (adret, \"indrit\") della Valle Po, lungo pendio volto a mezzogiorno sotto Punta Ostanetta, con piena vista frontale sul Monviso. Sole anche in pieno inverno — è uno dei punti di forza storici del paese.","pro":["Esposizione sud perfetta (adret) con vista frontale sul Monviso: sole tutto l'inverno","Comunità reale e giovane tutto l'anno: cooperativa Viso a Viso, welfare di borgata, coworking — modello di ripopolamento premiato","Fibra FTTH Open Fiber su ~76% delle case: smart working possibile a 1.250 m","Prezzi bassissimi per baite in pietra recuperate con criteri architettonici di qualità (Borghi più belli d'Italia)","Parco del Monviso: scialpinismo, ciaspole, trekking dalla porta di casa"],"contro":["Zero servizi commerciali in loco: supermercato, farmacia, scuole elementari/medie e banca a Paesana (15 min) o Saluzzo (30-35 min)","PS di Saluzzo solo h12 (8-20): di notte l'ospedale h24 è a ~50 min (Savigliano o Pinerolo)","87 abitanti: vita sociale ridottissima fuori dai weekend, molte seconde case ancora chiuse","Milano è lontana (~2h30) e la strada finale è di montagna, da gestire in inverno","Sci alpino limitato: Crissolo apre solo weekend e vacanze, mercato immobiliare quasi inesistente (difficile rivendere)"],"score_infrastrutture":5,"score_prezzo":9,"score_vivibilita":6,"score_complessivo":7,"descrizione":"Ostana è il caso più celebre di rinascita alpina italiana: borgo occitano a 1.250 m sul versante solatio dell'alta Valle Po, faccia a faccia col Monviso, passato da 6 residenti effettivi a circa 85-87, con età media di 37 anni e una cooperativa di comunità che gestisce welfare, forno, coworking e cultura. Per chi lavora da remoto offre una combinazione rara: fibra FTTH, architettura in pietra recuperata con rigore, sole tutto l'inverno e prezzi ben sotto i 1.000 €/mq per gran parte dell'offerta. Il rovescio della medaglia è l'assenza totale di servizi commerciali (tutto a Paesana o Saluzzo) e un pronto soccorso notturno a quasi un'ora. È una scelta di comunità e di progetto di vita, non di comodità: perfetta per chi vuole partecipare a un esperimento riuscito, dura per chi cerca un paese di montagna \"già pronto\".","fonti":["https://www.immobiliare.it/mercato-immobiliare/piemonte/ostana/","https://www.idealista.it/vendita-case/ostana-cuneo/","https://www.tuttitalia.it/piemonte/64-ostana/","https://ilgiornaledellarchitettura.com/2025/07/29/ri_visitati-ostana-40-anni-di-azioni-virtuose-contro-lo-spopolamento/","https://www.aslcn1.it/ospedali/ospedale-civile-saluzzo/pronto-soccorso-saluzzo","https://www.prezzioggi.com/fibra/ostana"],"_extra":false,"_verifica":null},{"nome":"Sauze d'Oulx","provincia":"Torino","regione":"Piemonte","lat":45.02778,"lng":6.85833,"altitudine_m":1509,"popolazione":1018,"prezzo_mq_min":1700,"prezzo_mq_max":3800,"prezzo_nota":"Media richiesta immobiliare.it nov 2024: 3.386 €/mq (+10% su 2023); Wikicasa lug 2025: 3.362 €/mq; RealAdvisor dic 2025: 3.062 €/mq. Range 1.700-3.800 = quotazioni OMI per zona: min 1.350-1.700 €/mq frazione Jovenceaux (E4), max 3.800 €/mq zona centrale Piazza III Reggimento Alpini-Via Clotes (D2). Dati affidabili (mercato liquido, 100+ annunci attivi su idealista, da 33.000 €), ma la media è gonfiata dal segmento turistico; usato in frazione si trova sotto i 2.000 €/mq.","tempo_auto_torino_min":80,"tempo_auto_milano_min":150,"ospedale_vicino":"Ospedale di Susa (PS, Corso Inghilterra 66) a ~30 km, 30-35 min via A32. In paese Trauma Centre privato a pagamento (Piazza III Rgt. Alpini) e ambulanza della Pubblica Assistenza locale; alternativa oltreconfine Briançon (FR) ~45 min. DEA di II livello a Rivoli/Torino (60-70 min).","servizi":"In loco: 2 supermercati Carrefour Express (Piazza III Rgt. Alpini e Via Clotes), farmacia Tintinelli (Via Monfol), scuola materna e primaria con scuolabus comunale, ufficio postale, biblioteca comunale, ambulatori medici. Medie, superiori, banche complete e stazione FS (Oulx-Cesana, con Frecciarossa/TGV Parigi-Milano) a Oulx, 5 km / 10 min.","internet":"FTTH disponibile (rete Open Fiber, aree bianche): copertura ~75% delle unità immobiliari secondo dati AGCOM 2024, FWA ~92% (Eolo, BBBell), fino a 1 Gbps in centro. FTTC quasi assente. Da verificare per indirizzo: le borgate (Jovenceaux, Bonafous) possono ricadere solo su FWA; ~8% ancora senza banda adeguata.","vita_annuale":"Fortemente turistico: ~1.000 residenti contro migliaia di posti letto in seconde case e hotel. Inverno molto vivo (storica clientela britannica, vita notturna), estate discreta con eventi; nelle mezze stagioni (novembre, maggio) il paese si svuota e molti esercizi chiudono. Esiste però una comunità residente reale: scuola materna+primaria, biblioteca, Pubblica Assistenza volontaria, bonus comunale nuovi nati — più vivo di altre stazioni pure-sci, ma la spesa grossa e i servizi si fanno a Oulx.","sci":"Impianti propri in paese (seggiovie Clotes e Sportinia): Sauze d'Oulx è una delle porte principali della Vialattea, ~400 km di piste con Sestriere, Sansicario, Cesana, Claviere e Montgenèvre. Sede olimpica Torino 2006 (freestyle). Bardonecchia a ~25 min.","acqua":"Nessun corso d'acqua rilevante nel centro: piccoli rii di versante scendono verso la Dora Riparia, che scorre nel fondovalle a Oulx (~5 km). In quota il laghetto Laune verso Sportinia; il Gran Bosco di Salbertrand confina col territorio comunale.","esposizione":"Eccellente: soprannominata \"il balcone delle Alpi\", sorge su un terrazzo naturale esposto a ovest/sud-ovest sulle pendici del monte Genevris, versante adret (solatìo) dell'Alta Val Susa. Le fonti locali rivendicano la migliore esposizione solare della valle e un record di ore di sole invernali; località riparata dai venti. Nessun problema di ombra invernale, a differenza dei paesi di fondovalle.","pro":["Esposizione solare tra le migliori delle Alpi occidentali (adret, il \"balcone delle Alpi\"): sole pieno anche in gennaio","Torino a 1h20 via A32 e stazione TGV/Frecciarossa a Oulx (10 min): raggiungibilità eccezionale per un paese a 1.509 m","Sci sotto casa nel comprensorio Vialattea (400 km) e FTTH Open Fiber fino a 1 Gbps: smart working possibile","Servizi base tutti in loco (2 supermercati, farmacia, scuola primaria, poste) con Oulx a 5 km per tutto il resto","Mercato immobiliare liquido con occasioni sotto i 2.000 €/mq nelle frazioni (Jovenceaux)"],"contro":["Prezzi in centro (3.300-3.800 €/mq) oltre 3 volte il target di 1.000 €/mq, e in crescita (+4-10% annuo)","Economia monocultura-sci con forte stagionalità: mezze stagioni morte, molti esercizi chiusi, dominio di seconde case","Pronto soccorso pubblico a 30-35 min (Susa), criticità per anziani e in caso di neve; ospedale completo a oltre un'ora","Scuole solo fino alla primaria: medie e superiori a Oulx, pendolarismo scolastico inevitabile","Copertura FTTH non totale: nelle borgate spesso solo FWA, da verificare per singolo indirizzo"],"score_infrastrutture":8,"score_prezzo":3,"score_vivibilita":6.5,"score_complessivo":6,"descrizione":"Sauze d'Oulx è il \"balcone delle Alpi\": un paese a 1.509 m su un terrazzo solatìo dell'Alta Val Susa, con una delle migliori esposizioni solari invernali dell'arco alpino occidentale e lo sci della Vialattea che parte dal centro. Per un trasferimento è tra le stazioni alpine meglio collegate d'Italia — A32, Torino a 1h20 e TGV/Frecciarossa a Oulx a 10 minuti — con FTTH in centro e servizi base in loco. Il rovescio: è una località turistica matura, con prezzi medi oltre 3.300 €/mq (ben lontani dal target 1.000), mezze stagioni spente e sanità a mezz'ora. Ha senso per chi lavora da remoto e scia molto, puntando alle frazioni come Jovenceaux dove si compra sotto i 2.000 €/mq; non per chi cerca il borgo economico vivo tutto l'anno.","fonti":["https://www.immobiliare.it/mercato-immobiliare/piemonte/sauze-d-oulx/","https://www.tuttitalia.it/piemonte/71-sauze-d-oulx/","https://realadvisor.it/it/mercato-immobiliare/comune-sauze-d-oulx-it","https://www.idealista.it/news/immobiliare/residenziale/2023/11/24/176802-vivere-a-sauze-d-oulx-quartieri-prezzi-case-pro-e-contro","https://www.prezzioggi.com/fibra/sauze-doulx","https://www.comune.sauzedoulx.to.it/en-us/vivere-il-comune/strutture-sanitarie/ospedale-di-susa-52380-1-ecc4ff13b3d7add70400457caf99e595"],"_extra":false,"_verifica":null},{"nome":"Cesana Torinese","provincia":"Torino","regione":"Piemonte","lat":44.95244,"lng":6.79067,"altitudine_m":1354,"popolazione":893,"prezzo_mq_min":2690,"prezzo_mq_max":4210,"prezzo_nota":"Media ufficiale immobiliare.it luglio 2025: 3.217 €/mq (+20% su lug 2024, picco biennale). Range per zona da osservatori annunci: Bousson/Champlas Seguin ~2.690-2.715 €/mq, San Sicario Alto ~4.005-4.210 €/mq. I valori OMI (compravendite effettive) sono più bassi: 1.250-3.000 €/mq — gli annunci sono gonfiati dall'effetto Olimpiadi 2026. Dato affidabile come ordine di grandezza, mercato in forte crescita.","tempo_auto_torino_min":85,"tempo_auto_milano_min":165,"ospedale_vicino":"PS italiano più vicino: Ospedale di Susa (~40 km, ~40 min via SS24+A32). Briançon (Francia) è a soli ~22 km / 25 min via Monginevro ma la convenzione transfrontaliera è sospesa: nel 2025 il sindaco ha lanciato una petizione per ripristinarla e la Regione si è impegnata in tal senso. Guardia medica in paese (Via Roma 14). Ospedali completi: Rivoli/Torino ~75-90 min.","servizi":"In loco: supermercato (Despar Express + alimentari, anche a Bousson e San Sicario), farmacia Pipino (Via Roma 14), scuola dell'infanzia e primaria (plesso della DD Lambert di Oulx, mensa comunale), ufficio postale (Viale III Alpini 7/d), sportello Intesa Sanpaolo con bancomat (aperto solo giovedì mattina). Medie e superiori a Oulx (10 km, Des Ambrois). Negozi e ristoranti in centro.","internet":"FTTH Open Fiber presente ma copertura parziale (dati AGCOM storici: ~2% FTTH/FTTC, ADSL dominante); espansione in corso con Piano Italia 1 Giga/PNRR, offerte FTTH fino a 2,5 Gbps (Dimensione, BBBell, Fastweb) su parte dei civici. FWA molto diffuso come alternativa (BBBell, Eolo, Fastweb 5G FWA). Verifica puntuale per indirizzo indispensabile, soprattutto nelle frazioni.","vita_annuale":"Fortemente bistagionale: ~890 residenti stabili (~300 famiglie) contro un patrimonio edilizio dominato da seconde case e affitti stagionali. Il centro resta però vivo tutto l'anno con negozi, ristoranti, scuola, farmacia e servizi essenziali attivi; nelle mezze stagioni (maggio, ottobre-novembre) il paese si svuota sensibilmente. Popolazione in lieve calo (1.007 nel 2011 → 893 nel 2026).","sci":"Impianti propri a La Comba: telecabina per San Sicario e seggiovia verso i Monti della Luna (110 km di piste Cesana-Claviere-Monginevro). Comprensorio Via Lattea: ~400 km di piste (Sestriere, Sauze d'Oulx, San Sicario, Claviere, Montgenèvre). Sci ai piedi di fatto da San Sicario Alto; dal capoluogo servono 2-3 km per gli impianti.","acqua":"Alla confluenza dei torrenti Ripa e Piccola Dora, che a Cesana formano la Dora Riparia. Laghi alpini escursionistici nei dintorni (zona Monti della Luna).","esposizione":"Il capoluogo è in conca di fondovalle alla confluenza di due valli, ai piedi del Monte Chaberton (3.130 m): soleggiamento invernale ridotto e clima rigido (zona F, 4.385 gradi giorno — tra i più alti d'Italia); stima: probabile inversione termica e poche ore di sole dirette in dicembre-gennaio. La frazione San Sicario Alto (1.700 m), su versante adret del Fraiteve, è nettamente più soleggiata. Nessuno studio puntuale trovato: valutazione dedotta dalla topografia.","pro":["Comprensorio Via Lattea (400 km) e Montgenèvre a portata di mano, sci e outdoor estivo di altissimo livello","Servizi essenziali tutti presenti in paese: supermercato, farmacia, poste, scuola primaria, guardia medica","Torino raggiungibile in ~1h20 via A32 (uscita Oulx a 10 km), Francia a 10 minuti","Paese vero con centro storico e vita commerciale attiva anche fuori stagione, non solo residence","FTTH in arrivo/parziale con piano PNRR e buone alternative FWA"],"contro":["Prezzi da località turistica (~3.200 €/mq medi, +20% nel 2025): oltre 3 volte il target di 1.000 €/mq","Pronto soccorso italiano a 40 minuti (Susa); Briançon vicinissimo ma convenzione sanitaria sospesa","Inverno molto rigido e conca di fondovalle con poco sole nei mesi più corti (zona climatica F)","Comunità residente piccola (~890 abitanti) e in calo, dominanza di seconde case nelle frazioni","Medie e superiori solo a Oulx, banca aperta un giorno a settimana, fibra da verificare civico per civico"],"score_infrastrutture":6,"score_prezzo":3,"score_vivibilita":6,"score_complessivo":5.5,"descrizione":"Cesana Torinese è un paese vero dell'Alta Val di Susa a 1.354 m, ai piedi dello Chaberton e nel cuore della Via Lattea, con tutti i servizi essenziali in loco e l'autostrada A32 a 10 km. Per chi cerca montagna abitata tutto l'anno funziona: scuola primaria, negozi e farmacia restano aperti, ma la comunità stabile è piccola (~890 abitanti) e il tessuto è dominato dalle seconde case. I due nodi principali sono il prezzo — ~3.200 €/mq medi in forte crescita pre-olimpica, lontanissimo dal target 1.000 €/mq — e la sanità, con il PS italiano a 40 minuti mentre Briançon, a 25 minuti, resta inaccessibile finché non viene ripristinata la convenzione transfrontaliera. Il capoluogo in conca vede poco sole d'inverno; chi cerca luce dovrebbe guardare San Sicario Alto, che però costa ancora di più.","fonti":["https://www.immobiliare.it/mercato-immobiliare/piemonte/cesana-torinese/","https://www.mercato-immobiliare.info/piemonte/torino/cesana-torinese.html","https://www.idealista.it/news/immobiliare/residenziale/2024/01/19/177664-vivere-a-cesana-torinese-migliori-zone-prezzi-case-pro-e-contro","https://www.comune.cesana.to.it/it-it/vivere-il-comune/strutture-sanitarie","https://www.tuttitalia.it/piemonte/49-cesana-torinese/","https://it.wikipedia.org/wiki/Cesana_Torinese"],"_extra":false,"_verifica":null},{"nome":"Pragelato","provincia":"Torino","regione":"Piemonte","lat":45.01435,"lng":6.94158,"altitudine_m":1524,"popolazione":694,"prezzo_mq_min":1580,"prezzo_mq_max":2400,"prezzo_nota":"Media immobiliare.it set 2024: 2.096 €/mq (-3% a/a); Wikicasa ott 2025: 2.167 €/mq (-1% a/a); RealAdvisor lug 2025: case 1.581 €/mq, appartamenti 2.055 €/mq (+2-3% a/a); quotazioni OMI 1.125-2.400 €/mq per zona. Range da medie di portale su mercato con molti annunci (140-270 attivi), quindi affidabilità media-buona; il minimo OMI 1.125 riguarda zone/immobili marginali. Frazioni come Souchères Basses e Ruà più care, ruderi e alloggi datati da 35.000 € totali.","tempo_auto_torino_min":95,"tempo_auto_milano_min":170,"ospedale_vicino":"Ospedale E. Agnelli di Pinerolo (DEA/Pronto Soccorso), ~55-60 min scendendo la Val Chisone (SR23, ~50 km); alternativa PS di Susa ~50-55 min via Sestriere-Oulx (più lungo d'inverno). In loco solo presidio ASL TO3 a La Ruà (prelievi, CUP); per emergenze in alta valle interviene spesso l'elisoccorso.","servizi":"A La Ruà (capoluogo): municipio, scuola primaria (plesso IC Perosa Argentina-Pragelato), ufficio postale (aperto solo lun-mer-ven mattina), farmacia Dei Borghi (aperta tutto l'anno, anche domenica mattina), alimentari, macelleria, tabacchi-ferramenta, bancomat h24 (nessuna filiale: agenzia di riferimento a Oulx). Supermercati veri, scuole medie e superiori a Perosa Argentina/Pinerolo o Oulx. Ufficio turistico aperto tutti i giorni.","internet":"FTTH Open Fiber attiva (fino a 2,5 Gbps) con copertura ~69% delle famiglie (dati AGCOM 2024); con FWA (BBBell e altri) si arriva a ~89%; ~11% delle abitazioni ancora scoperto — tipicamente borgate alte. FTTC/VDSL marginale. Comune incluso nel piano BUL/PNRR aree bianche. Verificare copertura per singola frazione prima dell'acquisto.","vita_annuale":"Comune sparso di 19 borgate con ~694 residenti stabili (in lento calo) e un patrimonio dominato dalle seconde case: 270+ annunci di vendita attivi e mercato affitti in gran parte stagionale/turistico. Il capoluogo La Ruà resta però vivo tutto l'anno: scuola primaria, farmacia sempre aperta, alimentari, tradizioni occitane attive e doppia stagione turistica (sci d'inverno, Val Troncea d'estate). Il Club Med a Pattemouche porta flussi stagionali; nelle mezze stagioni (nov, mag) il paese è molto quieto ma non morto.","sci":"Sci di fondo di primo livello: centro olimpico Torino 2006 a Pattemouche con anelli in Val Troncea. Sci alpino: funivia Pattemouche-Anfiteatro collega al comprensorio Vialattea via Sestriere/Monte Banchetta (400 km di piste); impianto confermato per la stagione 2025-26 ma con storia di aperture discontinue, legate al Club Med. Sestriere in auto a ~15 min (Colle del Sestriere).","acqua":"Torrente Chisone, che attraversa tutto il comune; affluente Chisonetto in Val Troncea (Parco naturale della Val Troncea nel territorio comunale).","esposizione":"L'alta Val Chisone a Pragelato è relativamente aperta e orientata circa NE-SO: le borgate storiche (Allevè — toponimo che richiama il sole —, Traverses, La Ruà) sono costruite sul versante indiritto/adret, con pendii ben soleggiati anche d'inverno. Esposizione buona per una valle alpina a 1.500 m, migliore di molte valli strette; le frazioni sul lato opposto (inverso) e il fondovalle hanno meno ore di sole nei mesi centrali dell'inverno (dato orario preciso non trovato: stima).","pro":["Accesso al comprensorio Vialattea (400 km di piste) e centro fondo olimpico in paese, con Sestriere a 15 minuti","Servizi essenziali presenti nel capoluogo: scuola primaria, farmacia aperta tutto l'anno, poste, alimentari, presidio ASL","FTTH Open Fiber fino a 2,5 Gbps su gran parte del comune — rara a 1.500 m","Ambiente di pregio: Parco Val Troncea, 19 borgate occitane, borgo Alpine Pearls, buona esposizione al sole delle frazioni storiche","Prezzi molto inferiori a Sestriere e alle località alpine blasonate, con ampia offerta (270+ annunci) e margine di trattativa"],"contro":["Prezzi medi ~1.900-2.200 €/mq, circa il doppio del target 1.000 €/mq (solo immobili da ristrutturare o in borgate marginali si avvicinano)","Pronto soccorso (Pinerolo) a quasi un'ora di auto; d'inverno anche di più","Economia dominata dalle seconde case: fuori stagione il paese è molto quieto, pochi residenti (~700) e in calo","Nessuna banca (solo bancomat), poste aperte 3 mattine a settimana, supermercati veri e scuole medie/superiori a valle","Milano a quasi 3 ore; collegamento funivia con Sestriere storicamente discontinuo, dipendente dalle sorti del Club Med"],"score_infrastrutture":6,"score_prezzo":5,"score_vivibilita":6,"score_complessivo":6,"descrizione":"Pragelato è un comune sparso di 19 borgate occitane a 1.524 m nell'alta Val Chisone, sede olimpica del fondo a Torino 2006 e porta d'accesso alla Vialattea via funivia o passando da Sestriere (15 min). Per chi vuole trasferirsi offre un equilibrio raro a questa quota: scuola primaria, farmacia, poste e fibra FTTH nel capoluogo, dentro un paesaggio di pregio con il Parco della Val Troncea. I limiti sono quelli classici della montagna olimpica: prezzi intorno ai 2.000 €/mq gonfiati dalle seconde case, ospedale a un'ora, e un'economia che respira col turismo — d'inverno e d'estate il paese vive, nelle mezze stagioni si spegne parecchio. Buona scelta per smart worker sciatori con budget sopra il target; meno adatta a chi cerca il paese di montagna economico e animato dodici mesi l'anno.","fonti":["https://www.tuttitalia.it/piemonte/54-pragelato/","https://www.immobiliare.it/mercato-immobiliare/piemonte/pragelato/","https://realadvisor.it/it/mercato-immobiliare/comune-pragelato-it","https://www.wikicasa.it/en/real-estate-quotation/pragelato/","https://www.aslto3.piemonte.it/azienda/organizzazione/presidi-e-distretti-aziendali/pinerolo/","https://www.vialattea.it/en/ski-area/pragelato/"],"_extra":false,"_verifica":null},{"nome":"Bellino","provincia":"Cuneo","regione":"Piemonte","lat":44.5793,"lng":7.0187,"altitudine_m":1572,"popolazione":97,"prezzo_mq_min":339,"prezzo_mq_max":440,"prezzo_nota":"Media ufficiale immobiliare.it/mercato-immobiliare: 376 €/mq ad aprile 2026 (+6,5% su apr 2025); min 339 €/mq (mar 2026), max ~439 €/mq (giu 2024). Attenzione: mercato micro (9 annunci su immobiliare.it, 6 su idealista, baite/meire da 15-19k€ da ristrutturare nelle borgate), quindi la media è poco robusta e il prezzo reale dipende moltissimo dallo stato dell'immobile — abitabile e ristrutturato può superare gli 800-1000 €/mq (stima da annunci).","tempo_auto_torino_min":115,"tempo_auto_milano_min":185,"ospedale_vicino":"Pronto Soccorso Ospedale Civile di Saluzzo (~50 km, ~55 min) ma ATTENZIONE: è un PS h12, aperto solo 8-20. Il DEA 24h più vicino è l'Ospedale SS. Annunziata di Savigliano (~65 km, ~70 min). Di notte in emergenza: 112/118 ed eventuale elisoccorso. Minimarket/primo presidio a Casteldelfino (10 min), Casa della Comunità a Verzuolo.","servizi":"In loco praticamente nulla: municipio (borgata Pleyne), rifugio Melezè e qualche agriturismo/B&B stagionale. Minimarket con punto ristoro a Casteldelfino (7 km, ~10 min). Farmacia, alimentari, scuole (infanzia/elementari/medie), poste e banca a Sampeyre (~16 km, 20-25 min), centro di riferimento dell'alta valle. Spesa grande e servizi completi a Saluzzo (~50 km).","internet":"Sorprendentemente buona: FTTH Open Fiber (piano BUL aree bianche) attivabile fino a 2,5 Gbps tramite operatori come Dimensione, Olinko e altri; in alternativa FWA BBBell (fino a 100 Mbps) per le case sparse non raggiunte dalla fibra. Verificare copertura alla singola borgata prima dell'acquisto (le borgate alte potrebbero essere solo FWA).","vita_annuale":"Comune in forte spopolamento storico: 97 residenti (feb 2026) distribuiti su 9+ borgate, economia storicamente di allevamento e oggi orientata a turismo di seconde case e piccola ricettività. Fuori stagione il paese è molto silenzioso: la maggior parte delle case è chiusa, i residenti effettivi in inverno sono poche decine. Vita sociale e servizi gravitano su Sampeyre e Casteldelfino. Comunità occitana piccola ma con identità forte (meridiane, Museo del Tempo, feste tradizionali).","sci":"Nessun impianto di discesa attivo in paese (lo skilift di Borgata Chiesa è chiuso da anni). In loco: fondo d'alta quota a Sant'Anna/pianoro Melezè (11 km di anelli a 1800-2000 m), scialpinismo eccellente (Rocca La Marchisa, Fiutrusa) e 5 cascate di ghiaccio a Celle. Discesa a Pontechianale (~20 min) e Sampeyre (~25 min).","acqua":"Torrente Varaita di Bellino, che percorre tutto il vallone e a Casteldelfino si unisce alla Varaita di Chianale formando il Varaita (affluente del Po). Lago artificiale di Pontechianale a ~20 min.","esposizione":"Il vallone di Bellino corre circa est-ovest e le borgate storiche sono costruite sul versante adret (\"adrèch\", solatio): esposizione sud con ampi pascoli prativi e buona insolazione anche invernale — non a caso Bellino è il paese delle meridiane. Il versante opposto (ubac) è boscoso e in ombra. A 1500-1900 m gli inverni restano comunque lunghi e nevosi.","pro":["Prezzi bassissimi: media 376 €/mq, baite da 15-19k€ — tra i più economici delle Alpi occidentali","FTTH Open Fiber fino a 2,5 Gbps: connettività da smart working vero nonostante i 97 abitanti","Borgate in pietra straordinarie su versante solatio (adret), patrimonio di meridiane e architettura occitana autentica","Paradiso outdoor: fondo in quota, scialpinismo, cascate di ghiaccio, trekking sul Monviso, zero folla","Ambiente integro e silenzio assoluto, tra i valloni più belli e meno turistificati del Piemonte"],"contro":["Zero servizi in loco: farmacia, scuole, poste, banca e spesa a Sampeyre (20-25 min); tutto richiede l'auto","Sanità critica: PS di Saluzzo solo h12 a ~55 min, DEA 24h a Savigliano a ~70 min","97 residenti e dominio delle seconde case: inverno molto isolato, vita sociale ridottissima fuori stagione","Torino a ~2h e Milano a ~3h: non è pendolabile, strada unica di fondovalle con neve in inverno","Immobili quasi tutti da ristrutturare (meire in borgate a volte non carrozzabili): il prezzo basso nasconde costi di recupero elevati"],"score_infrastrutture":3,"score_prezzo":10,"score_vivibilita":3,"score_complessivo":4.5,"descrizione":"Bellino è un mosaico di borgate occitane in pietra a 1400-1900 metri nell'alto vallone della Varaita, esposto a sud sul versante solatio e famoso per le sue meridiane affrescate: uno dei luoghi più autentici e meglio conservati delle Alpi cuneesi. Con 97 residenti, nessun negozio e i servizi a 20-25 minuti (Sampeyre), è una scelta radicale: adatta a chi lavora da remoto (c'è la fibra FTTH Open Fiber), ama scialpinismo e silenzio, e accetta un'autonomia quasi totale, non a chi cerca un paese vivo tutto l'anno. I prezzi sono tra i più bassi dell'arco alpino (media 376 €/mq, baite da 15.000 €), ma quasi tutto è da ristrutturare e la sanità d'urgenza è lontana. Più un progetto di vita (o una seconda casa d'eccezione) che un trasferimento comodo.","fonti":["https://www.immobiliare.it/mercato-immobiliare/piemonte/bellino/","https://it.wikipedia.org/wiki/Bellino_(Italia)","https://www.tuttitalia.it/piemonte/77-bellino/","https://www.aslcn1.it/ospedali/ospedale-civile-saluzzo/pronto-soccorso-saluzzo","https://www.dimensione.com/portale/fibra-internet-casa-ftth-2.5-giga-a-bellino-cn-4017.php","https://www.dovesciare.it/localita/bellino"],"_extra":false,"_verifica":null},{"nome":"Elva","provincia":"Cuneo","regione":"Piemonte","lat":44.54054,"lng":7.09046,"altitudine_m":1637,"popolazione":82,"prezzo_mq_min":150,"prezzo_mq_max":1150,"prezzo_nota":"Media richiesta immobiliare.it/mercato-immobiliare marzo 2026: 622 €/mq (vs 1.282 €/mq media provincia CN). Mercato però sottilissimo: su idealista risulta 1 solo annuncio attivo (rustico 200 mq a 30.000 €, ~150 €/mq da ristrutturare); riferimenti di zona per borgata Serre ~1.100-1.150 €/mq per abitazioni abitabili. Il range 150-1.150 è dedotto da pochissimi annunci + media portale, NON è una quotazione ufficiale OMI: affidabilità bassa, ogni immobile fa storia a sé.","tempo_auto_torino_min":145,"tempo_auto_milano_min":215,"ospedale_vicino":"Ospedale Santa Croce e Carle di Cuneo (PS/DEA II livello), ~75-80 min di auto (58 km, di cui 17 km di tornanti fino a Stroppo); PS di Saluzzo a tempo simile. Poliambulatorio a Dronero (~45 min); medico di base con ambulatorio settimanale a Stroppo e San Damiano Macra. Tempi calcolati via routing OSRM, d'inverno possono allungarsi.","servizi":"In loco solo municipio, ufficio postale e un bar-locanda (La Gabelo, anche noleggio sci). Nessun supermercato né farmacia: i più vicini a Stroppo/San Damiano (alimentari di base) e Dronero (~45 min) per spesa completa, farmacia e banche. Scuole elementari a Stroppo (~30 min di auto); medie e superiori a Dronero/Cuneo. Navetta per il fondovalle solo nei weekend estivi (giu-set).","internet":"Dati MISE/bandaultralarga (giu 2025): 0% delle unità immobiliari coperte da rete fissa ≥100 Mbps — di fatto niente FTTH/FTTC verificata. Connettività reale via FWA: EOLO, BBBell (Hiperlan, fino a 100 Mega privati), Fastweb 5G FWA. Il Piano Italia a 1 Giga (Open Fiber/PNRR) dichiara cablaggi in corso nell'area, ma la copertura FTTH al civico va verificata: a oggi assumere solo FWA.","vita_annuale":"Molto fragile: ~80-82 residenti all'anagrafe ma solo 20-25 stabili tutto l'anno (fonte: vicesindaco, Pagella Politica 2025). Il comune conta 28-30 borgate in gran parte disabitate; forte peso di seconde case e case chiuse fuori stagione. Il progetto PNRR \"ALAVETZ!\" da 20 milioni (foresteria, rifugio, museo immersivo, scuola di pastorizia, osservatorio astronomico, teleriscaldamento a biomassa) punta a rivitalizzarlo entro agosto 2026, ma i cantieri sono in ritardo e l'effetto su servizi e residenti è ancora tutto da dimostrare.","sci":"Nessun impianto di risalita: pista di sci di fondo di 3 km ad accesso gratuito (battuta solo occasionalmente), percorsi racchette e scialpinismo — la Val Maira è una mecca dello scialpinismo e del fondo (anello 50 km Ponte Marmora-Chiappera). Discesa: comprensorio di Sampeyre in Val Varaita, ma il Colle di Sampeyre è chiuso d'inverno, quindi il giro dal fondovalle è lungo (>1h).","acqua":"Torrenti del vallone di Elva (rio che scende nell'orrido del Vallone verso il Maira; Rio Fonte Matté e Rio Ciampines presso borgata Serre); fiume Maira nel fondovalle a ~30 min. Nessun lago nel territorio comunale abitato.","esposizione":"Borgata Serre (capoluogo) sorge in una conca-altopiano panoramica a 1.637 m aperta verso sud, con buon soleggiamento invernale rispetto al fondovalle Maira, notoriamente stretto e ombroso. Nessuna fonte documenta ore di sole precise: valutazione \"versante solatio/adret\" = stima ragionata da descrizioni turistiche e orografia, da verificare di persona a dicembre-gennaio.","pro":["Prezzi tra i più bassi delle Alpi italiane: media 622 €/mq (mar 2026), rustici anche a 150 €/mq — ben sotto il target 1000 €/mq","20 milioni di euro PNRR in arrivo (bando Borghi): foresteria, rifugio, museo, teleriscaldamento a biomassa, nuovi posti di lavoro qualificati previsti","Paesaggio e patrimonio eccezionali: affreschi di Hans Clemer, Fremo Cuncunà, cultura occitana viva, paradiso scialpinismo/trekking in Val Maira","Quota 1.637 m in conca soleggiata e panoramica, aria e silenzio veri, zero turismo di massa","Ufficio postale e municipio ancora presenti in paese nonostante ~80 abitanti"],"contro":["Accesso unico: 17 km di tornanti stretti da Stroppo (SP335); la Strada del Vallone è chiusa dal 2014 (servono 16,5 M€, riapertura non in vista) e il Colle di Sampeyre è chiuso d'inverno","Zero servizi commerciali e sanitari in loco: niente supermercato, farmacia, scuola; PS a ~80 min, elementari a 30 min di tornanti","Solo 20-25 residenti stabili tutto l'anno: d'inverno il paese è quasi vuoto, borgate in gran parte disabitate","Niente rete fissa veloce verificata (0% copertura ≥100 Mbps a giu 2025): solo FWA, critico per chi lavora da remoto","Torino a ~2h30 e Milano a ~3h30: pendolarismo impossibile, anche la spesa settimanale è una spedizione"],"score_infrastrutture":2,"score_prezzo":10,"score_vivibilita":3,"score_complessivo":4,"descrizione":"Elva è un caso limite affascinante: il comune più alto del Cuneese (1.637 m), sospeso in una conca panoramica sopra la Val Maira, con ~80 abitanti sulla carta e appena 20-25 stabili, celebre per gli affreschi di Hans Clemer e la storia dei caviè. Le case costano pochissimo (media 622 €/mq, rustici da 30.000 €) e il borgo ha vinto 20 milioni del PNRR che potrebbero cambiarne il destino entro il 2026, ma oggi viverci significa accettare un solo accesso via 17 km di tornanti, nessun negozio o farmacia, pronto soccorso a 80 minuti e internet solo via FWA. È una scelta per neo-montanari radicali con lavoro remoto tollerante e auto 4x4, non per chi cerca una comoda base in quota: chi valuta seriamente dovrebbe passarci un gennaio intero prima di comprare.","fonti":["https://it.wikipedia.org/wiki/Elva_(Italia)","https://www.tuttitalia.it/piemonte/14-elva/","https://www.immobiliare.it/mercato-immobiliare/piemonte/elva/","https://www.idealista.it/vendita-case/elva-cuneo/","https://pagellapolitica.it/articoli/borgo-elva-20-milioni-pnrr","https://www.targatocn.it/2025/05/20/leggi-notizia/argomenti/viabilita/articolo/venti-milioni-di-euro-a-elva-grazie-al-pnrr-ma-che-fine-fara-la-strada-del-vallone.html"],"_extra":false,"_verifica":null},{"nome":"Pontechianale","provincia":"Cuneo","regione":"Piemonte","lat":44.61667,"lng":7.03333,"altitudine_m":1614,"popolazione":185,"prezzo_mq_min":900,"prezzo_mq_max":2800,"prezzo_nota":"Media richiesta immobiliare.it/mercato-immobiliare gennaio 2026: 1.702 €/mq (+1,07% su gen 2025, picco 1.884 a lug 2025); RealAdvisor gen 2026: media 1.527 €/mq (appartamenti 1.822, case indipendenti 883); Requot per zona: 500 €/mq aree agricole – 1.400 €/mq zona Chianale. Il range 900-2.800 riflette gli annunci reali (es. bilocale a Chianale 2.778 €/mq, trilocale vista lago 1.918 €/mq; su idealista ~20 annunci da 25.000 €). ATTENZIONE: mercato sottilissimo (~20 annunci), le medie oscillano molto di mese in mese e le fonti divergono perfino sul segno del trend (Wikicasa -7% anno su anno); trattare come range indicativo da annunci, non quotazione ufficiale OMI.","tempo_auto_torino_min":120,"tempo_auto_milano_min":205,"ospedale_vicino":"Ospedale Civile di Saluzzo (~58 km, ~70 min di auto scendendo tutta la Valle Varaita) — ma il Pronto Soccorso è h12 (8-20). Per emergenze notturne/gravi il DEA h24 di riferimento è l'Ospedale SS. Annunziata di Savigliano (~80-90 min). Case della Salute più vicine a Sampeyre e Venasca per le urgenze minori.","servizi":"In loco: minimarket alimentari, panetteria-pasticceria, negozio articoli sportivi (tutti in Piazza Santa Caterina, fraz. Maddalena), bar e ristoranti. NIENTE farmacia: solo dispensario farmaceutico aperto il giovedì 9.00-10.30 (farmacia di riferimento a Sampeyre, 20 km). Nessuna scuola nel comune: elementari/medie a Sampeyre/Casteldelfino più a valle. Poste e banca non presenti stabilmente: sportelli a Casteldelfino/Sampeyre. Per la spesa completa si scende a Sampeyre (20 km) o Verzuolo/Saluzzo (50+ km).","internet":"Comune in area bianca coperta dal piano BUL Open Fiber: BBBell dichiara a Pontechianale sia FWA wireless sia fibra FTTH su rete Open Fiber (fino a 1 Giga dove cablato); la copertura FTTH è però parziale per borgata/civico e va verificata su bandaultralarga.italia.it. Realisticamente: FTTH in alcune borgate, FWA come fallback affidabile altrove. Nessuna FTTC significativa.","vita_annuale":"Fortemente stagionale: ~185 residenti su 95 km² distribuiti in 8 borgate, con economia costruita su seconde case, campeggi e turismo (sci d'inverno, lago e Monviso d'estate). Fuori stagione (novembre, maggio-giugno) il paese si svuota e molti esercizi chiudono o riducono gli orari; il nucleo di residenti veri è piccolo ma esistente, con bar/minimarket che restano il presidio sociale. Chianale, borgo tra i più belli d'Italia, è quasi interamente seconde case.","sci":"Impianti propri: stazione Pontechianale Sci (1.600→2.340 m con seggiovia Maddalena-Serviero, +3 skilift e tapis roulant, ~20 km di piste, freeride fino a ~2.650 m), stagione 2025-26 dal 13/12 al 12/04. Inoltre sci nordico, cascate di ghiaccio (8 a Castello, 5 a Chianale) e scialpinismo. Comprensori maggiori: nessuno vicino, la valle è alternativa \"slow\" rispetto a Via Lattea/Prato Nevoso.","acqua":"Torrente Varaita (attraversa Chianale) e lago artificiale di Pontechianale (lago di Castello, diga del 1942 che sommerse la frazione Chiesa) — d'estate canoa, windsurf e pesca.","esposizione":"Alta valle orientata circa est-ovest: il versante sinistro (adret/\"adrech\", sopra Maddalena e Chianale, dove corre il sentiero Lanzetti) è solatio con pascoli e piste ben soleggiate sul Tre Chiosis; il versante destro (ubac) è ombroso, coperto dal bosco dell'Alevé e sede delle cascate di ghiaccio. Il fondovalle a 1.600-1.800 m, chiuso da montagne di 3.000 m, ha però ore di sole invernale ridotte, soprattutto nelle borgate basse vicino al lago (stima: 4-6 ore dirette a dicembre-gennaio, dato puntuale non trovato).","pro":["Prezzi ancora accessibili per gli standard alpini: si trovano immobili sotto i 1.500 €/mq e occasioni da ristrutturare a molto meno","Sci in loco con impianti propri (seggiovia sotto casa) più cascate di ghiaccio, scialpinismo e trekking sul Monviso: paradiso per sportivi","Paesaggio d'eccezione: lago, bosco dell'Alevé, Chianale tra i borghi più belli d'Italia, aria e silenzio veri a 1.600 m","Copertura banda ultralarga presente (FTTH Open Fiber in parte del comune + FWA): lavoro remoto fattibile previa verifica del civico","Comunità piccola ma reale, con minimarket, panetteria e bar aperti come presidio anche fuori stagione"],"contro":["Servizi essenziali quasi assenti: niente farmacia (dispensario 1,5 ore a settimana), niente scuole, poste o banca — tutto a 20+ km a Sampeyre o oltre","Sanità lontana: PS di Saluzzo a ~70 min e solo h12; DEA h24 a Savigliano a ~85 min — critico per famiglie con anziani o bambini","Isolamento: 2 ore da Torino, 3,5 da Milano, unica strada di fondovalle (SP105/SP8) esposta a neve e chiusure invernali; il colle dell'Agnello verso la Francia chiude d'inverno","Demografia estrema: 185 residenti, comune tra i più spopolati della valle, dominato dalle seconde case — fuori stagione la vita sociale è ridotta al minimo","Inverno lungo e severo (zona climatica F, 4.316 gradi giorno): costi di riscaldamento alti e sole invernale limitato nel fondovalle"],"score_infrastrutture":3.5,"score_prezzo":7,"score_vivibilita":4,"score_complessivo":5,"descrizione":"Pontechianale è l'ultimo comune dell'alta Valle Varaita, 185 abitanti sparsi in otto borgate attorno al lago artificiale di Castello a 1.614 m, sotto il Monviso e a un passo dalla Francia. Offre montagna vera e a buon mercato — impianti da sci propri, cascate di ghiaccio, il bosco dell'Alevé e il borgo di pietra di Chianale — con prezzi medi attorno a 1.500-1.700 €/mq e occasioni ben sotto. Il rovescio della medaglia è netto: niente farmacia né scuole né banca, pronto soccorso a oltre un'ora e solo diurno, due ore da Torino e un'economia di seconde case che svuota il paese fuori stagione. È una scelta adatta a chi lavora da remoto (verificando la FTTH al civico), ama lo sport alpino e cerca l'isolamento consapevolmente, non a chi vuole una vita di paese con servizi sotto casa.","fonti":["https://it.wikipedia.org/wiki/Pontechianale","https://www.immobiliare.it/mercato-immobiliare/piemonte/pontechianale/","https://realadvisor.it/it/mercato-immobiliare/comune-pontechianale-it","https://comune.pontechianale.cn.it/luoghi/2410268/dispensario-farmaceutico","https://pontechianalesci.it/biglietti-e-aperture-inverno/","https://www.bbbell.it/copertura-fibra-bandalarga-pontechianale/"],"_extra":false,"_verifica":null},{"nome":"Casteldelfino","provincia":"Cuneo","regione":"Piemonte","lat":44.59056,"lng":7.07083,"altitudine_m":1296,"popolazione":143,"prezzo_mq_min":450,"prezzo_mq_max":1200,"prezzo_nota":"Media appartamenti ~865-873 €/mq (mercato-immobiliare.info, feb-ago 2025, dedotta da soli ~28 annunci: affidabilità bassa). OMI: 520-1060 €/mq compravendita; zone 450 €/mq (agricole) - 1200 €/mq (Centro-Rabioux). Su idealista 40 annunci da 9.000 €; trend in calo negli ultimi 6 mesi (-8%). Range da annunci, non media ufficiale.","tempo_auto_torino_min":110,"tempo_auto_milano_min":185,"ospedale_vicino":"Ospedale Civile di Saluzzo (PS solo h12, 8-20): ~46 km, ~50 min. PS h24 più vicino: SS. Annunziata di Savigliano, ~60 km, ~65-70 min. Per emergenze gravi elisoccorso 118.","servizi":"In loco: minimarket con punto ristoro (Lou Negosi de la Vilo, via Circonvallazione 3), ufficio postale (via Pontechianale 37), municipio. Farmacia: solo dispensario farmaceutico in piazza Dao Bernardo il giovedì 11:30-12:30 (farmacia di riferimento: Bourlot a Sampeyre, 8 km). Scuole: plesso in loco non confermato, elementari/medie a Sampeyre (~8 km). Banca: assente, sportelli a Sampeyre/Venasca. Spesa grossa a Venasca/Saluzzo.","internet":"FTTH Open Fiber presente (piano aree bianche/PNRR): offerte fino a 2,5 Gbit con Dimensione, Vodafone, Fastweb; copertura parziale (~52 famiglie secondo AGCOM, ~70% secondo altre fonti) — verificare il civico. Fallback FWA BBBell/Fastweb 5G. Connettività sorprendentemente buona per un borgo di 143 abitanti.","vita_annuale":"Molto fragile: 143 residenti ISTAT (1/1/2025), uno dei paesi più spopolati della Val Varaita, centro storico in gran parte svuotato. Fortissima incidenza di seconde case usate solo in estate e nei weekend invernali. Esiste però una comunità attiva: la Pro Loco \"Casteldelfino Viva\" porta avanti il progetto \"Vivere Casteldelfino\" contro l'abbandono, e alcune borgate restano abitate tutto l'anno. Fuori stagione il paese è di fatto quasi deserto.","sci":"In loco: centro sci di fondo con 11 km di piste omologate FISI (anelli 2-3-6 km) nella conca del Varaita. Sci alpino: Pontechianale a ~9 km (5 impianti, 20 km di piste, 1614-2780 m, freeride) e Sampeyre a ~8 km (seggiovie fino a 1850 m). Comprensorio Alta Val Varaita nel complesso piccolo e non paragonabile alle grandi stazioni.","acqua":"Torrente Varaita: il paese sorge nella conca dove il Varaita di Bellino e il Varaita di Chianale si uniscono. A ~6 km a monte il lago artificiale di Castello (Pontechianale).","esposizione":"Capoluogo in conca di fondovalle alla confluenza dei due valloni, con sole invernale ridotto (stima, dato orario preciso non reperito); le borgate alte Bertines, Serre e Alboin sono documentate su versante adret (\"adrech\") caldo e riparato, con buona esposizione. Meglio delle vicine borgate ubac di Bellino (Pleyne resta 3 mesi senza sole), ma per l'inverno conviene puntare alle borgate solatie più che al fondovalle.","pro":["Prezzi bassissimi: media annunci ~865 €/mq, case abitabili sotto gli 80.000 €, ben sotto il target 1000 €/mq","FTTH Open Fiber già attivabile (fino a 2,5 Gbit dove coperto): raro a 1296 m, ideale per smart working","Natura di prim'ordine: bosco dell'Alevé (la più vasta cembreta delle Alpi), Monviso, sci di fondo in paese e alpino a 8-9 km","Comunità piccola ma combattiva (Pro Loco 'Casteldelfino Viva', progetto contro lo spopolamento)","Altitudine 1296 m con neve affidabile e fresco estivo, borgate su versante adret ben esposte"],"contro":["Solo 143 residenti e spopolamento in corso: fuori stagione il paese è quasi deserto, dominato da seconde case chiuse","Servizi minimi: farmacia solo come dispensario 1 ora a settimana, niente banca, scuole probabilmente a Sampeyre (8 km); tutto il resto a Saluzzo (46 km)","Sanità lontana: PS di Saluzzo (50 min) aperto solo 8-20, il PS h24 è a Savigliano a oltre un'ora","Isolamento: 1h45-2h da Torino e ~3h da Milano su strada di valle lunga, con rischio neve/chiusure invernali","Mercato immobiliare illiquido: comprare costa poco ma rivendere è difficile, prezzi in calo (-8% in 6 mesi)"],"score_infrastrutture":4,"score_prezzo":9,"score_vivibilita":3,"score_complessivo":4.5,"descrizione":"Casteldelfino è l'antica capitale dell'Escarton della Val Varaita: un borgo storico a 1296 m nella conca dove si uniscono i due rami del torrente Varaita, ai piedi del bosco dell'Alevé e del Monviso. Costa pochissimo (media ~865 €/mq, case sotto gli 80.000 €) e, sorprendentemente, ha la fibra FTTH: sulla carta è perfetto per chi lavora da remoto e cerca montagna vera. Il rovescio della medaglia è pesante: 143 residenti, farmacia solo come dispensario settimanale, scuole e servizi a 8-46 km, pronto soccorso h24 a oltre un'ora, e fuori stagione il paese vive quasi solo di seconde case chiuse. È una scelta per pionieri autonomi e motivati (magari in una borgata solatia come Bertines o Serre), non per chi cerca un paese di montagna con vita e servizi tutto l'anno.","fonti":["https://www.tuttitalia.it/piemonte/14-casteldelfino/","https://www.mercato-immobiliare.info/piemonte/cuneo/casteldelfino.html","https://realadvisor.it/it/mercato-immobiliare/comune-casteldelfino-it","https://www.aslcn1.it/ospedali/ospedale-civile-saluzzo/pronto-soccorso-saluzzo","https://www.dimensione.com/portale/fibra-internet-casa-ftth-2.5-giga-a-casteldelfino-cn-4047.php","https://www.cuneoholiday.com/attivita-outdoor/centri-di-sci-di-fondo/bellino-casteldelfino-chianale-sampeyre/"],"_extra":false,"_verifica":null},{"nome":"Celle di Macra","provincia":"Cuneo","regione":"Piemonte","lat":44.48269,"lng":7.17965,"altitudine_m":1270,"popolazione":83,"prezzo_mq_min":200,"prezzo_mq_max":1000,"prezzo_nota":"Nessuna media ufficiale per il comune: immobiliare.it e idealista non pubblicano quotazioni dedicate (troppo pochi annunci). Riferimento più vicino: comune confinante di Macra a 536 €/mq (immobiliare.it, nov 2024). Range dedotto da 5-11 annunci attivi (lug 2026): rustici/baite da ristrutturare da 10.000-20.000 € totali (~150-400 €/mq), porzioni ristrutturate fino a ~1.000 €/mq (stima da annunci, affidabilità bassa per campione minimo).","tempo_auto_torino_min":125,"tempo_auto_milano_min":195,"ospedale_vicino":"Ospedale S. Croce e Carle di Cuneo (DEA II livello), ~50-55 min di auto; guardia medica e punto Croce Bianca a Dronero/San Damiano Macra (~25-35 min). Nessun PS in valle.","servizi":"In loco solo l'alimentari \"La Butega\" con bar \"L'Oste de Seles\" (borgata Chiesa). Poste, farmacia e scuola primaria a San Damiano Macra (~15-20 min); medie, supermercati e banche a Dronero (~35 min); superiori e tutto il resto a Cuneo (~55 min). Auto indispensabile.","internet":"Sorprendentemente buona: FTTH Open Fiber (piano BUL aree bianche) copre ~71% delle famiglie fino a 1 Gbps, FWA (BBBell e altri) porta la copertura al ~90% (dati AGCOM 2024); ~10% delle abitazioni ancora scoperto — verifica puntuale per borgata indispensabile. 4G presente, completamento BUL previsto entro fine 2025.","vita_annuale":"Uno dei comuni meno popolati d'Italia: 83 residenti effettivi (feb 2026) sparsi su 18-21 borgate. Il negozio-bar è l'unico presidio di aggregazione tutto l'anno; forte prevalenza di seconde case e baite chiuse fuori stagione, turismo escursionistico concentrato in estate e nei weekend. D'inverno il paese è molto silenzioso ma non del tutto morto: comunità piccola e coesa, con eventi legati all'ecomuseo degli acciugai.","sci":"Nessun impianto nel comune. La Valle Maira è la capitale dello sci \"dolce\": ~61 km di anelli di fondo (Ponte Marmora-Chiappera, Prazzo, Elva, molti gratuiti, 15-35 min), scialpinismo e ciaspole rinomati; solo tapis roulant ad Acceglio e skilift a Canosio. Comprensori veri di discesa lontani (Limone/Prato Nevoso ~1h20+).","acqua":"Torrente Maira nel fondovalle (~5 km); il territorio comunale è solcato dai rii dei valloni laterali Intersile e Tibert (vallone di Celle). Nessun lago balneabile vicino.","esposizione":"Il capoluogo e le borgate sorgono a 1.200-1.400 m su terrazzi del vallone laterale di Celle (destra orografica della Maira), con diverse borgate descritte come \"molto soleggiate\" e vista aperta sul \"balcone dei 3.000\" (Chersogno, Pelvo d'Elva). Esposizione buona ma variabile borgata per borgata — verificare in loco d'inverno; ore di sole invernali precise non documentate (stima: discrete nel capoluogo, ridotte nelle borgate incassate come Soglio Sottano).","pro":["Prezzi tra i più bassi delle Alpi: baite da 10-20k€, ben sotto il target di 1000 €/mq","Fibra FTTH Open Fiber già al 71% delle famiglie — raro a queste quote, ideale per lavoro remoto","Valle Maira autentica e non snaturata: niente impianti massivi, escursionismo/scialpinismo di prim'ordine","Altitudine 1270 m con borgate in pietra di grande valore architettonico (patrimonio occitano, ecomuseo)","Torino raggiungibile in ~2h, Cuneo in meno di 1h"],"contro":["83 residenti: quasi nessun servizio in loco, un solo negozio-bar; auto indispensabile per tutto","Pronto soccorso vero a ~55 minuti (Cuneo): rischio concreto per emergenze, specie d'inverno","Niente scuole nel comune: primaria a 15-20 min, medie a 35 min — difficile con figli","Mercato immobiliare illiquido: comprare costa poco ma rivendere è molto difficile, molti immobili richiedono ristrutturazioni pesanti (costi >1500 €/mq)","Strada di arroccamento montana dal fondovalle e inverni lunghi; vita sociale ridottissima fuori stagione"],"score_infrastrutture":4,"score_prezzo":10,"score_vivibilita":3,"score_complessivo":5,"descrizione":"Celle di Macra è un micro-comune occitano di 83 abitanti a 1.270 m nella media Valle Maira, composto da una ventina di borgate in pietra su un vallone laterale ben esposto, celebre per il museo degli acciugai itineranti. È probabilmente uno dei posti più economici delle Alpi occidentali per comprare casa (baite da 10-20 mila euro) e, grazie al piano BUL, ha una copertura FTTH insolitamente buona che lo rende plausibile per chi lavora da remoto e cerca isolamento radicale. Il rovescio della medaglia è netto: un solo negozio-bar, nessuna scuola né farmacia, pronto soccorso a quasi un'ora e una vita sociale invernale ridotta al minimo. Scelta adatta a profili molto autonomi innamorati della Valle Maira, non a famiglie o a chi cerca un paese vivo tutto l'anno.","fonti":["https://www.tuttitalia.it/piemonte/55-celle-di-macra/","https://it.wikipedia.org/wiki/Celle_di_Macra","https://www.immobiliare.it/mercato-immobiliare/piemonte/macra/","https://www.idealista.it/en/vendita-case/celle-di-macra-cuneo/","https://www.prezzioggi.com/fibra/celle-di-macra","https://www.vallemaira.org/en/regions/celle-di-macra/"],"_extra":false,"_verifica":null},{"nome":"Acceglio","provincia":"Cuneo","regione":"Piemonte","lat":44.47556,"lng":6.99194,"altitudine_m":1220,"popolazione":159,"prezzo_mq_min":500,"prezzo_mq_max":1500,"prezzo_nota":"Dati molto volatili perché basati su 9-15 annunci. Immobiliare.it (set 2025): media richiesta 523 €/mq, ma -51% su set 2024 (1.079 €/mq) — oscillazione da campione minuscolo, non trend reale. Wikicasa (ago 2025): media 967 €/mq (+4% yoy). Range reale dedotto dagli annunci: rustici da ristrutturare in borgata ~400-600 €/mq, case abitabili/chalet a Chiappera-Saretto ~1.200-1.500 €/mq. Non è una media ufficiale OMI ma un range da annunci.","tempo_auto_torino_min":130,"tempo_auto_milano_min":210,"ospedale_vicino":"Ospedale Santa Croce e Carle di Cuneo (DEA II livello), ~65-70 minuti di auto. A Dronero (~40 min) solo punto di primo intervento/continuità assistenziale, non un PS completo. Medico di base in paese a giorni alterni; guardia medica turistica estiva in valle.","servizi":"In loco: 2 negozi alimentari e 2 bar aperti tutto l'anno nel capoluogo (+1 bar a Villaro), farmacia Saglimbeni in Via della Posta (verificare orari, possibile apertura ridotta/succursale), ufficio postale con orari ridotti. Nessuna banca/bancomat. Nessuna scuola in comune: materna ed elementari a Prazzo (5 km), medie a Stroppo (~10 km), superiori a Dronero/Cuneo, asilo nido a Dronero (35 km). Supermercati veri a Dronero.","internet":"Sorprendentemente buona: FTTH al 77% delle famiglie (rete Open Fiber aree bianche/Piano Italia 1 Giga, fino a 1-2,5 Gbps), FWA porta la copertura al 94%; ~6% scoperto (borgate isolate — verificare il civico su bandaultralarga.italia.it). Dati AGCOM 2024 via comparatori (Selectra, PrezziOggi). Operatori: Fastweb, Vodafone, BBBell, ecc.","vita_annuale":"Comune di ~160 residenti sparsi su 14 borgate a fronte di oltre 2.000 nell'Ottocento: le seconde case e le case vacanza dominano il patrimonio edilizio. Il capoluogo però vive tutto l'anno (negozi e bar aperti, Pro Loco, Fondazione Acceglio, Mamo Educational Foundation attive) e la valle ha doppia stagione turistica (estate escursionismo, inverno scialpinismo/fondo). Critica nota degli architetti De Rossi-Mascino sul \"modello Valle Maira\": 21mila presenze turistiche ma quasi nessun bambino in età scolare — il turismo non ha ricostruito servizi per residenti. Fuori stagione (novembre, maggio) il paese è molto quieto.","sci":"Niente impianti di risalita per scelta (solo 2 tapis roulant per principianti a Ponte Maira): la Valle Maira è la capitale italiana dello scialpinismo e dello sci escursionismo. Sci di fondo gratuito: anelli di Chiappera (7 km, omologato FISI, noleggio al Rifugio Campo Base) e Frere (5 km). Ciaspole, cascate di ghiaccio, snowtubing. Per lo sci alpino su pista bisogna uscire dalla valle (es. Prato Nevoso/Limone, >1h30).","acqua":"Torrente Maira (che dà il nome alla valle) attraversa il comune; lago di Saretto (lago alpino con sorgenti, borgata di Acceglio) e Cascate di Stroppia (le più alte d'Italia) nel territorio comunale.","esposizione":"Alta valle orientata est-ovest: il capoluogo è a fondovalle a 1.220 m con soleggiamento invernale discreto ma limitato dai rilievi; le borgate storiche sul versante adret/solatio (toponimo occitano \"Adrech\" attestato proprio ad Acceglio: Bargia, Oliva, Lausetto, Colombata, Ponte Maira, collegate dal \"Sentiero delle borgate l'Adrech\") godono di sole diretto e innevamento più breve. Nella scelta dell'immobile la differenza adret/ubac è decisiva; ore di sole invernali puntuali non pubblicate (stima).","pro":["Prezzi molto vicini al target: media sotto i 1.000 €/mq, rustici da 15-60.000 € e case abitabili raramente sopra 1.500 €/mq","Fibra FTTH reale al 77% delle famiglie: smart working possibile a 1 Gbps a 1.220 m di quota, raro in alta montagna","Paesaggio d'eccellenza senza turismo di massa: capitale dello scialpinismo, fondo gratuito, Cascate di Stroppia, lago di Saretto, cultura occitana viva","Negozi, bar, farmacia e comunità attiva (fondazioni, Pro Loco) aperti tutto l'anno nel capoluogo, nonostante i 160 abitanti","Progetto AlternaVita dedicato ad accompagnare chi vuole trasferirsi in Valle Maira"],"contro":["Pronto soccorso a 65-70 minuti (Cuneo): criticità seria per famiglie con anziani o patologie","Zero scuole in comune: elementari a 5 km, medie a 10, superiori a 35+ — con una sola bambina in età scolare segnalata in alta valle","Isolamento logistico: 2h10+ da Torino, 3h30 da Milano, ultima ora su strada di valle senza alternative, impegnativa d'inverno","Demografia fragilissima (~160 residenti su 152 km²): patrimonio dominato da seconde case, fuori stagione il paese è molto silenzioso","Nessuna banca/bancomat e sanità locale ridotta al medico a giorni alterni; niente sci alpino su pista in valle"],"score_infrastrutture":4,"score_prezzo":9,"score_vivibilita":5,"score_complessivo":6,"descrizione":"Acceglio è l'ultimo comune dell'alta Valle Maira, 160 abitanti sparsi in 14 borgate occitane a 1.220 m, in una valle che ha rifiutato per scelta gli impian
