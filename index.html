ti di risalita ed è diventata la mecca europea dello scialpinismo e del turismo dolce. Per chi cerca casa sotto i 1.000 €/mq con fibra FTTH vera (77% di copertura) è una delle occasioni più concrete delle Alpi occidentali: si compra un rustico a prezzi simbolici o una casa abitabile a 1.200-1.500 €/mq. Il rovescio della medaglia è l'isolamento: pronto soccorso a 70 minuti, scuole fuori comune, demografia al lumicino e un'economia turistica che riempie la valle d'estate ma non ha ricostruito i servizi per chi resta. Ideale per smart worker autonomi e coppie senza figli piccoli innamorate della montagna vera; sconsigliato a chi ha bisogno di sanità vicina o vita sociale strutturata tutto l'anno.","fonti":["https://www.immobiliare.it/mercato-immobiliare/piemonte/acceglio/","https://www.wikicasa.it/en/real-estate-quotation/acceglio/","https://www.alternavita.it/acceglio/","https://selectra.net/internet/copertura/fastweb/piemonte/acceglio","https://www.ildolomiti.it/altra-montagna/cultura/2025/21mila-presenze-turistiche-nel-2023-ma-una-sola-bambina-in-eta-scolare-nel-modello-valle-maira-qualcosa-non-ha-funzionato-0","https://www.vallemaira.org/en/regions/acceglio/"],"_extra":false,"_verifica":null},{"nome":"Courmayeur","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.79317,"lng":6.97231,"altitudine_m":1224,"popolazione":2548,"prezzo_mq_min":5000,"prezzo_mq_max":12000,"prezzo_nota":"Media ufficiale immobiliare.it: 8.289 €/mq (set 2025, comune più caro della VdA); idealista: 8.020 €/mq (lug 2025). Punte 10.200+ €/mq per nuovo/ristrutturato in centro o vicino agli impianti (analisi Abitare Co. 2025, top 4 Italia). Quotazioni OMI/Borsino più basse (~4.240 €/mq medio). Il range 5.000-12.000 è dedotto: minimo stimato per frazioni periferiche/da ristrutturare, massimo per il prime centro/Entrèves. Dato medio affidabile, range estremi = stima.","tempo_auto_torino_min":105,"tempo_auto_milano_min":150,"ospedale_vicino":"Ospedale regionale Umberto Parini di Aosta (PS/DEA), ~35-40 min di auto via A5 (35 km, pedaggio ~9€). Primo soccorso/poliambulatorio a Villeneuve (~25 min); in paese ambulatorio turistico e centro traumatologico stagionale invernale; elisoccorso da Aosta.","servizi":"Tutto in loco: supermercati (Carrefour Express x2, Dpiù, A&O, discount a Entrèves; Eurospin a Morgex), Farmacia Monte Bianco (via Circonvallazione, con servizi infermieristici e analisi), scuole dall'infanzia alle medie (istituzione scolastica Valdigne-Mont Blanc), ufficio postale in Piazzale Monte Bianco, sportelli bancari, biblioteca, cinema, negozi. Superiori ad Aosta (~35 min).","internet":"Oggi principalmente FTTC (fibra fino all'armadio, ultimo tratto in rame). FTTH in arrivo: cantieri BUL/Open Fiber (aree bianche, Infratel) aperti dal 7 aprile 2026, oltre 5.000 utenze previste fino a 10 Gbps, completamento atteso entro il 2027 (fonte: Gazzetta Matin mar 2026). Copertura 4G/5G buona in paese.","vita_annuale":"Paese vivo tutto l'anno (scuole, botteghe, biblioteca, eventi anche fuori stagione, doppia alta stagione inverno+estate) ma con forte dualismo residenti/seconde case: popolazione scesa da 3.059 (2009) a 2.548 (2025, -16,7%) mentre l'edilizia cresceva quasi solo per seconde case (solo 14,8% del volume ampliato 2009-2024 per abitazione permanente). Nel luglio 2026 il Comune ha sospeso il Piano Casa per 24 mesi proprio per difendere i residenti. Affitti lunghi rari e carissimi (29 €/mq/mese, record provinciale). Il documentario \"Courma et Courmayeur\" (2025) racconta esattamente questa doppia vita.","sci":"Comprensorio proprio Courmayeur Mont Blanc (Checrouit-Val Veny, ~41 km di piste, funivia dal centro paese e da Dolonne/Entrèves) + Skyway Monte Bianco per freeride e Vallée Blanche. Vicini: La Thuile-La Rosière (20 min), Pila. Sci alpinismo e fondo in Val Ferret.","acqua":"Dora Baltea, che nasce proprio nel comune a Entrèves dall'unione della Dora di Ferret e della Dora di Veny; torrenti laterali nelle due valli. Nessun lago di fondovalle (laghetti alpini in quota, es. Lago del Miage).","esposizione":"Il paese sta in una conca a 1.224 m alla testata della Valdigne: il centro e Dolonne hanno esposizione discreta verso sud/sud-est, ma il massiccio del Monte Bianco a NO e le creste circostanti accorciano le giornate invernali (ombre lunghe nel pomeriggio, stima: sole diretto ~4-6 ore a dicembre in centro). Versante sci Chécrouit esposto a NE (sole al mattino), Val Veny a NO (pomeriggio). Dato preciso sulle ore di sole non pubblicato: stima da orografia.","pro":["Servizi completi da cittadina vera: scuole fino alle medie, farmacia, supermercati, poste, banche, biblioteca, eventi tutto l'anno","Sci e outdoor world-class sotto casa: comprensorio proprio, Skyway, Val Ferret/Val Veny, doppia stagione turistica che tiene vivo il commercio","Accessibilità ottima per un paese a 1.224 m: uscita A5 dedicata, Torino a ~1h45 e Milano a ~2h30","FTTH in costruzione (cantieri 2026, fine prevista 2027) su rete BUL pubblica fino a 10 Gbps","Comune più ricco della VdA, amministrazione attiva nel difendere i residenti (stop Piano Casa 2026)"],"contro":["Prezzi proibitivi: ~8.000-8.300 €/mq medi, 8 volte il target di 1.000 €/mq — tra i 4 mercati più cari d'Italia in montagna","Economia da località-vetrina: seconde case dominanti, affitti lunghi rari e carissimi (29 €/mq/mese), spopolamento residenti -16,7% dal 2009","Ospedale/PS vero solo ad Aosta (~35-40 min), superiori solo ad Aosta","Inverno con sole limitato nel pomeriggio per l'ombra del massiccio del Monte Bianco; traffico intenso da traforo e weekend di punta","Alta stagione che stravolge il paese (popolazione moltiplicata a Natale): costo della vita e parcheggi da località VIP"],"score_infrastrutture":7,"score_prezzo":1,"score_vivibilita":7,"score_complessivo":4,"descrizione":"Courmayeur è probabilmente il paese sopra i 1.200 m più \"completo\" delle Alpi occidentali italiane: servizi veri, scuole, autostrada fin sotto casa, sci e Monte Bianco in giardino, e una comunità che — pur erosa dalle seconde case — vive tutto l'anno. Il problema è uno solo ma enorme: con medie di 8.000-8.300 €/mq e punte oltre 10.000, è il mercato più caro della Valle d'Aosta e tra i più cari d'Italia, otto volte il target di 1.000 €/mq. Ha senso solo con budget molto alto o guardando alle frazioni meno pregiate; per lo stesso stile di vita a una frazione del prezzo conviene guardare a Morgex o La Salle, 10 minuti più a valle. Chi può permetterselo trova però un posto dove trasferirsi davvero, non solo un dormitorio da weekend.","fonti":["https://www.immobiliare.it/mercato-immobiliare/valle-d-aosta/courmayeur/","https://www.idealista.it/valutazione-di-immobili/courmayeur-aosta","https://www.valledaostaglocal.it/2026/07/03/leggi-notizia/argomenti/consiglio-valle/articolo/courmayeur-frena-il-piano-casa-stop-agli-ampliamenti-per-difendere-residenti-e-territorio.html","https://www.gazzettamatin.com/2026/03/12/courmayeur-arriva-la-fibra-ottica-ultraveloce-per-la-banda-ultra-larga-lavori-dal-7-aprile/","https://www.tuttitalia.it/valle-d-aosta/23-courmayeur/","https://www.lovevda.it/it/banca-dati/3/localita/valle-d-aosta/courmayeur/381"],"_extra":false,"_verifica":null},{"nome":"Valtournenche","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.87694,"lng":7.62472,"altitudine_m":1524,"popolazione":2222,"prezzo_mq_min":2500,"prezzo_mq_max":6854,"prezzo_nota":"Media comunale immobiliare.it feb 2026: 6.854 €/mq (+30,8% su feb 2025) — ma è trainata da Breuil-Cervinia, che fa parte dello stesso comune. Per il PAESE di Valtournenche (capoluogo, 1.524 m) i valori OMI indicano 1.100-3.600 €/mq e gli annunci reali si collocano indicativamente sui 2.500-4.500 €/mq (stima da range OMI + annunci idealista/immobiliare.it, non media ufficiale per frazione). Wikicasa set 2025: media comunale 5.333 €/mq. Il target 1000 €/mq è fuori portata ovunque nel comune salvo ruderi/residuale montano.","tempo_auto_torino_min":100,"tempo_auto_milano_min":135,"ospedale_vicino":"Ospedale regionale Umberto Parini, Aosta (unico ospedale/PS della Valle d'Aosta) — ~46 km, 45-50 minuti via SR46 + SS26. Guardia medica e 112/118 con elisoccorso in valle.","servizi":"Tutto in loco nel capoluogo: supermercato Crai (riaperto 2024 in piazza Vittorio Veneto) + alimentari/panificio, farmacia Varvello in via Roma, scuole infanzia+primaria+secondaria di I grado (nuova scuola media da 2,8M€ PNRR in costruzione a Cretaz), ufficio postale a Cretaz, sportelli bancari nel comune (UniCredit a Cervinia). Superiori a Châtillon/Aosta.","internet":"In transizione: oggi FTTC/FWA; rete FTTH Open Fiber (piano BUL) in fase conclusiva, PCN nel capoluogo installato e prime attivazioni commerciali previste entro l'estate 2026, oltre 3.800 unità immobiliari coperte (frazioni isolate in FWA). Fonte: ANSA/Regione VdA apr 2026.","vita_annuale":"Paese vero, non dormitorio: ~2.200 residenti stabili, scuole fino alle medie, negozi e farmacia aperti tutto l'anno. Forte quota di seconde case e doppio picco turistico (inverno lungo grazie allo sci estivo a Plateau Rosa, estate escursionistica); nelle mezze stagioni (ott-nov, maggio) il paese rallenta molto ma non muore — a differenza di Breuil-Cervinia, quasi solo turistica. Mercato immobiliare orientato a seconde case/investimento.","sci":"Impianti propri in paese (telecabina Salette) collegati al comprensorio Cervino Ski Paradise: Valtournenche-Breuil-Cervinia-Zermatt, ~350 km di piste e 64 impianti, sci estivo sul ghiacciaio di Plateau Rosa.","acqua":"Torrente Marmore (percorre tutta la valle); lago artificiale di Cignana e Lac Bleu (Layet) nel territorio comunale; Gouffre des Busserailles sulle gole del Marmore.","esposizione":"La valle ha andamento nord-sud (sale verso il Cervino), quindi il fondovalle evita il problema classico delle valli est-ovest; le guide indicano Valtournenche sul versante più soleggiato della zona, con abitato in conca/pendio tra 1.330 e 1.860 m. Il vero adret della valle è però Torgnon, sul terrazzo opposto: il capoluogo di Valtournenche ha buon sole ma giornate invernali comunque corte per l'orografia (dato ore di sole invernali puntuale non reperito — stima: discreto, senza periodi di ombra totale).","pro":["Servizi completi in loco (supermercato, farmacia, poste, scuole fino alle medie) raro a 1.500+ m","Comprensorio sciistico internazionale Cervinia-Zermatt raggiungibile con impianti dal paese, sci quasi tutto l'anno","FTTH Open Fiber in attivazione estate 2026 su 3.800+ unità immobiliari","Comunità residente vera (~2.200 abitanti) con vita annuale, non solo villaggio turistico","Autonomia Valle d'Aosta: sanità e servizi regionali ben finanziati, A5 a 27 km (Châtillon)"],"contro":["Prezzi immobiliari fuori target: 2.500-4.500 €/mq nel paese, media comunale 6.854 €/mq trainata da Cervinia e in forte crescita (+30% in un anno)","Unico ospedale/PS a Aosta, 45-50 minuti di auto","Unica strada di accesso (SR46 da Châtillon, 27 km): traffico intenso nei weekend invernali e vulnerabilità a chiusure/neve","Costo della vita alto e affollamento turistico nei picchi stagionali","Mezze stagioni molto sonnolente; senza auto ci si muove male (bus solo verso Châtillon)"],"score_infrastrutture":6,"score_prezzo":2,"score_vivibilita":7,"score_complessivo":5.5,"descrizione":"Valtournenche è il \"paese vero\" della valle del Cervino: a 1.524 m, con circa 2.200 residenti stabili, ha tutti i servizi essenziali in loco (supermercato, farmacia, poste, scuole fino alle medie) e impianti che lo collegano al comprensorio Cervinia-Zermatt, mentre la fibra FTTH è in attivazione nell'estate 2026. Per viverci tutto l'anno è tra le opzioni più solide dell'alta montagna valdostana, ben più autentica di Breuil-Cervinia. Il problema è il prezzo: il traino di Cervinia ha portato la media comunale a quasi 7.000 €/mq e anche nel capoluogo si parte da 2.500-3.000 €/mq, oltre il doppio del target di 1.000 €/mq. Da mettere in conto anche l'ospedale a 50 minuti (Aosta) e l'unica strada d'accesso da Châtillon, congestionata nei weekend di stagione.","fonti":["https://it.wikipedia.org/wiki/Valtournenche_(comune)","https://www.immobiliare.it/mercato-immobiliare/valle-d-aosta/valtournenche/","https://www.wikicasa.it/quotazione-immobili/valtournenche/","https://www.ansa.it/valledaosta/notizie/2026/04/02/fibra-ottica-a-valtournenche-prime-attivazioni-entro-lestate_eecbd2a6-a901-4d34-9e1b-a2257d0ed9df.html","https://www.idealista.it/news/immobiliare/residenziale/2023/11/13/176536-vivere-a-valtournenche-quartieri-costi-pro-e-contro-piste","https://www.ajmtreves.edu.it/pagine/scuola-secondaria-di-valtournenche"],"_extra":false,"_verifica":null},{"nome":"Cogne","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.6081,"lng":7.3548,"altitudine_m":1534,"popolazione":1329,"prezzo_mq_min":3500,"prezzo_mq_max":5800,"prezzo_nota":"Media ufficiale immobiliare.it (novembre 2025): 4.356 €/mq, +17,8% su base annua — una delle località più care della regione (media provinciale 2.689 €/mq). Idealista per zone: 4.504-5.362 €/mq; nuove costruzioni a Lillaz/Montroz fino a ~5.800 €/mq. Il minimo 3.500 è una stima per usato datato in frazione (esistono rustici da ristrutturare a Epinel anche a ~500 €/mq, ma sono outlier non abitabili). Dati 2025-inizio 2026, affidabilità buona (media portale + ~37 annunci attivi).","tempo_auto_torino_min":115,"tempo_auto_milano_min":150,"ospedale_vicino":"Ospedale regionale Umberto Parini di Aosta (unico ospedale della Valle d'Aosta, PS con tempi codici rossi tra i migliori d'Italia), ~28 km lungo la SR47: 35-40 minuti realistici. Elisoccorso h24 da Aosta.","servizi":"In loco: 2-3 alimentari/minimarket (Market Rey, La Corbeille, Tersiva), farmacia (ristrutturata e ampliata di recente), scuola primaria e secondaria di I grado (sede associata Ist. Maria Ida Viglino), ufficio postale (aperto solo mar+ven, ATM Postamat), due banche con bancomat (Intesa Sanpaolo e BCC Valdostana). Superiori e servizi maggiori ad Aosta (~35 min).","internet":"FTTH disponibile su rete Open Fiber (piano aree bianche BUL): offerte 1000/300 Mbps commercializzate (es. Dimensione), con attivazione soggetta a verifica del civico e talvolta sopralluogo. Storicamente zona ADSL-only, la fibra è arrivata col piano Infratel: verificare il proprio civico su bandaultralarga.italia.it prima dell'acquisto.","vita_annuale":"Paese vivo tutto l'anno, con vera comunità residente (scuola, farmacia, banche, negozi aperti anche fuori stagione grazie alla doppia stagionalità turistica estate/inverno). Però in lento calo demografico (da ~1.500 a ~1.330 abitanti; record negativo storico nel 2021) e con forte peso di seconde case e ricettività: il dibattito locale teme la deriva a località solo turistica se chiudessero le medie. Novembre e maggio sono i mesi più spenti.","sci":"Impianti propri: comprensorio Cogne-Montzeuc (telecabina dal centro paese fino a 2.252 m, 2 seggiovie, 9 km di piste esposte a nord, 8 km innevamento programmato, skipass economico ~33€/giorno). Soprattutto capitale italiana dello sci di fondo: ~80 km di piste su 12-14 anelli (Prato di Sant'Orso, Lillaz, Valnontey, Epinel) + ~150 cascate di ghiaccio per ice climbing. Per lo sci alpino su grandi comprensori: Pila a ~50 min.","acqua":"Torrente Grand Eyvia («grande acqua»), formato a valle del paese dai torrenti Urtier e Valnontey, affluente della Dora Baltea; bacino glaciale del Gran Paradiso. Attenzione: esondazioni distruttive nel 2024 (alluvione di fine giugno con paese isolato, nuova piena a settembre con chiusura SR47).","esposizione":"Molto favorevole: il paese sorge in un'ampia conca aperta (il Prato di Sant'Orso, ~50 ettari, tra le distese più ampie delle Alpi) all'incrocio di più valli, ben soleggiata anche d'inverno — anomalia positiva per un fondovalle a 1.500 m. Le frazioni alte (Gimillan, 1.787 m) sono sul versante adret ancora più solatio; le piste da sci sono invece sul versante nord del Montzeuc (garanzia neve). Ore esatte di sole invernale non trovate nelle fonti.","pro":["Paese vero che vive tutto l'anno: scuola (elementari+medie), farmacia, 2 banche, alimentari, comunità residente","Conca eccezionalmente aperta e soleggiata per l'altitudine (1.534 m), dentro il Parco Nazionale del Gran Paradiso","Capitale dello sci di fondo (80 km di piste) + impianti alpino dal centro paese, turismo bistagionale che tiene aperti i servizi","FTTH Open Fiber disponibile (1 Gbps), rarità per un comune alpino di 1.300 abitanti","Aosta e ospedale regionale a soli 35-40 minuti; Torino sotto le 2 ore"],"contro":["Prezzi tra i più alti della Valle d'Aosta: media 4.356 €/mq e in forte crescita (+17,8% nel 2025) — oltre 4 volte il target di 1.000 €/mq","Accesso da un'unica strada (SR47) fragile: distrutta dall'alluvione del giugno 2024 con paese isolato per settimane, di nuovo chiusa a settembre 2024","Calo demografico costante e pressione seconde case/turistificazione: affitti per residenti scarsi, rischio futuro sui servizi scolastici","Ufficio postale aperto solo 2 giorni a settimana; scuole superiori e ogni servizio specialistico ad Aosta","Forte afflusso turistico nei picchi estivi/invernali: paese affollato e caro nei mesi di alta stagione"],"score_infrastrutture":6,"score_prezzo":2,"score_vivibilita":7,"score_complessivo":5,"descrizione":"Cogne è forse il comune sopra i 1.500 metri più «abitabile» delle Alpi occidentali: una conca ampia e soleggiata dentro il Parco del Gran Paradiso, con scuola fino alle medie, farmacia, banche, fibra FTTH e una comunità di ~1.330 residenti che vive di turismo bistagionale, non un dormitorio di seconde case. Il rovescio della medaglia è il prezzo: 4.300-5.500 €/mq in crescita rapida, del tutto fuori target per chi cerca casa a ~1.000 €/mq, più la fragilità dell'unica strada di accesso dimostrata dall'alluvione del 2024. È la scelta giusta per chi privilegia qualità della vita, natura d'eccellenza e servizi reali ed è disposto a pagarli cari; sbagliata per chi cerca un affare immobiliare in quota.","fonti":["https://www.immobiliare.it/mercato-immobiliare/valle-d-aosta/cogne/","https://www.idealista.it/vendita-case/cogne-aosta/","https://www.tuttitalia.it/valle-d-aosta/43-cogne/","https://www.geomagazine.it/2025/07/27/cogne-2050-ritorno-al-futuro/","https://bandaultralarga.italia.it/","https://www.lovevda.it/it/banca-dati/3/localita/valle-d-aosta/cogne/380"],"_extra":false,"_verifica":null},{"nome":"La Thuile","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.716,"lng":6.95,"altitudine_m":1441,"popolazione":743,"prezzo_mq_min":2500,"prezzo_mq_max":6600,"prezzo_nota":"Media ufficiale immobiliare.it: 4.921 €/mq (set 2024, +12,9% a/a); FIAIP 2025 indica ~4.600 €/mq per nuovo/ristrutturato; RealAdvisor stima 5.495 €/mq (giu 2026). Il range 2.500-6.600 è dedotto dagli annunci idealista 2025-26: rustici/frazioni decentrate (Orgères, Pont Serrand) 2.100-2.900 €/mq, appartamenti in centro/Moulin vicino alle piste 5.000-6.600 €/mq. Affidabilità media-alta: mix di medie di portale e range da ~50 annunci attivi.","tempo_auto_torino_min":115,"tempo_auto_milano_min":155,"ospedale_vicino":"Ospedale regionale Umberto Parini di Aosta (Viale Ginevra 3), unico PS della regione: ~40 km, 45-50 min via SS26+A5. In stagione invernale centro traumatologico ai piedi delle piste (dic-apr). Guardia medica/ambulatorio a Morgex (15 min).","servizi":"Servizi completi per un paese di 750 abitanti, concentrati in via M. Collomb: supermercato CRAI (zona Planibel) + 2-3 alimentari, farmacia Berthet, scuola dell'infanzia e primaria in paese (medie a Morgex, 15 min), ufficio postale con ATM, due banche (BCC Valdostana e UniCredit con sportello). Superiori e servizi maggiori ad Aosta (45 min).","internet":"FTTH Open Fiber (piano aree bianche Infratel) attiva nel concentrico, offerte fino a 2,5 Gbit con vari operatori (fonte: dimensione.com/Open Fiber). Copertura da verificare all'indirizzo nelle frazioni sparse (Pont Serrand, Villaret); dati AGCOM storici obsoleti.","vita_annuale":"Bistagionale forte ma non destagionalizzato: inverno lungo (dicembre-metà/fine aprile grazie al microclima) ed estate viva (MTB, trekking, Skyway vicina); maggio-giugno e ottobre-novembre il paese si svuota e molte attività chiudono. 743 residenti contro migliaia di posti letto turistici (il complesso Planibel da solo domina l'offerta): le seconde case e gli alloggi sfitti prevalgono nettamente, il FIAIP segnala il fenomeno \"luci spente\". Il nucleo residente però esiste: scuola, banche, poste e negozi aperti tutto l'anno.","sci":"Comprensorio internazionale Espace San Bernardo (La Thuile-La Rosière, Francia): ~152 km di piste, 37 impianti, partenza cabinovia direttamente in paese (Planibel); heliski e freeride rinomati, stagione fino a fine aprile.","acqua":"Dora di Verney (che riceve la Doire du Rutor: il paese sorge alla confluenza dei due torrenti); cascate del Rutor, lago Verney al Piccolo San Bernardo e ~15 laghi alpini nel territorio comunale.","esposizione":"Paese in conca a 1.441 m in un vallone laterale: microclima tra i più freddi delle Alpi italiane (clima classificato \"tundra\", zona F, 4.394 gradi-giorno), sole invernale scarso nel fondovalle a dicembre-gennaio per l'ombra dei versanti (stima: nessuna fonte quantifica le ore, ma il freddo da conca è documentato). I versanti sciistici in ombra/nord conservano benissimo la neve, vantaggio per lo sci ma non per chi ci abita d'inverno.","pro":["FTTH Open Fiber fino a 2,5 Gbit: rarità per un comune alpino di 750 abitanti","Servizi completi in loco: supermercato, farmacia, scuola primaria, poste, 2 banche","Sci internazionale (152 km Espace San Bernardo) con partenza impianti in paese e stagione lunghissima","A5 a 15 minuti (uscita Morgex): Torino sotto le 2 ore, Milano 2h30","Natura di prim'ordine: Rutor, laghi alpini, Piccolo San Bernardo, versante wild del Monte Bianco"],"contro":["Prezzi 4.600-4.900 €/mq di media, quasi 5 volte il target di 1.000 €/mq","Inverno molto rigido e poco sole nel fondovalle a dicembre-gennaio (conca, clima 'tundra')","Economia dominata da seconde case e turismo: paese svuotato in maggio-giugno e ottobre-novembre","Unico pronto soccorso regionale ad Aosta, 45-50 minuti di auto","Popolazione in calo (da 829 nel 2021 a 743 nel 2026) e lavoro locale quasi solo turistico-stagionale"],"score_infrastrutture":7,"score_prezzo":3,"score_vivibilita":6,"score_complessivo":5.5,"descrizione":"La Thuile è l'ultimo paese italiano prima del Piccolo San Bernardo: una conca a 1.441 m con 743 residenti, un comprensorio sciistico internazionale che parte dal centro del paese e una dotazione di servizi (scuola, farmacia, banche, FTTH a 2,5 Gbit) sorprendente per le sue dimensioni. È però una località turistica matura con prezzi da 4.600-4.900 €/mq di media, molto lontani dal target, e un inverno tra i più freddi e bui delle Alpi italiane per via della conca in ombra. Chi cerca sci vero, natura selvaggia e connettività eccellente qui trova tutto; chi cerca un paese economico, soleggiato e vivo dodici mesi l'anno dovrebbe guardare altrove, perché nelle mezze stagioni La Thuile si spegne insieme alle luci delle seconde case.","fonti":["https://www.immobiliare.it/mercato-immobiliare/valle-d-aosta/la-thuile/","https://www.idealista.it/vendita-case/la-thuile-aosta/","https://it.wikipedia.org/wiki/La_Thuile_(Italia)","https://www.comune.la-thuile.ao.it/it/page/scheda-del-comune-1","https://www.dimensione.com/portale/fibra-internet-casa-ftth-2.5-giga-a-la-thuile-ao-7041.php","https://aostasera.it/notizie/economia/record-compravendite-di-case-in-valle-nel-2025-ma-il-mercato-immobiliare-e-a-piu-velocita/"],"_extra":false,"_verifica":null},{"nome":"Gressoney-Saint-Jean","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.7769,"lng":7.8268,"altitudine_m":1385,"popolazione":769,"prezzo_mq_min":3000,"prezzo_mq_max":5200,"prezzo_nota":"Media ufficiale immobiliare.it: 3.836 €/mq (set 2025), 3.678 €/mq (dic 2025), -1,5% su base annua; media provinciale AO 2.679 €/mq. Idealista (annunci, ~12 attivi): 3.024 €/mq case >80mq, 3.900 €/mq appartamenti, rustici da ristrutturare ~2.000 €/mq. RealAdvisor: appartamenti fino a 5.228 €/mq. Il range 3.000-5.200 combina media ufficiale e annunci; il minimo assoluto (~2.000 €/mq) riguarda solo rustici/rascard da ristrutturare integralmente. Mercato di pregio turistico: quasi 4x il target di 1.000 €/mq.","tempo_auto_torino_min":105,"tempo_auto_milano_min":130,"ospedale_vicino":"Nessun PS in valle. Il più vicino è l'Ospedale di Ivrea (~50 km, ~55 min); alternativa Ospedale degli Infermi di Ponderano-Biella (~65 min). L'ospedale di riferimento regionale è il Parini di Aosta (~75 km, ~70-80 min). In inverno centro traumatologico stagionale a Gressoney-La-Trinité/Staffal; elisoccorso valdostano h24 (tempi stimati da mappe, non misurati).","servizi":"Dotazione completa per un paese di ~770 abitanti: piccoli supermercati/alimentari in centro, Farmacia Monte Rosa (piazza Beck Peccoz), scuole infanzia + primaria + secondaria di I grado in loco (pluriclassi, Ist. \"Elio Reinotti\"), ufficio postale (Villa Deslex, anche rilascio passaporti) e sportello Intesa Sanpaolo con bancomat. Superiori e ospedale fuori valle (Pont-Saint-Martin/Ivrea/Aosta).","internet":"FTTH Open Fiber attiva (progetto BUL/Infratel, lavori dal 2022, estensione PNRR): al municipio risultano FTTH fino a 2,5 Gbps, FTTC/VDSL fino a 200 Mbps e FWA; copertura 4G/5G presente. Copertura non uniforme nelle frazioni: verifica puntuale al civico consigliata (openfiber.it).","vita_annuale":"Uno dei paesi più vivi della valle del Lys: doppia stagione turistica (inverno sci, estate escursionismo), Bandiera Arancione TCI, comunità Walser radicata, scuole fino alle medie e negozi aperti tutto l'anno. Forte però il peso delle seconde case (dato % non trovato, ma i posti letto turistici superano di molto i 769 residenti): nelle interstagioni (maggio-giugno, ottobre-novembre) il paese si svuota e diversi esercizi riducono orari o chiudono. Quieto fuori stagione, ma non \"morto\" come i comuni più piccoli della valle.","sci":"Impianti propri a Weissmatten (seggiovia + skilift, ~10 km piste, 1.385-2.040 m, 100% innevamento programmato, pista Leonardo David con sci notturno). A 10 km, Gressoney-La-Trinité/Staffal è la porta del comprensorio Monterosa Ski (~130 km con Alagna e Champoluc). In paese: 25 km di anelli di fondo dal lago Gover/piana di Dresal.","acqua":"Torrente Lys, che nasce dai ghiacciai del Monte Rosa e attraversa il paese; in centro il piccolo lago Gover (balneazione no, pesca e pattinaggio invernale).","esposizione":"Valle orientata circa nord-sud: la conca di Saint-Jean (piana di Dresal) è relativamente aperta e più luminosa dei comuni bassi della valle, ma in pieno inverno il fondovalle resta in ombra per parte della giornata, con sole diretto limitato alle ore centrali (fonti descrittive TCI; ore di sole invernali precise non trovate — stima: 3-5 ore a dicembre-gennaio). I versanti alti (Weissmatten, frazioni in quota lato est) godono di esposizione migliore.","pro":["Servizi completi in loco per la taglia: scuole fino alle medie, farmacia, banca, poste, negozi","FTTH Open Fiber fino a 2,5 Gbps già attiva, raro a 1.385 m","Doppia stagione turistica vera + comunità Walser: il paese vive tutto l'anno, non solo a Natale","Sci in casa (Weissmatten) + Monterosa Ski a 10 minuti, fondo e sentieri dal centro","Milano e Torino raggiungibili in ~2 ore: pendolarismo occasionale e weekend fattibili"],"contro":["Prezzi 3.700-5.200 €/mq: quasi quadruplo del target 1.000 €/mq, mercato dominato dalle seconde case","Pronto soccorso a ~55 minuti (Ivrea), ospedale regionale a oltre un'ora: criticità per anziani o patologie croniche","27 km di strada regionale di montagna fino all'autostrada, impegnativa d'inverno (neve, traffico weekend sciistici)","Sole invernale limitato nel fondovalle nelle ore non centrali, inverni lunghi e freddi","Interstagioni molto quiete: parte di negozi e ristoranti chiude o riduce gli orari; scuole superiori e lavoro fuori valle"],"score_infrastrutture":6,"score_prezzo":4,"score_vivibilita":7,"score_complessivo":6,"descrizione":"Gressoney-Saint-Jean è il capoluogo \"vero\" della valle del Lys: un paese Walser di circa 770 abitanti a 1.385 m ai piedi del Monte Rosa, con scuole, farmacia, banca, poste, fibra FTTH e una vita che regge tutto l'anno grazie alla doppia stagione turistica. Per chi vuole trasferirsi è una delle scelte più vivibili delle Alpi occidentali, ma si paga: i prezzi (3.700-5.200 €/mq, con solo i rustici da ristrutturare sotto i 2.500) sono lontanissimi dal target di 1.000 €/mq. I compromessi reali sono la sanità (pronto soccorso a quasi un'ora) e i 27 km di strada di montagna che separano dal fondovalle e dall'autostrada. Ideale per chi lavora da remoto e cerca una montagna abitata e ben servita; sconsigliato a chi cerca un affare immobiliare o dipende da servizi ospedalieri vicini.","fonti":["https://www.tuttitalia.it/valle-d-aosta/29-gressoney-saint-jean/","https://www.immobiliare.it/mercato-immobiliare/valle-d-aosta/gressoney-saint-jean/","https://www.idealista.it/vendita-case/gressoney-saint-jean-aosta/","https://realadvisor.it/it/mercato-immobiliare/comune-gressoney-saint-jean-it","https://www.fibra.site/1230/verifica-copertura-fibra-ottica-gressoney-saint-jean-valle-d-aosta-vallee-d-aoste","https://www.touringclub.it/notizie/bandiere-arancioni/un-inverno-stare-comodi-gressoney-saint-jean-valle-daosta"],"_extra":false,"_verifica":null},{"nome":"Ayas","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.81611,"lng":7.69033,"altitudine_m":1699,"popolazione":1358,"prezzo_mq_min":2200,"prezzo_mq_max":6300,"prezzo_nota":"Media ufficiale immobiliare.it aprile 2025: 5.043 €/mq (+12% su apr 2024), massimo biennale; minimo lug 2023 a 3.813 €/mq. Range per zona da Requot: 1.000 €/mq (zona residuale montana R1) — 6.300 €/mq (Champoluc centro); ville frazioni centrali da 2.200 €/mq. RealAdvisor mag 2025: appartamenti media 5.134 €/mq, case 3.409 €/mq. Il min 2.200 riflette frazioni non prime; il target 1.000 €/mq esiste solo per ruderi/zone marginali. Idealista non pubblica media comunale per Ayas.","tempo_auto_torino_min":105,"tempo_auto_milano_min":140,"ospedale_vicino":"Ospedale regionale Umberto Parini di Aosta (unico PS della regione), ~60 km, 55-70 min di auto. In inverno centro traumatologico a Champoluc per infortuni da sci; guardia medica di distretto e ambulatorio turistico estivo; elisoccorso 112 da Aosta. Ospedale di comunità (non PS) in costruzione a Verrès, ~30 min.","servizi":"Mini market e alimentari ad Antagnod e Champoluc, farmacia San Rocco a Champoluc + dispensario ad Antagnod, scuola infanzia e primaria ad Antagnod (mensa e scuolabus comunali), scuola media a Brusson (8 km, scuolabus), uffici postali ad Antagnod e Champoluc (aperture parziali), sportello bancario in loco. Supermercati più grandi e servizi completi a Verrès (27 km).","internet":"FTTH disponibile: rete pubblica BUL/Open Fiber (aree bianche) attiva nel comune con CNO installato; vendono FTTH fino a 1-2,5 Gbps Olinko, Dimensione e l'operatore locale valdostano FastAlp. Copertura da verificare per singola frazione/civico su bandaultralarga.italia.it (le borgate alte come Cuneaz/Mascognaz possono restare su FWA).","vita_annuale":"Comunità reale di ~1.350 residenti distribuita su più frazioni: Antagnod (capoluogo) mantiene vita di paese tutto l'anno con scuole, negozi e parrocchia; Champoluc è più turistica e sente il calo nelle mezze stagioni (novembre, maggio), senza però diventare paese fantasma grazie a doppia stagionalità forte inverno+estate. Quota rilevante di seconde case, ma di proprietari abituali più che speculative; meno mondana di Courmayeur e meno stagionale di Cervinia.","sci":"Impianti in casa: Champoluc/Frachey è una delle tre porte del comprensorio Monterosa Ski (~132 km di piste, collegato a Gressoney e Alagna), più la piccola stazione di Antagnod, soleggiata e adatta alle famiglie. Freeride di livello internazionale, sci alpinismo e fondo a Brusson (8 km).","acqua":"Torrente Evançon, che percorre tutta la Val d'Ayas; numerosi laghi alpini nel vallone (Lago Blu sopra Saint-Jacques, laghi di Frudière e Palasina nei dintorni).","esposizione":"Antagnod (capoluogo, 1.699-1.728 m) è sul versante adret/solatio in destra orografica, esposto a sud ai piedi dello Zerbion: descritto costantemente come \"balcone baciato dal sole\" con vista Monte Rosa, buon irraggiamento anche in pieno inverno. Champoluc, sul fondovalle alla testata, ha meno ore di sole invernali (ombra dei versanti); dato preciso di ore di sole non trovato — stima da orografia.","pro":["FTTH fino a 1-2,5 Gbps via rete BUL/Open Fiber, raro a queste quote","Comprensorio Monterosa Ski in casa + stazione famiglie ad Antagnod, doppia stagione turistica vera (estate forte)","Antagnod: capoluogo solatio esposto a sud, tra i Borghi più belli d'Italia, con scuole, poste, banca e negozi in loco","Torino a ~1h45 e Milano a ~2h20 via A5 uscita Verrès: raggiungibile nel weekend senza tratti critici","Comunità residente viva tutto l'anno, fiscalità e servizi della Valle d'Aosta (regione autonoma)"],"contro":["Prezzi ben oltre il target: media 5.043 €/mq (apr 2025, +12% in un anno); sotto i 3.000 €/mq solo frazioni marginali o immobili da ristrutturare","Pronto soccorso solo ad Aosta, 55-70 minuti di auto: criticità reale per famiglie e anziani","Scuola media già fuori comune (Brusson) e superiori a Verrès/Aosta: pendolarismo scolastico inevitabile","27 km di strada regionale di montagna per qualsiasi servizio completo (Verrès); traffico intenso nei weekend di stagione","Forte peso delle seconde case a Champoluc: mezze stagioni sottotono e mercato drogato dalla domanda turistica"],"score_infrastrutture":6,"score_prezzo":3,"score_vivibilita":7,"score_complessivo":6,"descrizione":"Ayas è un comune sparso a 1.699 m alla testata della valle dell'Evançon, sotto il Monte Rosa: il capoluogo Antagnod è un borgo solatio esposto a sud con scuole, negozi e vita di paese tutto l'anno, mentre Champoluc è la porta del comprensorio Monterosa Ski. Per chi si trasferisce offre un mix raro in quota: fibra FTTH, comunità residente vera, doppia stagione turistica e Torino a meno di due ore. I nodi sono il prezzo — la media chiesta supera i 5.000 €/mq, cinque volte il target di 1.000 — e la sanità, con il pronto soccorso solo ad Aosta a un'ora di auto. Scelta eccellente per qualità di vita alpina se il budget lo consente; da escludere se il vincolo di prezzo è rigido.","fonti":["https://www.tuttitalia.it/valle-d-aosta/96-ayas/","https://www.immobiliare.it/mercato-immobiliare/valle-d-aosta/ayas/","https://realadvisor.it/it/mercato-immobiliare/comune-ayas-it","https://www.requot.com/valutazione-immobili/Ayas.html","https://olinko.it/of/copertura-fibra-ftth-ayas-ao.php","https://www.lovevda.it/it/prima-di-partire/informazioni/servizi-numeri-utili"],"_extra":false,"_verifica":null},{"nome":"Bormio","provincia":"Sondrio","regione":"Lombardia","lat":46.46747,"lng":10.3705,"altitudine_m":1225,"popolazione":3908,"prezzo_mq_min":3500,"prezzo_mq_max":7000,"prezzo_nota":"Medie ufficiali dei portali: immobiliare.it/mercato-immobiliare febbraio 2026 = 5.729 €/mq (+5,6% su feb 2025); idealista report gennaio 2026 = 5.449 €/mq (+6,5% anno). Il range 3.500-7.000 è dedotto: minimo da annunci di appartamenti piccoli/da ristrutturare in zone periferiche (da 115-150k€), massimo da seconde case di pregio in centro (Tecnocasa via Il Giorno cita medie fino a ~6.950 €/mq). Dato molto affidabile (mercato liquido, decine di annunci), gonfiato dall'effetto Olimpiadi Milano-Cortina 2026. Fuori target 1000 €/mq di un fattore 5.","tempo_auto_torino_min":260,"tempo_auto_milano_min":190,"ospedale_vicino":"Ospedale Eugenio Morelli di Sondalo (ASST Valtellina e Alto Lario), con Pronto Soccorso, ~18 km / 17-19 minuti lungo la SS38. A Bormio stessa c'è un PreSST (presidio socio-sanitario, non PS) e il Policlinico Olimpico modulare costruito per i Giochi 2026.","servizi":"Tutto in loco: supermercati (Iperal, Coop, Crai), più farmacie, poste, diverse banche, scuole dall'infanzia alle superiori (Istituto d'istruzione secondaria Alberti), terme (Bormio Terme, Bagni Vecchi e Nuovi), negozi, ristoranti e bus locali. È il capoluogo di servizi dell'Alta Valtellina.","internet":"FTTH Open Fiber (piano BUL aree bianche): oltre 6.500 unità immobiliari coperte fino a 1 Gbps, offerte retail fino a 2,5 Gbps (es. Dimensione); rete potenziata in vista delle Olimpiadi 2026. Copertura eccellente per un comune montano.","vita_annuale":"Paese autenticamente vivo tutto l'anno: ~3.900 residenti stabili, scuole di ogni grado, doppia stagionalità (sci d'inverno, terme/bici/Stelvio/trekking d'estate) e flusso termale anche nelle mezze stagioni. Le seconde case sono però in forte espansione (54% degli acquirenti sono investitori per affitto turistico) e spingono i prezzi; il centro resta comunque animato anche fuori stagione, a differenza dei paesi-dormitorio da sci.","sci":"Comprensorio proprio Bormio Ski (fino a Cima Bianca 3.012 m, pista Stelvio di Coppa del Mondo, sede gare olimpiche 2026) con partenza funivia in paese; a 10-15 min Santa Caterina Valfurva, a 40 min Livigno; skipass Alta Valtellina. Sci estivo allo Stelvio.","acqua":"Fiume Adda e torrente Frodolfo, che confluiscono proprio a Bormio; celebri sorgenti termali calde (Bagni Vecchi/Nuovi).","esposizione":"Bormio sorge in una conca ampia e aperta alla confluenza di quattro valli, molto più soleggiata dei fondovalle stretti della media Valtellina: buona insolazione invernale sul paese e piste esposte al sole gran parte del giorno. La conca è però orograficamente riparata (poca neve naturale in paese) e alcune frazioni ai piedi del Reit hanno ombra invernale; il capoluogo non è un paese-ubac.","pro":["Servizi completi da cittadina vera: scuole fino alle superiori, banche, supermercati, terme, ospedale a 18 minuti","Fibra FTTH Open Fiber fino a 1-2,5 Gbps, rara a queste quote — ideale per lavoro remoto","Vita reale tutto l'anno grazie a doppia stagione sci+terme, non un paese fantasma a novembre","Sci di livello mondiale in paese (pista Stelvio, Olimpiadi 2026) più Livigno e S. Caterina vicine","Conca aperta e soleggiata, natura del Parco dello Stelvio alle porte"],"contro":["Prezzi immobiliari fuori scala rispetto al target: 5.400-5.700 €/mq di media, 5-6 volte i 1000 €/mq cercati, in ulteriore crescita post-Olimpiadi","Lontananza reale: 3h-3h20 da Milano su SS36/SS38 spesso congestionate nei weekend, 4h-4h30 da Torino, niente autostrada né stazione (treno solo a Tirano, 40 km)","Pressione turistica forte: affollamento in alta stagione, boom di seconde case e affitti brevi che erodono il mercato per residenti","Costo della vita da località turistica, superiore alla media provinciale","Inverni lunghi e rigidi; PS a Sondalo, non in paese"],"score_infrastrutture":7,"score_prezzo":2,"score_vivibilita":8,"score_complessivo":6,"descrizione":"Bormio è probabilmente il posto dove è più facile vivere davvero tutto l'anno sopra i 1200 metri in Lombardia: una cittadina di quasi 4.000 abitanti con scuole fino alle superiori, terme, fibra FTTH e un'economia che gira dodici mesi l'anno tra sci e turismo termale, in una conca ampia e soleggiata alla confluenza di Adda e Frodolfo. Il problema è che questo lo sanno tutti: con medie di 5.400-5.700 €/mq in crescita sull'onda delle Olimpiadi 2026, comprare casa costa cinque volte il target di 1000 €/mq. Va messa in conto anche la distanza vera dalle città (3 ore abbondanti da Milano su statali, oltre 4 da Torino) e un pronto soccorso a 18 minuti a Sondalo. Scelta eccellente per qualità della vita montana, pessima per il portafoglio.","fonti":["https://www.immobiliare.it/mercato-immobiliare/lombardia/bormio/","https://www.idealista.it/sala-stampa/report-prezzo-immobile/vendita/lombardia/sondrio-provincia/bormio/","https://www.tuttitalia.it/lombardia/91-bormio/","https://www.comune.bormio.so.it/news/lavori-la-rete-banda-ultra-larga-una-rete-al-servizio-di-cittadini-e-imprese-del-territorio","https://www.idealista.it/news/immobiliare/residenziale/2024/01/29/177821-vivere-a-bormio-migliori-zone-prezzi-case-pro-e-contro","https://www.bormio.eu/it/servizi/ospedale-eugenio-morelli-sondalo"],"_extra":false,"_verifica":null},{"nome":"Ponte di Legno","provincia":"Brescia","regione":"Lombardia","lat":46.25944,"lng":10.50944,"altitudine_m":1258,"popolazione":1756,"prezzo_mq_min":3500,"prezzo_mq_max":7000,"prezzo_nota":"Media ufficiale immobiliare.it ott 2025: 4.520 €/mq (+6,1% su 2024, picco 4.603 a set 2025); RealAdvisor feb 2026: 4.209 €/mq; OMI 1.930-4.130 €/mq; Borsa Immobiliare Brescia stima 6.730 €/mq; nuove costruzioni 7.000 €/mq con punte 10.000 (green). Range 3.500-7.000 = usato in frazioni/da ristrutturare fino a nuovo in centro. Dato affidabile (mercato liquido, ~190 annunci su idealista), gonfiato da seconde case, terme in arrivo e Olimpiadi 2026.","tempo_auto_torino_min":215,"tempo_auto_milano_min":150,"ospedale_vicino":"Ospedale di Edolo (ASST Valcamonica) con Pronto Soccorso, ~20 km / 20-25 min su SS42; ospedale più grande a Esine ~45-50 min. In paese: Casa di Comunità con guardia medica e ambulatorio infermieristico.","servizi":"In loco: supermercati Sigma, Migross e Conad Margherita, farmacia (0364 91032), ufficio postale (via Sora 11, aperto anche ad agosto), sportelli bancari, scuola infanzia + primaria + media (IC Don Antonioli), CFP regionale. Superiori a Edolo (16 km, liceo/istituto Meneghini).","internet":"Copertura mista FTTH (Open Fiber/FiberCop, fino a 1-2,5 Gbps nelle zone raggiunte, in espansione con Piano Italia 1 Giga PNRR), FTTC fino a 200 Mbps e FWA 5G per le zone non cablate. Verifica puntuale al civico consigliata: la FTTH non copre ancora tutte le frazioni. Fonte: selectra.net/arcolink, mag 2026.","vita_annuale":"Doppia anima: l'85% degli immobili è seconda casa (dato area Ponte di Legno-Temù-Vione) e nei picchi turistici si passa da 1.750 a ~30.000 presenze, ma il nucleo residente è vivo tutto l'anno: 1° posto qualità della vita 2025 tra i piccoli comuni bresciani (Giornale di Brescia), scuole aperte, Comune attivo contro lo spopolamento (housing sociale 50 alloggi, canoni moderati per giovani coppie, hotel 5 stelle con 200 posti di lavoro annuali). Nelle mezze stagioni (maggio, novembre) il paese rallenta molto.","sci":"Comprensorio Pontedilegno-Tonale (100 km di piste con Passo Tonale e ghiacciaio Presena fino a 3.000 m, stagione da ottobre/novembre a primavera); cabinovia dal paese, sede di gare e sci di fondo in Val Sozzine.","acqua":"Il fiume Oglio nasce in centro paese dalla confluenza dei torrenti Frigidolfo (Val delle Messi/Gavia) e Narcanello (Val Sozzine, ghiacciaio Presena).","esposizione":"Conca/pianoro di fondovalle a testata della Val Camonica: il marketing lo descrive \"pianoro soleggiato\", ma le fonti climatiche indicano Ponte di Legno tra le località meno esposte al sole dell'alta valle in inverno, con inverni rigidi e neve persistente. Frazioni alte (Zoanno, Pezzo) meglio esposte del fondovalle. Ore di sole invernali esatte non trovate (stima: sole limitato dicembre-gennaio in centro).","pro":["Servizi completi rari a 1.258 m: supermercati, farmacia, poste, banche, scuole fino alle medie, guardia medica in paese","Comprensorio sciistico di prima fascia (Pontedilegno-Tonale, 100 km, ghiacciaio) con cabinovia dal paese","1° posto qualità della vita 2025 tra i piccoli comuni bresciani; comunità residente vera e Comune attivo contro lo spopolamento","FTTH già presente e in espansione con il PNRR","Mercato immobiliare liquido e in crescita (terme in arrivo, Olimpiadi 2026): l'acquisto tiene il valore"],"contro":["Prezzi tra i più alti delle Alpi lombarde: 4.200-4.600 €/mq medi, 7.000+ per il nuovo — lontanissimo dal target 1.000 €/mq","85% seconde case: fuori stagione (maggio, novembre) il paese si svuota molto","Torino è lontana: 3h30-3h45 di auto; anche Milano richiede 2h30, con traffico da rientro weekend sulla SS42","Inverno rigido e sole limitato nel fondovalle; PS piccolo a 20-25 min (Edolo), ospedale vero a 50 min (Esine)","Economia quasi solo turistica: opportunità di lavoro locali limitate fuori dal settore"],"score_infrastrutture":7,"score_prezzo":2,"score_vivibilita":7,"score_complessivo":6,"descrizione":"Ponte di Legno è la \"capitale\" dell'alta Val Camonica: un paese vero di ~1.750 residenti a 1.258 m dove nasce il fiume Oglio, con tutti i servizi essenziali in loco, scuole aperte, fibra in arrivo ovunque e uno dei migliori comprensori sciistici lombardi collegato in cabinovia. Per viverci tutto l'anno funziona meglio di quasi ogni altro comune alpino sopra i 1.200 m, tanto da vincere la classifica bresciana di qualità della vita 2025. Il problema è il prezzo: 4.500 €/mq medi (fino a 7.000+ per il nuovo), quattro volte il target di 1.000 €/mq, gonfiati da un mercato all'85% di seconde case, dalle terme in costruzione e dalle Olimpiadi 2026. Da valutare le frazioni (Pezzo, Zoanno, Precasaglio) o i comuni vicini come Temù e Vezza d'Oglio per spendere sensibilmente meno restando nello stesso bacino di servizi.","fonti":["https://www.immobiliare.it/mercato-immobiliare/lombardia/ponte-di-legno/","https://realadvisor.it/it/mercato-immobiliare/25056-ponte-di-legno","https://www.tuttitalia.it/lombardia/90-ponte-di-legno/","https://www.teleboario.it/notizia/13714/una-valle-di-seconde-case-a-ponte-di-legno-sono-l-85/","https://selectra.net/internet/copertura/fastweb/lombardia/ponte-di-legno","https://www.giornaledibrescia.it/qualita-della-vita/ponte-di-legno-paesi-vincitori-lbh1mb82"],"_extra":false,"_verifica":null},{"nome":"Livigno","provincia":"Sondrio","regione":"Lombardia","lat":46.53842,"lng":10.13524,"altitudine_m":1816,"popolazione":6801,"prezzo_mq_min":5000,"prezzo_mq_max":9400,"prezzo_nota":"Immobiliare.it (nov 2025): media richiesta ufficiale 6.966 €/mq, +9,8% su nov 2024 — vs 1.891 €/mq media provinciale. Idealista: maggior parte annunci tra 5.050 e 9.400 €/mq, media ~7.250 €/mq. I valori OMI/Agenzia Entrate (compravendite reali) sono più bassi: 2.300-4.950 €/mq, fino a 1.600 €/mq in zone periferiche (Val Federia, Foscagno, Trepalle). Il range indicato riflette i prezzi richiesti negli annunci 2025; mercato spinto da domanda turistica internazionale e Olimpiadi 2026.","tempo_auto_torino_min":290,"tempo_auto_milano_min":230,"ospedale_vicino":"In loco c'è un Punto di Primo Intervento gestito dal Niguarda (stabilizzazione emergenze + ambulanza AREU), ma il vero ospedale con Pronto Soccorso è il Morelli di Sondalo, ~60 km / 70-80 min di auto attraverso il Passo Foscagno (2.291 m), meteo permettendo","servizi":"Tutto in loco, dotazione da cittadina grazie all'economia turistica e duty-free: numerosi supermercati e alimentari, farmacie, 8 scuole di ogni ordine e grado (materna fino alle superiori), ufficio postale, 6 filiali bancarie, poliambulatorio, casa di riposo, palestre, negozi di ogni tipo","internet":"FTTH vera (Open Fiber, piano Aree Bianche Infratel) attiva nel comune, offerte fino a 2,5 Gbps; copertura da verificare al civico per frazioni e case sparse (Trepalle, valli laterali)","vita_annuale":"Paese autenticamente vivo: 6.800 residenti veri, natalità tra le più alte d'Italia, occupazione altissima, comunità forte. Doppia alta stagione (dic-apr e giu-set) frenetica; in interstagione (maggio, ott-nov) molti bar/hotel/negozi chiudono e il ritmo cala drasticamente, ma il tessuto residenziale resta attivo tutto l'anno. Problema opposto alle solite località: le case per residenti scarseggiano perché i proprietari preferiscono l'affitto turistico","sci":"Comprensorio proprio di primissimo livello: Carosello 3000 + Mottolino, ~115 km di piste (1.816-2.900 m), snowpark tra i migliori d'Europa, sede olimpica Milano-Cortina 2026 (freestyle e snowboard); fondo e scialpinismo eccellenti, neve garantita da altitudine e snow-farming","acqua":"Torrente Spöl (Aqua Granda) che attraversa il paese; Lago di Livigno (bacino artificiale) a nord verso il confine svizzero","esposizione":"Valle ampia orientata NE-SO con fondovalle largo: buona insolazione invernale su entrambi i versanti rispetto alle valli strette (le fonti la descrivono come \"valle ampia e soleggiata\", inverni \"lunghi e luminosi\"). Attenzione però alle inversioni termiche: è una delle località abitate più fredde d'Italia, con minime sotto i -20°C in gennaio-febbraio","pro":["Regime extradoganale duty-free: benzina, spesa ed elettronica nettamente più economici, vantaggio concreto quotidiano per i residenti","Servizi completi in loco (scuole fino alle superiori, 6 banche, PPI sanitario, FTTH 2,5 Gbps) rarissimi a 1.816 m di quota","Economia fortissima tutto l'anno: piena occupazione, comunità viva, natalità record — non è un paese di seconde case morte","Sci world-class sotto casa (115 km di piste, sede olimpica 2026) più estate outdoor di alto livello nel Parco dello Stelvio","Neve garantita e inverni lunghi e luminosi in una valle ampia e soleggiata"],"contro":["Prezzi immobiliari proibitivi: ~7.000 €/mq richiesti (7 volte il target di 1.000 €/mq), tra i più cari delle Alpi italiane, e affitti annuali quasi introvabili","Isolamento reale: unico accesso italiano via Passo Foscagno a 2.291 m (o tunnel svizzero a pagamento), 3h45+ da Milano, quasi 5h da Torino","Ospedale vero a 70-80 min (Sondalo), criticità per patologie croniche o emergenze gravi in caso di maltempo","Clima estremo: uno dei comuni abitati più freddi d'Italia, punte sotto i -20°C, inverno da novembre a maggio","Ritmo dettato dal turismo di massa: alta stagione caotica e cara, interstagioni con molte attività chiuse"],"score_infrastrutture":6,"score_prezzo":1,"score_vivibilita":7,"score_complessivo":5,"descrizione":"Livigno è un caso unico nelle Alpi italiane: a 1.816 metri, zona extradoganale duty-free, con un'economia turistica bistagionale così forte da garantire piena occupazione, 6.800 residenti veri, natalità record e servizi da cittadina — scuole fino alle superiori, sei banche, fibra FTTH a 2,5 Giga e persino un punto di primo intervento gestito dal Niguarda. Il rovescio della medaglia è brutale per chi cerca casa: i prezzi richiesti viaggiano intorno ai 7.000 €/mq (sette volte il target di 1.000 €/mq) e gli affitti annuali sono quasi introvabili perché tutto va al turismo. A questo si aggiungono l'isolamento (unico accesso italiano dal Passo Foscagno a 2.291 m, ospedale a 75 minuti, quasi 4 ore da Milano) e uno dei climi più rigidi d'Italia. È una scelta eccellente per chi ha reddito alto o lavoro nel turismo e vuole neve garantita e vita di paese autentica; è fuori scala per chi cerca la casa in montagna a prezzo accessibile.","fonti":["https://www.immobiliare.it/mercato-immobiliare/lombardia/livigno/","https://www.idealista.it/news/immobiliare/residenziale/2023/12/27/177332-vivere-a-livigno-migliori-zone-costi-pro-e-contro","https://www.tuttitalia.it/lombardia/27-livigno/","https://www.ospedaleniguarda.it/in-evidenza/leggi/punto-di-primo-intervento-ppi-di-livigno-sondrio","https://www.dimensione.com/portale/fibra-internet-casa-ftth-2.5-giga-a-livigno-so-14037.php","https://www.livigno.eu/en/arrive-by-car"],"_extra":false,"_verifica":null},{"nome":"Etroubles","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.81976,"lng":7.2329,"altitudine_m":1270,"popolazione":484,"prezzo_mq_min":1000,"prezzo_mq_max":2400,"prezzo_nota":"Immobiliare.it (marzo 2026): media richiesta 1.812 €/mq, ben sotto la media provinciale di 2.685 €/mq. Tecnocasa indica ~2.000 €/mq per case tipiche in pietra nel borgo e 1.900-2.000 per indipendenti di qualità verso Crevacol; RealAdvisor (gen 2025) stima 915-2.389 €/mq a seconda della tipologia. Range dedotto da un campione piccolo (~16 annunci su Idealista, da 29.000 €): il minimo ~1.000 €/mq riguarda immobili da ristrutturare, non è una media ufficiale.","tempo_auto_torino_min":110,"tempo_auto_milano_min":150,"ospedale_vicino":"Ospedale Regionale Umberto Parini di Aosta (PS/DEA, viale Ginevra 3) — ~16 km, 20 minuti di auto lungo la SS27","servizi":"In paese: farmacia Saint Bernard (con reperibilità), ufficio postale, scuola dell'infanzia (nell'edificio comunale), biblioteca con internet, alimentari di prossimità, bar, ristoranti e hotel; è il centro-servizi della valle del Gran San Bernardo (Tecnocasa: «concentra la maggioranza dei servizi»). Primaria a Saint-Rhémy-en-Bosses e medie a Gignod-Variney con scuolabus comunale (Istituzione Scolastica Grand Combin). Supermercati veri, banche e tutto il resto ad Aosta (20 min); sportello bancario in loco non confermato.","internet":"Comune area bianca incluso nel piano BUL Infratel realizzato da Open Fiber: FTTH in commercializzazione/completamento (la rete regionale è stata collaudata a ondate 2023-2024, con estensioni FiberCop/TIM nelle frazioni in corso); in alternativa FWA EOLO disponibile. Verificare il civico su bandaultralarga.italia.it: copertura FTTH probabile nel capoluogo ma non garantita in tutte le frazioni.","vita_annuale":"Vive tutto l'anno: è il capoluogo funzionale della valle del Gran San Bernardo con ~484 residenti stabili, municipio, farmacia, poste, asilo e attività aperte anche fuori stagione; tradizioni comunitarie attive (Carnevale delle Landzette, Veillà d'agosto). Forte componente turistica e di seconde case/appartamenti vacanza (27 appartamenti e 9 hotel censiti su portali booking), ma non è un paese-dormitorio chiuso a novembre: la SS27 verso il tunnel GSB mantiene passaggio e servizi attivi 12 mesi l'anno.","sci":"Fondo direttamente dal paese: pista di 16-18 km fino a Saint-Rhémy (1.521 m) + anello notturno di 2 km con innevamento programmato. Alpino a Crevacol (Saint-Rhémy-en-Bosses, ~10 min): ~20 km di piste tra 1.640 e 2.450 m; baby ski a Flassin (Saint-Oyen). Pila raggiungibile via Aosta in ~35-40 min.","acqua":"Torrente Artanavaz, che attraversa il territorio comunale (riserva di pesca alla trota fario di ~3 km fino all'abitato) e confluisce nel Buthier; sentiero pianeggiante del Ru Neuf lungo il corso d'acqua.","esposizione":"Il borgo sta sul fondovalle aperto della conca del Gran San Bernardo a ~1.270 m, zona descritta dalle fonti locali con «basso livello di umidità e alto livello di insolazione»; non è un versante ubac in ombra. Il versante sciistico di Crevacol, subito a monte, è esposto interamente a sud ed è tra i più soleggiati della Valle d'Aosta. Ore di sole invernali esatte non trovate (stima: buone per un fondovalle a questa quota).","pro":["Borgo storico curatissimo: Bandiera Arancione TCI (primo in VdA) e Borghi più belli d'Italia, museo a cielo aperto","Aosta e ospedale regionale con PS a soli 20 minuti su statale SS27 tenuta aperta tutto l'anno (asse per il tunnel GSB)","Prezzi sotto la media valdostana (~1.800 €/mq medi) per un paese vivo con farmacia, poste, asilo e ristoranti in loco","Sci di fondo dal paese e alpino a Crevacol (10 min), versante pieno sud molto soleggiato","Comunità residente reale con tradizioni attive, non solo seconde case"],"contro":["Niente scuola primaria né media in paese: scuolabus verso Saint-Rhémy e Gignod-Variney","FTTH da verificare al civico: rete BUL completata a rilento, frazioni ancora in corso con FiberCop","Paese molto piccolo (484 abitanti): offerta di lavoro, negozi e vita sociale dipendono da Aosta","Traffico di transito (anche TIR) sulla SS27 verso il tunnel del Gran San Bernardo","Milano è a 2h30: pendolarismo impraticabile, e l'inverno a 1.270 m è lungo"],"score_infrastrutture":7,"score_prezzo":6,"score_vivibilita":7,"score_complessivo":7,"descrizione":"Etroubles è il centro-servizi della valle del Gran San Bernardo: un borgo medievale da cartolina (Bandiera Arancione, Borghi più belli d'Italia) che però funziona anche da paese vero, con farmacia, poste, asilo, ristoranti e circa 480 residenti tutto l'anno. La posizione è il suo asso: 20 minuti da Aosta e dall'ospedale regionale su una statale tenuta sempre aperta per il tunnel del Gran San Bernardo, con fondo dal paese e Crevacol — versante pieno sud, tra i più soleggiati della regione — a 10 minuti. I prezzi (~1.800 €/mq medi, meno per il da ristrutturare) sono onesti per la qualità del contesto; i compromessi sono le scuole primarie/medie fuori paese, la fibra da verificare al civico e la dipendenza da Aosta per tutto ciò che va oltre la quotidianità.","fonti":["https://www.immobiliare.it/mercato-immobiliare/valle-d-aosta/etroubles/","https://www.tuttitalia.it/valle-d-aosta/provincia-di-aosta/15-comuni/popolazione/","https://www.comuni-italiani.it/007/026/clima.html","https://www.gcombin.edu.it/pagine/scuola-dellinfanzia-di-etroubles","https://www.paginesispa.it/blog/news/open-fiber-amplia-la-sua-copertura-nelle-aree-infratel-i-comuni-interessati/","https://paysdusaintbernard.it/attivita/sci-alpino-e-snowboard/"],"_extra":false,"_verifica":null},{"nome":"Brusson","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.75889,"lng":7.73194,"altitudine_m":1338,"popolazione":823,"prezzo_mq_min":1400,"prezzo_mq_max":3300,"prezzo_nota":"Media ufficiale immobiliare.it (feb 2026): 2.347 €/mq richiesti in vendita (+1,7% su feb 2025; range 24 mesi 2.220-2.446). Fonti di confronto: Borsino Immobiliare 2.061 €/mq, RealAdvisor (feb 2025) case 2.003 / appartamenti 3.226 €/mq. Il range 1.400-3.300 è dedotto da annunci idealista 2025-2026: baite/chalet ~1.395 €/mq, centro ~2.111 €/mq, ristrutturato di pregio fino a ~3.600-4.100 €/mq; rustici da ristrutturare anche 600-1.000 €/mq. Dato affidabile (mercato con ~50-60 annunci attivi), ma sopra il target 1000 €/mq salvo immobili da ristrutturare.","tempo_auto_torino_min":90,"tempo_auto_milano_min":115,"ospedale_vicino":"Ospedale regionale U. Parini di Aosta (unico PS della Valle d'Aosta), ~53 km / 45-50 min via A5. Alternativa: PS di Ivrea ~55 km / ~55 min. A Verrès (16 km, ~20 min) solo poliambulatorio ASL e guardia medica, niente pronto soccorso.","servizi":"In loco: supermercato Carrefour Express in centro + alimentari storico a Extrepieraz, farmacia, ufficio postale, banche/bancomat, biblioteca, scuola dell'infanzia, primaria e secondaria di I grado (tutte in Rue La Pila 72, Ist. scolastica L. Barone di Verrès, con mensa e scuolabus). Superiori e stazione ferroviaria a Verrès (16 km); bus di valle Verrès-Brusson-Champoluc.","internet":"FTTH Open Fiber disponibile (piano aree bianche): operatori come Dimensione vendono fino a 2,5 Gbps in download su rete Open Fiber. I dati AGCOM storici (2018) indicavano copertura minima, oggi superata; resta indispensabile la verifica puntuale per indirizzo/frazione (le frazioni sparse potrebbero ricadere su FWA).","vita_annuale":"Paese piccolo (circa 820-890 residenti stabili, in lento calo: -14% dal 1971) ma vivo tutto l'anno grazie al doppio flusso turistico estate/inverno, all'allevamento (caseificio Fromagerie Haut Val d'Ayas, fontina bio) e ai servizi completi in centro. Forte peso delle seconde case e degli affitti turistici rispetto alla base residenziale, ma non è un paese-dormitorio: scuole fino alle medie, negozi aperti tutto l'anno e un calendario di gare di fondo/biathlon mantengono un via vai costante anche fuori stagione.","sci":"Impianti propri a Estoul-Palasinaz (6 km dal paese, 1.750-2.250 m): ~8 km di piste, 2 seggiovie + skilift, innevamento programmato su oltre 80% delle piste; parte del comprensorio Monterosa Ski (180 km, Champoluc a 15 min). Punto di forza: centro di sci nordico di rilievo internazionale, 50 km di piste da fondo con anelli omologati Coppa del Mondo e poligono biathlon a Vollon. Ottimo scialpinismo verso la conca dei laghi di Palasinaz.","acqua":"Torrente Evançon (che scende dai ghiacciai del Monte Rosa) attraversa il comune; lago di Brusson (invaso artificiale del 1928, 46.000 mq) con parco, riserva di pesca e passeggiata ad anello; sette laghi alpini nella conca di Palasinaz.","esposizione":"Molto buona: il paese è adagiato su un altopiano in una conca descritta dalle fonti turistiche come \"assolatissima\", con elevata insolazione anche in inverno. La Val d'Ayas è tra le valli più ampie e soleggiate della Valle d'Aosta; le piste di Estoul sono ben esposte al sole. Non è un fondovalle in ombra d'inverno (ore di sole invernali esatte: dato puntuale non trovato, stima favorevole).","pro":["Conca molto soleggiata anche d'inverno, rarità a 1.338 m: niente sindrome da ubac/fondovalle in ombra","Servizi completi in paese: supermercato, farmacia, poste, banche, scuole da infanzia a medie","FTTH Open Fiber fino a 2,5 Gbps disponibile in centro paese","Accessibilità ottima per la quota: 20-25 min dall'uscita A5 di Verrès, Torino ~1h30 e Milano ~2h","Sci alpino in casa (Estoul-Palasinaz, Monterosa Ski a 15 min) + uno dei migliori centri di fondo/biathlon d'Italia, vivo estate e inverno"],"contro":["Prezzi oltre il doppio del target: media 2.347 €/mq, sotto i 1.500 solo baite e immobili da ristrutturare","Pronto soccorso lontano: Aosta o Ivrea a 45-55 min di auto, a Verrès solo guardia medica","Base residenziale piccola (~820 abitanti) e in calo, patrimonio edilizio dominato dalle seconde case","Scuole superiori solo a Verrès (16 km di strada di montagna, pendolarismo quotidiano per i figli)","Impianti sci propri piccoli (8 km) e a quota medio-bassa; per sciare seriamente bisogna salire a Champoluc"],"score_infrastrutture":7,"score_prezzo":6.5,"score_vivibilita":7.5,"score_complessivo":7,"descrizione":"Brusson è il capoluogo della media Val d'Ayas: 820 abitanti a 1.338 m in una conca insolitamente soleggiata, con tutti i servizi quotidiani in paese (supermercato, farmacia, poste, banche, scuole fino alle medie) e fibra FTTH in centro. È una delle scelte più equilibrate per vivere davvero in montagna: vivo tutto l'anno grazie a turismo bistagionale, allevamento e un centro di sci nordico di livello internazionale, con Torino a un'ora e mezza e il Monterosa Ski a un quarto d'ora. I compromessi sono un mercato immobiliare da località turistica (media 2.350 €/mq, ben sopra il target di 1.000) e il pronto soccorso a 45-50 minuti ad Aosta; sotto i 1.500 €/mq si trovano quasi solo rascard e baite da ristrutturare.","fonti":["https://www.tuttitalia.it/valle-d-aosta/45-brusson/","https://www.immobiliare.it/mercato-immobiliare/valle-d-aosta/brusson/","https://www.idealista.it/vendita-case/brusson-aosta/","https://www.dimensione.com/portale/fibra-internet-casa-ftth-2.5-giga-a-brusson-ao-7012.php","https://www.lbarone.edu.it/luoghi","https://www.lovevda.it/it/banca-dati/3/localita/valle-d-aosta/brusson/371"],"_extra":false,"_verifica":null},{"nome":"Torgnon","provincia":"Aosta","regione":"Valle d'Aosta","lat":45.80153,"lng":7.57042,"altitudine_m":1489,"popolazione":574,"prezzo_mq_min":900,"prezzo_mq_max":3300,"prezzo_nota":"Media ufficiale immobiliare.it marzo 2026: 2.495 €/mq (-6,6% su marzo 2025; picco 2.788 a mag 2025). RealAdvisor lug 2026: media 2.672 €/mq, appartamenti 3.091. Il range 900-3.300 combina le quotazioni per zona di Requot (min 890 €/mq nelle frazioni residuali Berzin/Chantorne/Eru, max 2.500 nel capoluogo Mongnod) con gli annunci idealista in zona piste (Septumian media 3.228 €/mq, nuovo classe A fino a ~4.800). Dato affidabile come media di portale su mercato piccolo (poche decine di annunci), non quotazione OMI: attenzione alla forte varianza tra frazione periferica da ristrutturare e nuovo vicino alla telecabina.","tempo_auto_torino_min":105,"tempo_auto_milano_min":135,"ospedale_vicino":"Ospedale regionale Umberto Parini di Aosta (unico PS completo della Valle d'Aosta): 43 km, ~45-50 min. Poliambulatorio/servizi territoriali AUSL a Châtillon (~20 min), medico di base in paese un giorno a settimana; per emergenze gravi elisoccorso 112/118.","servizi":"In loco: supermercato A&O Chatrian (Place Frutaz, vende anche legna/pellet), ufficio postale (aperto lun-mer-ven mattina), bancomat BCC Valdostana al piazzale della telecabina, ufficio turistico, medico di base 1 giorno/settimana, scuola dell'infanzia e primaria di paese (pluriclasse, Istituzione Abbé J.M. Trèves). NON in loco: farmacia (la più vicina ad Antey-Saint-André, ~10 min), scuole medie e nido nel fondovalle (Antey/Valtournenche/Châtillon), sportello bancario vero e proprio a Châtillon (~20 min).","internet":"Situazione debole: dati AGCOM davano 0% FTTH e 0% FTTC (solo ADSL 96%); Torgnon è area bianca del piano BUL Open Fiber (concessione Infratel VdA, 69 comuni) e il comune dichiara (ago 2025) la posa della fibra su gran parte del territorio completata, ma la commercializzazione FTTH non risulta ancora attiva. Oggi in pratica: ADSL + FWA (Eolo e simili, ~100 Mbps teorici). Verificare copertura al civico su bandaultralarga.italia.it prima di comprare.","vita_annuale":"Comune di ~574 residenti stabili (in lieve crescita dal 2011: 517) sparsi su 22 frazioni, ma patrimonio edilizio dominato dalle seconde case (a Mongnod ~300 edifici residenziali per ~100 famiglie residenti). Turismo bistagionale vero (sci d'inverno, famiglie ed escursionisti d'estate) tiene aperti supermercato, bar e ristoranti tutto l'anno; nelle mezze stagioni il paese è molto quieto ma non morto — comunità locale attiva, patois, pro loco e amministrazione che investe su infrastrutture.","sci":"Stazione propria Torgnon-Chantorné: telecabina 8 posti Mongnod-Chantorné dal paese, 3 seggiovie + tapis, ~23-25 km di piste fino a 2.250 m, snowpark e una delle piste di fondo più lunghe della VdA (Grandes Montagnes, partenza 1.870 m). Comprensorio piccolo e familiare; Cervinia/Zermatt (350 km di piste) a ~35-40 min via Antey.","acqua":"Torrente Petit Monde, che scende dal vallone di Chavacour attraversando il territorio comunale (cascata e mulino storico a Triatel/Etirol) verso il Marmore nel fondovalle; in quota lago Tsan (2.440 m) e stagno di Loditor (1.900 m), entrambi SIC.","esposizione":"Adret classico: conca morenica a balcone sul versante solatio della bassa Valtournenche, esposta a sud e riparata dai venti settentrionali — è soprannominato \"il paese del sole\", con soleggiamento invernale tra i migliori della valle (nota promozionale ma confermata dall'orografia).","pro":["Esposizione a sud eccezionale: conca solatia, sole pieno anche in pieno inverno (raro a 1.489 m)","Sci sotto casa (telecabina dal paese) + Cervinia/Zermatt a 35-40 min","Servizi essenziali in loco (supermercato, poste, bancomat, scuola primaria) nonostante i 574 abitanti","Autostrada A5 (Châtillon) a soli 20 minuti: Torino in ~1h45, Milano in ~2h15","Comunità residente stabile e in lieve crescita, non un dormitorio da seconde case in declino demografico"],"contro":["Prezzi medi 2.400-2.700 €/mq, ben oltre il target 1.000: sotto i 1.500 solo rustici da ristrutturare nelle frazioni periferiche","FTTH non ancora commercializzata: oggi solo ADSL/FWA, un rischio per chi lavora da remoto","Niente farmacia né medie in paese; unico pronto soccorso ad Aosta, 45-50 min","Fortissima incidenza di seconde case: fuori stagione il paese si svuota molto","Comprensorio sciistico piccolo (25 km) e a quota medio-bassa, esposto al rischio innevamento futuro sotto i 1.900 m"],"score_infrastrutture":5,"score_prezzo":4,"score_vivibilita":6,"score_complessivo":6,"descrizione":"Torgnon è un balcone a 1.489 m sul versante solatio della Valtournenche, soprannominato \"il paese del sole\": 574 residenti in 22 frazioni, una conca esposta a sud con vista sulle Alpi e la telecabina che parte dal capoluogo Mongnod. Per viverci tutto l'anno offre più di quanto la dimensione suggerisca — supermercato, poste, scuola primaria, comunità stabile — ma dipende dal fondovalle per farmacia, medie e banca, e dall'ospedale di Aosta (45-50 min) per le emergenze. I due nei principali per un trasferimento sono la connettività (FTTH posata ma non ancora attivabile, oggi solo ADSL/FWA) e i prezzi: la media di ~2.500 €/mq è lontana dal target 1.000, avvicinabile solo con rustici da ristrutturare nelle frazioni. Scelta eccellente per qualità di vita e sole invernale, mediocre per budget e lavoro da remoto — almeno finché Open Fiber non accende la rete.","fonti":["https://it.wikipedia.org/wiki/Torgnon","https://www.immobiliare.it/mercato-immobiliare/valle-d-aosta/torgnon/","https://realadvisor.it/it/mercato-immobiliare/comune-torgnon-it","https://www.torgnon.org/numeri-utili/","https://tariffe.segugio.it/copertura-fibra-ottica-adsl/verifica-copertura-torgnon-ao.aspx","https://www.lavalleenotizie.it/media-valle/a-torgnon-il-candidato-sindaco-sara-massimo-poletti-la-priorita-e-il-potenziamento-delle-infrastrutture/"],"_extra":false,"_verifica":null},{"nome":"Madesimo","provincia":"Sondrio","regione":"Lombardia","lat":46.4343,"lng":9.3538,"altitudine_m":1550,"popolazione":507,"prezzo_mq_min":3600,"prezzo_mq_max":4700,"prezzo_nota":"Media ufficiale immobiliare.it nov 2024: 4.074 €/mq (+7,8% su base annua, picco 4.158 set 2024). Idealista (annunci 2025-2026, ~80 in vendita): appartamenti ~3.670 €/mq, nuove costruzioni ~4.035 €/mq, rustici da ristrutturare nelle frazioni ~1.750 €/mq. Analisi Abitare Co. 2025 su località sciistiche: 4.625 €/mq per nuovo/ristrutturato vicino agli impianti. Range 3.600-4.700 riferito al residenziale standard; sotto i 2.000 €/mq solo rustici da sistemare a Isola/Pianazzo/Montespluga. Prezzi da mercato turistico, molto sopra la media provinciale (~1.730 €/mq).","tempo_auto_torino_min":225,"tempo_auto_milano_min":140,"ospedale_vicino":"Ospedale di Chiavenna con Pronto Soccorso (ASST Valtellina e Alto Lario), ~25 km, 30-35 minuti di auto lungo la SS36 del Passo Spluga. A Madesimo ambulatorio medico 3 giorni a settimana. Per patologie complesse riferimento Sondrio (~1h30).","servizi":"In loco: supermercati/alimentari, Farmacia Edelweiss (via De Giacomi 5, chiusa dom-lun), scuola dell'infanzia e primaria (IC Garibaldi), ufficio postale (aperto solo mar/gio/sab), filiale Banca Popolare di Sondrio + ATM Crédit Agricole, infopoint turistico. Scuole medie a Campodolcino/Chiavenna; superiori e servizi completi a Chiavenna (25 km).","internet":"FTTH Open Fiber disponibile nel concentrico (intervento pubblico BUL aree bianche), offerte fino a 2,5 Gbps con operatori partner (es. Dimensione, TIM, Fastweb). Verifica puntuale all'indirizzo consigliata per le frazioni (Isola, Montespluga), dove la copertura può essere FWA/FTTC.","vita_annuale":"Forte stagionalità: paese molto vivo in inverno (sci) e in estate, con code di negozi e ristoranti che chiudono nelle mezze stagioni (il sito turistico pubblica i calendari \"aperture primavera\"). Solo ~507 residenti stabili in calo costante (-23% dal 1971) e una delle percentuali più alte di seconde case della provincia di Sondrio: fuori stagione molte zone restano semivuote. I servizi essenziali (scuola, farmacia, banca, alimentari) restano però aperti tutto l'anno.","sci":"Impianti propri: Skiarea Valchiavenna (Madesimo-Motta-Campodolcino), ~60 km di piste fino a quasi 3.000 m (Pizzo Groppera), incluso il celebre Canalone. Partenza impianti direttamente dal paese: è una vera ski-town, non un dormitorio di comprensorio altrui.","acqua":"Torrente Scalcoggia, che attraversa il paese e forma la Cascata di Madesimo; nel territorio comunale anche il Lago Azzurro (Motta) e il lago-diga di Montespluga; il fiume Liro scorre nel fondovalle della Val San Giacomo.","esposizione":"Il paese sorge in una conca aperta a 1.550 m ai piedi delle Alpi Retiche, con esposizione migliore rispetto al fondovalle stretto della Val San Giacomo sottostante (Campodolcino): il sole invernale arriva in paese ma resta limitato nelle ore centrali più corte dalle cime circostanti; le piste in quota sono ampiamente soleggiate. Nota: valutazione qualitativa (stima) — non esistono dati pubblicati sulle ore di sole invernali del concentrico.","pro":["Vera ski-town con 60 km di piste che partono dal paese (Skiarea Valchiavenna, Canalone leggendario)","FTTH Open Fiber fino a 2,5 Gbps: connettività da città in un comune di 500 abitanti","Servizi base completi in loco: scuola infanzia+primaria, farmacia, banca, poste, supermercati","Conca a 1.550 m con neve garantita, aria pulita e confine svizzero a due passi (Passo Spluga)","Milano raggiungibile in ~2h15-2h30 senza autostrada a pedaggio (SS36)"],"contro":["Prezzi da località turistica: ~4.000 €/mq, quattro volte il target di 1.000 €/mq","Fuori stagione il paese si svuota: dominio di seconde case, molti esercizi chiudono nelle mezze stagioni","Solo 507 residenti in calo costante: comunità piccola, lavoro quasi solo turistico-stagionale","Unica via di accesso (SS36 con tornanti da Chiavenna): traffico weekend, neve e chiusure occasionali in inverno","Ospedale a 30-35 min, medie/superiori fuori paese, poste aperte solo 3 giorni a settimana"],"score_infrastrutture":6,"score_prezzo":3,"score_vivibilita":6,"score_complessivo":5.5,"descrizione":"Madesimo è una delle ski-town più autentiche delle Alpi lombarde: una conca a 1.550 m in Valle Spluga con 60 km di piste che partono dal paese, torrente e cascata nel centro abitato, e — sorpresa — fibra FTTH fino a 2,5 Gbps. Chi ci si trasferisce trova i servizi essenziali (scuola primaria, farmacia, banca, supermercati) e una comunità minuscola ma reale di circa 500 residenti. Il rovescio della medaglia è il prezzo (media ~4.000 €/mq, lontanissima dal target di 1.000) e la forte stagionalità: fuori dai picchi turistici molte seconde case restano chiuse e diversi esercizi abbassano la saracinesca. Ideale per chi lavora da remoto e vuole sciare sotto casa accettando l'economia di paese-vacanza; sconsigliato a chi cerca un borgo economico e vivo in ogni mese dell'anno.","fonti":["https://www.immobiliare.it/mercato-immobiliare/lombardia/madesimo/","https://www.idealista.it/vendita-case/madesimo-sondrio/con-appartamenti/","https://www.tuttitalia.it/lombardia/27-madesimo/","https://valtellinamobile.it/spopolamento-madesimo","https://www.madesimo.eu/en/useful-informations/health-service/","https://www.dimensione.com/portale/fibra-internet-casa-ftth-2.5-giga-a-madesimo-so-14035.php"],"_extra":false,"_verifica":null},{"nome":"Usseaux","provincia":"Torino","regione":"Piemonte","lat":45.04894,"lng":7.02851,"altitudine_m":1416,"popolazione":174,"prezzo_mq_min":818,"prezzo_mq_max":1580,"prezzo_nota":"818 €/mq = media richiesta immobiliare.it feb 2026 (-29,7% su feb 2025, picco 1.392 nov 2024): media ufficiale ma su ~19 annunci, quindi molto volatile. Idealista indica media di zona 1.049 €/mq. Range reale degli annunci amplissimo: ruderi/baite da ristrutturare 200-500 €/mq, ristrutturato in borgo 1.500-2.300 €/mq. Il max 1.580 riflette il ristrutturato tipico; media provinciale TO: 1.692 €/mq.","tempo_auto_torino_min":80,"tempo_auto_milano_min":150,"ospedale_vicino":"Ospedale E. Agnelli di Pinerolo (DEA I livello, PS 24h + PS pediatrico), ~40 km, circa 40-45 minuti di auto lungo la SR23","servizi":"In loco quasi nulla: ufficio turistico, bar/ristoranti, forno. Tutto il quotidiano a Fenestrelle (5-10 min): farmacia Santa Rita (con ECG e telemedicina), ufficio postale, alimentari/piccolo supermercato, ambulatorio medico e infermieristico, bancomat. Scuole primarie in valle (Fenestrelle/valle, stima), medie e superiori verso Perosa Argentina e Pinerolo. Spesa grossa e banche: Pinerolo (40 min).","internet":"FTTH Open Fiber (aree bianche) commercializzata: BBBell e Dimensione offrono fibra fino a 2,5 Gbps; in alternativa FWA fino a 300 Mbps e FTTC/EVDSL fino a 200 Mbps. Copertura da verificare puntualmente per borgata (Balboutet, Laux, Fraisse, Pourrieres possono differire dal capoluogo).","vita_annuale":"Comune minuscolo: 174 residenti distribuiti su 5 borgate, in calo costante (-44% dal 1971). Forte peso di seconde case e turismo da weekend/estate (murales, Borghi più belli d'Italia, Bandiera Arancione TCI). Esiste però un nucleo vivo tutto l'anno: Balboutet è ancora un centro agricolo reale (allevamento bovino, formaggi) e il paese resta accessibile in inverno sulla SR23. Fuori stagione la vita sociale è molto ridotta e appoggiata a Fenestrelle.","sci":"Nessun impianto proprio. Pragelato a ~10-15 min (fondo + funivia Pattemouche-Anfiteatro verso il Monte Banchetta, impianto storicamente soggetto a chiusure ma a listino 2025/26); Sestriere/Vialattea (400 km di piste) a ~20-25 min. Scialpinismo e ciaspole a Pian dell'Alpe/Assietta sopra Balboutet.","acqua":"Torrente Chisone (fondovalle) e Lago del Laux, laghetto alpino nella frazione Laux; Lago delle Rane presso Balboutet","esposizione":"Eccellente: capoluogo e frazioni alte sulla sinistra orografica del Chisone, il versante indritto (adret) esposto a sud. Balboutet (1.600 m) è il \"paese del sole e delle meridiane\" (oltre 20 quadranti solari): il sole raggiunge quasi tutta la borgata anche al solstizio d'inverno, solo la parte bassa resta in ombra della Rocca del Laux.","pro":["Esposizione solare tra le migliori delle Alpi occidentali: versante adret pieno sud, sole anche al solstizio d'inverno (Balboutet)","Prezzi molto bassi: media 818-1.049 €/mq, meno della metà della media provinciale, case in borgo storico da 25-45k€","Borgo curato e riconosciuto (Borghi più belli d'Italia, Bandiera Arancione TCI) con comunità agricola ancora attiva","FTTH Open Fiber fino a 2,5 Gbps disponibile: raro a 1.400 m di quota","SR23 comoda tutto l'anno: Fenestrelle a 5-10 min per i servizi, Pragelato/Sestriere per lo sci, Pinerolo a 40 min"],"contro":["Solo 174 residenti su 5 borgate e trend demografico in calo costante: fuori stagione la vita sociale è minima","Zero servizi in loco: farmacia, poste, alimentari e ambulatorio sono a Fenestrelle, spesa e banche a Pinerolo (40 min)","Pronto soccorso a 40-45 minuti (Pinerolo): non ideale per anziani o emergenze","Mercato immobiliare sottile e volatile (media crollata del 30% in un anno su pochi annunci): rivendere può essere lento","Molto immobile è vetusto o da ristrutturare: al prezzo di acquisto basso va sommato un cantiere in quota"],"score_infrastrutture":6,"score_prezzo":9.5,"score_vivibilita":5.5,"score_complessivo":6.5,"descrizione":"Usseaux è un borgo-cartolina dell'Alta Val Chisone a 1.416 m: murales, meridiane e cinque borgate in pietra sul versante indritto, con la frazione Balboutet celebre come \"paese del sole\" perché resta illuminata anche nel cuore dell'inverno. Per chi cerca casa in montagna è uno dei migliori rapporti qualità-prezzo del Piemonte (818-1.049 €/mq di media, FTTH disponibile, SR23 sempre aperta, Sestriere a mezz'ora), ma bisogna accettare la realtà di un comune di 174 abitanti: nessun negozio, servizi delegati a Fenestrelle e pronto soccorso a 45 minuti. Ideale per smart worker o pensionati autonomi con auto, che vogliono sole vero d'inverno e comunità alpina autentica più che movida; meno adatto a famiglie con figli piccoli o a chi dipende dai servizi sotto casa.","fonti":["https://www.immobiliare.it/mercato-immobiliare/piemonte/usseaux/","https://www.idealista.it/vendita-case/usseaux-torino/","https://www.tuttitalia.it/piemonte/84-usseaux/","https://www.comuni-italiani.it/001/281/","https://www.bbbell.it/fibra-ftth-bandalarga-usseaux/","https://www.vialattea.it/en/ski-area/pragelato/"],"_extra":true,"_verifica":null},{"nome":"Saviore dell'Adamello","provincia":"Brescia","regione":"Lombardia","lat":46.07968,"lng":10.40066,"altitudine_m":1210,"popolazione":781,"prezzo_mq_min":650,"prezzo_mq_max":1130,"prezzo_nota":"Range da più fonti: mercato-immobiliare.info (agg. 1 luglio 2026) indica 825-1130 €/mq per appartamenti su ~99 annunci (affidabilità dichiarata limitata); OMI/borsinoimmobiliare 815-1105 €/mq; immobiliare.it media storica 653 €/mq (dic 2022). Gli annunci reali su immobiliare.it/idealista scendono molto più in basso: case indipendenti da ristrutturare a 400-700 €/mq (es. 111 mq a 45.000 €, 60 mq a 40.000 €). Non è una media ufficiale: range dedotto da poche decine di annunci in mercato poco liquido.","tempo_auto_torino_min":225,"tempo_auto_milano_min":145,"ospedale_vicino":"Ospedale di Esine (PS, ASST Valcamonica), ~32 min di auto — unico comune della Valcamonica oltre i 30 min dal pronto soccorso più vi
